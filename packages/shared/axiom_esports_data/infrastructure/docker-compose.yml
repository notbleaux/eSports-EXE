version: '3.9'

# =============================================================================
# SATOR Platform - Docker Compose Configuration
# =============================================================================
# This stack includes:
#   - PostgreSQL with TimescaleDB (primary database)
#   - Redis (caching & rate limiting)
#   - FastAPI Application
#   - Pipeline Worker (optional)
#
# Usage:
#   docker-compose up -d              # Start all services
#   docker-compose up -d postgres     # Start only database
#   docker-compose --profile pipeline up -d  # Include pipeline worker
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL with TimescaleDB Extension
  # ---------------------------------------------------------------------------
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: axiom_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: axiom_esports
      POSTGRES_USER: ${POSTGRES_USER:-axiom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
      - ./init-scripts:/docker-entrypoint-initdb.d/extra:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-axiom} -d axiom_esports"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sator_network
    command:
      - postgres
      - -c
      - max_connections=30
      - -c
      - shared_buffers=256MB

  # ---------------------------------------------------------------------------
  # Redis for Caching and Rate Limiting
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: axiom_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - sator_network
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru

  # ---------------------------------------------------------------------------
  # FastAPI Application Server
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ../..
      dockerfile: shared/axiom-esports-data/api/Dockerfile
      target: runtime
    container_name: sator_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Database Configuration
      DATABASE_URL: postgresql://${POSTGRES_USER:-axiom}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/axiom_esports
      DB_MIN_CONNECTIONS: "1"
      DB_MAX_CONNECTIONS: "5"
      
      # Redis Configuration
      REDIS_URL: redis://redis:6379/0
      
      # API Configuration
      API_PORT: "8000"
      API_HOST: "0.0.0.0"
      API_WORKERS: "1"
      
      # Application Settings
      APP_NAME: "SATOR-API"
      APP_VERSION: "0.1.0"
      APP_ENVIRONMENT: "development"
      
      # Logging
      LOG_LEVEL: "INFO"
      LOG_FORMAT: "text"
      
      # CORS (adjust for production)
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173,http://localhost:8000"
      
      # Rate Limiting
      RATE_LIMIT_REQUESTS_PER_MINUTE: "60"
      
      # Data Retention
      DATA_RETENTION_DAYS: "365"
      
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Mount for development (hot reload)
      - ../api:/app/api:ro
      - ../../shared:/app/shared:ro
      - api_logs:/app/logs
    networks:
      - sator_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # Pipeline Worker (Optional - for background data processing)
  # ---------------------------------------------------------------------------
  pipeline:
    build:
      context: ../..
      dockerfile: shared/axiom-esports-data/api/Dockerfile
    container_name: sator_pipeline
    command: >
      python -m pipeline.orchestrator
      --mode=delta
      --epochs=3
      --batch-size=100
      --max-workers=2
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-axiom}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/axiom_esports
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: "INFO"
      APP_ENVIRONMENT: "development"
    depends_on:
      - postgres
      - redis
      - api
    volumes:
      - ../:/app/pipeline:ro
      - pipeline_data:/app/data
      - pipeline_logs:/app/logs
    networks:
      - sator_network
    profiles:
      - pipeline  # Only start with: docker-compose --profile pipeline up -d
    restart: "no"  # Run once and exit (use with cron for scheduling)

  # ---------------------------------------------------------------------------
  # Database Migration Runner (One-shot service)
  # ---------------------------------------------------------------------------
  migrate:
    build:
      context: ../..
      dockerfile: shared/axiom-esports-data/api/Dockerfile
    container_name: sator_migrate
    command: >
      python scripts/run_migrations.py --env=development
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-axiom}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/axiom_esports
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../scripts:/app/scripts:ro
      - ./migrations:/app/migrations:ro
    networks:
      - sator_network
    profiles:
      - migrate  # Run with: docker-compose --profile migrate run --rm migrate
    restart: "no"

  # ---------------------------------------------------------------------------
  # Development Tools (pgAdmin - optional)
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sator_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sator.local
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - sator_network
    profiles:
      - tools  # Start with: docker-compose --profile tools up -d pgadmin

# =============================================================================
# Persistent Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  api_logs:
    driver: local
  pipeline_data:
    driver: local
  pipeline_logs:
    driver: local
  pgadmin_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  sator_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
