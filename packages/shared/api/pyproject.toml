[tool.poetry]
name = "njz-api"
version = "2.1.0"
description = "NJZiteGeisTe Platform API"

[tool.poetry.dependencies]
python = "^3.11"
fastapi = "^0.115.0"
uvicorn = {extras = ["standard"], version = "^0.24.0"}
asyncpg = "^0.29.0"
redis = "^5.0.0"
pydantic = {extras = ["email"], version = "^2.5.0"}
pydantic-settings = "^2.1.0"
httpx = "^0.25.0"
python-jose = {extras = ["cryptography"], version = "^3.4.0"}
passlib = {extras = ["bcrypt"], version = "^1.7.4"}
python-dotenv = "^1.0.0"
slowapi = "^0.1.9"
pyotp = "^2.9.0"
qrcode = "^7.4.2"
cryptography = "^44.0.0"
pywebpush = "^1.14.0"
websockets = "^12.0"
wsproto = "^1.2.0"
aiohttp = "^3.9.0"
structlog = "^23.2.0"
tenacity = "^8.2.0"
orjson = "^3.9.0"
ujson = "^5.9.0"

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.0"
pytest-asyncio = "^0.21.0"
pytest-cov = "^4.1.0"
pytest-mock = "^3.12.0"
asgi-lifespan = "^2.1.0"
black = "^23.12.0"
ruff = "^0.1.9"
mypy = "^1.8.0"
bandit = "^1.7.0"
safety = "^2.3.0"

[tool.black]
line-length = 100

[tool.ruff]
line-length = 100
select = ["E", "F", "I"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
