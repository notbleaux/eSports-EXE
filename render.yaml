# [Ver006.000]
# Render.com Deployment Configuration
# NJZiteGeisTe Platform - Production Deployment
# NOTE: Using FREE TIER ONLY

services:
  - type: web
    name: njz-api
    env: python
    buildCommand: |
      pip install poetry
      poetry install --only main --no-interaction
    startCommand: "cd packages/shared/api && poetry run uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1"
    # Require manual approval for production deploys
    autoDeploy: false
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: njz-redis
          property: connectionString
      - key: CORS_ORIGINS
        sync: false  # MUST be set manually (comma-separated list)
      - key: JWT_SECRET_KEY
        sync: false  # MUST be set manually (32+ char random)
        # Generate with: openssl rand -base64 32
      - key: PANDASCORE_API_KEY
        sync: false
      - key: PYTHONPATH
        value: "/opt/render/project/src/packages/shared"
    healthCheckPath: /health
    plan: free

  - type: redis
    name: njz-redis
    plan: free
    ipAllowList: []
