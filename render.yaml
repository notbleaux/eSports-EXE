# [Ver005.000]
# Render.com Deployment Configuration
# SATOR API - Production Deployment
# NOTE: Using FREE TIER ONLY

services:
  - type: web
    name: sator-api
    env: python
    buildCommand: "echo 'Installing...' && pip install -r packages/shared/api/requirements.txt && echo 'Done'"
    startCommand: "cd packages/shared/api && uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: sator-redis
          property: connectionString
      - key: CORS_ORIGINS
        value: "https://web-ashen-mu.vercel.app"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PANDASCORE_API_KEY
        sync: false
      - key: PYTHONPATH
        value: "/opt/render/project/src/packages/shared"
    healthCheckPath: /health
    autoDeploy: true
    plan: free

  - type: redis
    name: sator-redis
    plan: free
    ipAllowList: []
