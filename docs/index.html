<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATOR eSports Platform</title>
    <meta http-equiv="refresh" content="0; url=./archive-website/">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            color: #e8e6e3;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #00f0ff, #c9b037);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        p {
            color: #8a8a9a;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 240, 255, 0.2);
            border-top-color: #00f0ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 2rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        a {
            color: #00f0ff;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border: 1px solid #00f0ff;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        a:hover {
            background: #00f0ff;
            color: #0a0a0f;
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h1>SATOR eSports Platform</h1>
    <p>Loading archive website...</p>
    <p><a href="./archive-website/">Click here if not redirected</a></p>
</body>
</html>
