<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SATOR eXe - Advanced esports analytics platform for Valorant stats, tactical intelligence, and mission control interface. Elevate your game with data-driven insights.">
    <meta name="keywords" content="esports analytics, valorant stats, tactical intelligence, sator exe, radiantx, mission control interface, esports dashboard, game analytics platform">
    <meta property="og:title" content="SATOR eXe — Tactical Intelligence Infrastructure">
    <meta property="og:description" content="Advanced esports analytics platform for Valorant. Tactical intelligence, match analysis, and competitive insights.">
    <meta property="og:image" content="https://sator.exe/og-image.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sator.exe/landing.html">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="SATOR eXe — Tactical Intelligence">
    <meta name="twitter:description" content="Advanced esports analytics platform for Valorant stats and tactical intelligence.">
    <meta name="twitter:image" content="https://sator.exe/og-image.png">
    <link rel="canonical" href="https://sator.exe/landing.html">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>SATOR eXe — Tactical Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="system/core.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(180deg, #0a1628 0%, #050d18 100%);
            color: #f8f9fa;
            min-height: 100vh;
            overflow: hidden;
            cursor: pointer;
        }

        /* Starfield Background */
        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #f8f9fa;
            border-radius: 50%;
            opacity: 0;
        }

        /* Main Container */
        .landing-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* Title */
        .landing-title {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            text-align: center;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 40px rgba(0, 240, 255, 0.3);
        }

        .landing-title .sator {
            color: #f8f9fa;
        }

        .landing-title .exe {
            color: #00f0ff;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.6);
        }

        .landing-subtitle {
            font-size: 0.875rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(248, 249, 250, 0.6);
            margin-bottom: 3rem;
        }

        /* SATOR Sphere Container */
        .sphere-container {
            position: relative;
            width: min(80vw, 500px);
            aspect-ratio: 1;
            margin: 2rem 0;
        }

        .sator-sphere {
            width: 100%;
            height: 100%;
            animation: sphereRotate 40s linear infinite;
            filter: drop-shadow(0 0 60px rgba(0, 240, 255, 0.2));
        }

        @keyframes sphereRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .sator-sphere:hover {
            animation-play-state: paused;
            filter: drop-shadow(0 0 80px rgba(0, 240, 255, 0.4));
        }

        /* Facet Styles */
        .facet {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .facet:hover {
            filter: brightness(1.5);
        }

        .facet-s { fill: #FFD700; }
        .facet-a { fill: #1E3A5F; }
        .facet-t { fill: #FFFFFF; }
        .facet-o { fill: #00D4FF; }
        .facet-r { fill: #FF4655; }
        .facet-n { fill: #FFFFFF; }
        .facet-e { fill: #1E3A5F; }
        .facet-p { fill: #00D4FF; }

        .facet-letter {
            font-size: 14px;
            font-weight: bold;
            text-anchor: middle;
            dominant-baseline: central;
            fill: #0a1628;
            pointer-events: none;
            font-family: 'JetBrains Mono', monospace;
        }

        .facet-letter.light {
            fill: #ffffff;
        }

        /* Click to Enter */
        .enter-hint {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            margin-top: 2rem;
            animation: pulseHint 2s ease-in-out infinite;
        }

        .enter-text {
            font-size: 0.75rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: rgba(0, 240, 255, 0.8);
        }

        .enter-arrow {
            width: 24px;
            height: 24px;
            border-right: 2px solid #00f0ff;
            border-bottom: 2px solid #00f0ff;
            transform: rotate(45deg);
            opacity: 0.6;
        }

        @keyframes pulseHint {
            0%, 100% { opacity: 0.4; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(5px); }
        }

        /* Version Badge */
        .version-badge {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.625rem;
            letter-spacing: 0.1em;
            color: rgba(248, 249, 250, 0.3);
            text-transform: uppercase;
        }

        /* Warp Transition Overlay */
        .warp-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, 
                transparent 0%, 
                rgba(0, 240, 255, 0.2) 30%, 
                #0a1628 70%
            );
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            transition: opacity 0.3s ease;
        }

        .warp-overlay.active {
            opacity: 1;
            animation: warpZoom 0.8s ease-out forwards;
        }

        @keyframes warpZoom {
            0% { transform: scale(1); filter: blur(0); }
            50% { transform: scale(1.5); filter: blur(20px); }
            100% { transform: scale(3); filter: blur(60px); opacity: 0; }
        }

        /* Responsive */
        @media (max-width: 640px) {
            .landing-title {
                font-size: 2.5rem;
            }
            .landing-subtitle {
                font-size: 0.75rem;
                letter-spacing: 0.2em;
            }
            .facet-letter {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Starfield -->
    <div class="starfield" id="starfield"></div>

    <!-- Warp Overlay -->
    <div class="warp-overlay" id="warpOverlay"></div>

    <!-- Main Content -->
    <div class="landing-container" id="landingContainer">
        <h1 class="landing-title">
            <span class="sator">SATOR</span><span class="exe"> eXe</span>
        </h1>
        <p class="landing-subtitle">Tactical Intelligence Infrastructure</p>

        <!-- SATOR Sphere -->
        <div class="sphere-container">
            <svg class="sator-sphere" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <radialGradient id="sphereDepth" cx="30%" cy="30%">
                        <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
                        <stop offset="100%" stop-color="rgba(0,0,0,0.4)"/>
                    </radialGradient>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="4" result="blur"/>
                        <feMerge>
                            <feMergeNode in="blur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>

                <!-- Background sphere -->
                <circle cx="200" cy="200" r="170" fill="#0f1a2e" stroke="rgba(0,240,255,0.2)" stroke-width="1.5"/>
                <circle cx="200" cy="200" r="170" fill="url(#sphereDepth)"/>

                <!-- Flow lines -->
                <ellipse cx="200" cy="200" rx="160" ry="40" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.2"/>
                <ellipse cx="200" cy="200" rx="40" ry="160" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.2"/>
                <ellipse cx="200" cy="200" rx="120" ry="120" fill="none" stroke="#ffd700" stroke-width="0.5" opacity="0.15"/>

                <!-- SATOR Upper Hemisphere -->
                <!-- Row 1: S -->
                <g class="facet facet-s" data-letter="S">
                    <polygon points="200,45 188,65 212,65"/>
                    <text x="200" y="60" class="facet-letter">S</text>
                </g>

                <!-- Row 2: A A -->
                <g class="facet facet-a" data-letter="A">
                    <polygon points="188,65 170,90 188,90"/>
                    <text x="179" y="84" class="facet-letter light">A</text>
                </g>
                <g class="facet facet-a" data-letter="A">
                    <polygon points="212,65 212,90 230,90"/>
                    <text x="221" y="84" class="facet-letter light">A</text>
                </g>

                <!-- Row 3: T R T -->
                <g class="facet facet-t" data-letter="T">
                    <polygon points="170,90 148,120 175,120"/>
                    <text x="164" y="112" class="facet-letter">T</text>
                </g>
                <g class="facet facet-r" data-letter="R">
                    <polygon points="188,90 175,120 200,120"/>
                    <text x="188" y="110" class="facet-letter">R</text>
                </g>
                <g class="facet facet-t" data-letter="T">
                    <polygon points="212,90 200,120 225,120"/>
                    <text x="212" y="110" class="facet-letter">T</text>
                </g>

                <!-- Row 4: O E E O -->
                <g class="facet facet-o" data-letter="O">
                    <polygon points="148,120 125,155 155,155"/>
                    <text x="143" y="148" class="facet-letter">O</text>
                </g>
                <g class="facet facet-e" data-letter="E">
                    <polygon points="175,120 155,155 185,155"/>
                    <text x="172" y="148" class="facet-letter light">E</text>
                </g>
                <g class="facet facet-e" data-letter="E">
                    <polygon points="200,120 185,155 215,155"/>
                    <text x="200" y="148" class="facet-letter light">E</text>
                </g>
                <g class="facet facet-o" data-letter="O">
                    <polygon points="225,120 215,155 245,155"/>
                    <text x="232" y="148" class="facet-letter">O</text>
                </g>

                <!-- Row 5: R P N P R (Equator) -->
                <g class="facet facet-r" data-letter="R">
                    <polygon points="125,155 100,195 135,195"/>
                    <text x="120" y="185" class="facet-letter">R</text>
                </g>
                <g class="facet facet-p" data-letter="P">
                    <polygon points="155,155 135,195 170,195"/>
                    <text x="153" y="185" class="facet-letter">P</text>
                </g>
                <g class="facet facet-n" data-letter="N">
                    <polygon points="185,155 170,195 200,195" filter="url(#glow)"/>
                    <text x="185" y="182" class="facet-letter light">N</text>
                </g>
                <g class="facet facet-p" data-letter="P">
                    <polygon points="215,155 200,195 230,195"/>
                    <text x="215" y="185" class="facet-letter">P</text>
                </g>
                <g class="facet facet-r" data-letter="R">
                    <polygon points="245,155 230,195 265,195"/>
                    <text x="250" y="185" class="facet-letter">R</text>
                </g>

                <!-- ROTAS Lower Hemisphere (reflected, dimmer) -->
                <g opacity="0.6">
                    <g class="facet facet-r">
                        <polygon points="100,195 125,235 135,205"/>
                        <text x="118" y="215" class="facet-letter">R</text>
                    </g>
                    <g class="facet facet-o">
                        <polygon points="135,195 155,235 170,205"/>
                        <text x="152" y="215" class="facet-letter">O</text>
                    </g>
                    <g class="facet facet-t">
                        <polygon points="170,195 185,235 200,205"/>
                        <text x="182" y="215" class="facet-letter">T</text>
                    </g>
                    <g class="facet facet-a">
                        <polygon points="200,195 215,235 230,205"/>
                        <text x="212" y="215" class="facet-letter light">A</text>
                    </g>
                    <g class="facet facet-s">
                        <polygon points="230,195 245,235 265,205"/>
                        <text x="248" y="215" class="facet-letter">S</text>
                    </g>
                </g>

                <!-- Center glow -->
                <circle cx="200" cy="200" r="25" fill="url(#sphereDepth)" opacity="0.5">
                    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
                </circle>
            </svg>
        </div>

        <!-- Click to Enter -->
        <div class="enter-hint">
            <span class="enter-text">Click to Enter</span>
            <div class="enter-arrow"></div>
        </div>
    </div>

    <!-- Version Badge -->
    <div class="version-badge">SATOR eXe v1.0.0</div>

    <script>
        // Generate starfield
        const starfield = document.getElementById('starfield');
        const starCount = 150;

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.animationDelay = `${Math.random() * 5}s`;
            star.style.animationDuration = `${3 + Math.random() * 4}s`;
            star.style.opacity = Math.random() * 0.8;
            starfield.appendChild(star);
        }

        // Add twinkle animation via JS since we're creating stars dynamically
        const style = document.createElement('style');
        style.textContent = `
            @keyframes twinkle {
                0%, 100% { opacity: 0; transform: scale(0.5); }
                50% { opacity: 1; transform: scale(1); }
            }
            .star {
                animation: twinkle var(--duration, 3s) ease-in-out infinite;
                animation-delay: var(--delay, 0s);
            }
        `;
        document.head.appendChild(style);

        // Apply random durations
        document.querySelectorAll('.star').forEach(star => {
            star.style.setProperty('--duration', `${3 + Math.random() * 4}s`);
            star.style.setProperty('--delay', `${Math.random() * 5}s`);
        });

        // Click to enter
        document.body.addEventListener('click', () => {
            const warpOverlay = document.getElementById('warpOverlay');
            warpOverlay.classList.add('active');
            
            setTimeout(() => {
                window.location.href = 'launchpad.html';
            }, 600);
        });
    </script>
</body>
</html>
