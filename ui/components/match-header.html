<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match Header Component</title>
  <link rel="stylesheet" href="../tokens.css">
  <style>
    /* Match Header Component - Dual Mode Support */
    
    .match-header {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: var(--spacing-6);
      border: 1px solid var(--border);
      transition: all var(--motion-panel-duration) var(--motion-ease);
    }
    
    .match-header--fan {
      /* VLR.gg inspired - clean, scannable */
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--spacing-8);
    }
    
    .match-header--analyst {
      /* HLTV inspired - dense, information-rich */
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: var(--spacing-6);
    }
    
    /* Team Display */
    .team-display {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-1);
    }
    
    .team-display--left {
      align-items: flex-end;
      text-align: right;
    }
    
    .team-display--right {
      align-items: flex-start;
      text-align: left;
    }
    
    .team-name {
      font-size: var(--text-sm);
      color: var(--text-muted);
      font-weight: 500;
    }
    
    .team-score {
      font-size: var(--text-4xl);
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }
    
    .match-header--analyst .team-score {
      font-size: var(--text-3xl);
    }
    
    /* Match Center Info */
    .match-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-2);
    }
    
    .vs-badge {
      background: var(--bg);
      padding: var(--spacing-3) var(--spacing-6);
      border-radius: var(--radius-md);
      font-weight: 600;
      color: var(--text-muted);
    }
    
    .match-meta {
      font-size: var(--text-xs);
      color: var(--text-muted);
      text-align: center;
    }
    
    .match-status {
      display: flex;
      align-items: center;
      gap: var(--spacing-2);
      font-size: var(--text-sm);
      font-weight: 600;
    }
    
    .match-status--live {
      color: var(--accent-valorant);
    }
    
    .live-indicator {
      width: 8px;
      height: 8px;
      background: var(--accent-valorant);
      border-radius: 50%;
      animation: pulse-live 1.5s ease-in-out infinite;
    }
    
    @keyframes pulse-live {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    
    /* Mode Toggle */
    .mode-toggle {
      position: absolute;
      top: var(--spacing-4);
      right: var(--spacing-4);
      display: flex;
      background: var(--bg);
      border-radius: var(--radius-md);
      padding: var(--spacing-1);
      gap: var(--spacing-1);
    }
    
    .mode-toggle__btn {
      padding: var(--spacing-2) var(--spacing-4);
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: var(--text-sm);
      font-weight: 500;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--motion-fast);
    }
    
    .mode-toggle__btn:hover {
      color: var(--text);
    }
    
    .mode-toggle__btn--active {
      background: var(--text);
      color: var(--surface);
    }
    
    /* Dark Mode Support */
    @media (prefers-color-scheme: dark) {
      .match-header {
        background: var(--surface-dark);
        border-color: var(--border-dark);
      }
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .match-header--fan {
        flex-direction: column;
        gap: var(--spacing-4);
      }
      
      .team-display--left,
      .team-display--right {
        align-items: center;
        text-align: center;
      }
      
      .match-header--analyst {
        grid-template-columns: 1fr;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <!-- FAN MODE (VLR.gg Style) -->
  <div class="match-header match-header--fan" style="margin-bottom: 24px; position: relative;">
    <div class="mode-toggle">
      <button class="mode-toggle__btn mode-toggle__btn--active">Fan</button>
      <button class="mode-toggle__btn">Analyst</button>
    </div>
    
    <!-- Team A -->
    <div class="team-display team-display--left">
      <span class="team-name">Natus Vincere</span>
      <span class="team-score">2</span>
    </div>
    
    <!-- Center -->
    <div class="match-center">
      <div class="match-status match-status--live">
        <span class="live-indicator"></span>
        <span>LIVE</span>
      </div>
      <div class="vs-badge">VS</div>
      <div class="match-meta">
        PGL Major Copenhagen 2024 • Grand Final • BO5
      </div>
    </div>
    
    <!-- Team B -->
    <div class="team-display team-display--right">
      <span class="team-name">FaZe Clan</span>
      <span class="team-score">1</span>
    </div>
  </div>
  
  <!-- ANALYST MODE (HLTV Style) -->
  <div class="match-header match-header--analyst" style="position: relative;">
    <div class="mode-toggle">
      <button class="mode-toggle__btn">Fan</button>
      <button class="mode-toggle__btn mode-toggle__btn--active">Analyst</button>
    </div>
    
    <!-- Team A -->
    <div class="team-display team-display--left">
      <span class="team-name">Natus Vincere</span>
      <span class="team-score">2 <span style="font-size: var(--text-sm); color: var(--text-muted);">(16-14, 13-16, 16-11)</span></span>
    </div>
    
    <!-- Center -->
    <div class="match-center">
      <div class="match-meta">PGL Major Copenhagen 2024 • Grand Final • BO5</div>
      <div class="match-status match-status--live">
        <span class="live-indicator"></span>
        <span>Map 4: Ancient • Round 28/30 • 14-13</span>
      </div>
    </div>
    
    <!-- Team B -->
    <div class="team-display team-display--right">
      <span class="team-name">FaZe Clan</span>
      <span class="team-score">1</span>
    </div>
  </div>
  
  <script>
    // Mode toggle functionality
    document.querySelectorAll('.mode-toggle__btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const parent = btn.closest('.match-header');
        const buttons = parent.querySelectorAll('.mode-toggle__btn');
        
        buttons.forEach(b => b.classList.remove('mode-toggle__btn--active'));
        btn.classList.add('mode-toggle__btn--active');
        
        // Toggle mode classes
        if (btn.textContent === 'Fan') {
          parent.classList.remove('match-header--analyst');
          parent.classList.add('match-header--fan');
        } else {
          parent.classList.remove('match-header--fan');
          parent.classList.add('match-header--analyst');
        }
      });
    });
  </script>
</body>
</html>
