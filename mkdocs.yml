site_name: SATOR Documentation
site_url: https://notbleaux.github.io/eSports-EXE
repo_url: https://github.com/notbleaux/eSports-EXE
repo_name: GitHub

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Architecture:
    - Overview: architecture/overview.md
    - API: architecture/api.md
    - Database: architecture/database.md
    - Security: architecture/security.md
  - API Reference:
    - Overview: api/index.md
    - Players: api/players.md
    - Matches: api/matches.md
    - Analytics: api/analytics.md
  - Guides:
    - Contributing: guides/contributing.md
    - Deployment: guides/deployment.md
    - AI Collaboration: guides/ai_collaboration.md
  - Reference:
    - Troubleshooting: reference/troubleshooting.md
    - FAQ: reference/faq.md