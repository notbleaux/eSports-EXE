name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # Allow Kimi agents to push changes
      deployments: write
      pull-requests: write     # Allow Kimi agents to create PRs
      issues: write            # Allow Kimi agents to create tracking issues
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: satorx-website
          directory: website
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
