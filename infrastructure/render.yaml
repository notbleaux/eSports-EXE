# [Ver003.002]
# Render.com Deployment Configuration
# SATOR API - Production Deployment
# NOTE: Using FREE TIER ONLY - No paid services

services:
  # FastAPI Backend
  - type: web
    name: sator-api
    env: python
    buildCommand: |
      echo "Installing dependencies..."
      pip install -r packages/shared/api/requirements.txt
      echo "Build complete"
    startCommand: |
      cd packages/shared/api && 
      PYTHONPATH=../../:$PYTHONPATH uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sator-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: sator-redis
          property: connectionString
      - key: APP_ENVIRONMENT
        value: production
      - key: APP_NAME
        value: SATOR-API
      - key: APP_VERSION
        value: 2.1.0
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: "https://sator-platform.vercel.app,https://sator-web.onrender.com"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: TOTP_ENCRYPTION_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: PANDASCORE_API_KEY
        sync: false  # Set manually in dashboard
      # FREE TIER: Single worker only (no multi-worker on free)
      # FREE TIER: Pool sizes optimized for free tier limits
      - key: DB_POOL_MIN_SIZE
        value: "2"
      - key: DB_POOL_MAX_SIZE
        value: "5"
      - key: PYTHONPATH
        value: "/opt/render/project/src/packages/shared"
    healthCheckPath: /health
    autoDeploy: true
    plan: free  # FREE TIER - No costs incurred

  # Redis for caching and rate limiting
  - type: redis
    name: sator-redis
    plan: free  # FREE TIER - 100MB limit, no persistence
    ipAllowList: []  # Allow all (required for Render services)

databases:
  # NOTE: Using external free database (Supabase) 
  # Render free PostgreSQL has been discontinued
  # Supabase free tier: 500MB, 2GB/month transfer
  - name: sator-db
    plan: free  # Placeholder - actual DB is Supabase
    databaseName: sator_production
    user: sator_api

# Environment group for shared variables
envVarGroups:
  - name: sator-shared
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: API_VERSION
        value: v1
      - key: DEPLOYMENT_TYPE
        value: "free-tier"
