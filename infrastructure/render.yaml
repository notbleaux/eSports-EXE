# =============================================================================
# Render.com Blueprint Configuration for SATOR Platform
# UPDATED: March 8, 2026 - Fixed paths after repository restructure
# =============================================================================
# This file enables "Infrastructure as Code" deployment to Render.com
# 
# To deploy:
# 1. Push this file to your GitHub repository
# 2. Go to https://dashboard.render.com/blueprints
# 3. Connect your repository
# 4. Render will automatically create and configure services
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # FastAPI Web Service - Core API
  # ---------------------------------------------------------------------------
  - type: web
    name: sator-api
    runtime: python
    plan: free
    region: oregon  # Closest to Supabase us-east-1 region
    
    # Build configuration - UPDATED PATH
    buildCommand: |
      cd packages/shared && \
      pip install -r requirements.txt
    
    # Start command - UPDATED PATH
    startCommand: |
      cd packages/shared/api && \
      uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    
    # Environment variables (set in Render Dashboard)
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        sync: false  # Set manually in dashboard for security
      - key: REDIS_URL
        sync: false  # Set manually in dashboard
      - key: PANDASCORE_API_KEY
        sync: false  # Set manually in dashboard
      - key: API_PORT
        value: "8000"
      - key: API_WORKERS
        value: "1"
      - key: LOG_LEVEL
        value: "INFO"
      - key: APP_ENVIRONMENT
        value: "production"
      - key: DATA_RETENTION_DAYS
        value: "365"
      - key: RATE_LIMIT_REQUESTS_PER_MINUTE
        value: "30"
      - key: PYTHONPATH
        value: "/opt/render/project/src/packages/shared"
    
    # Health check endpoint
    healthCheckPath: /health
    
    # Auto-deploy on push to main
    autoDeploy: true
    
    # Branch to deploy
    branch: main
    
    # Build filters (only deploy when these change)
    buildFilter:
      paths:
        - packages/shared/**
        - infrastructure/render.yaml
      ignoredPaths:
        - "**/*.md"
        - "**/tests/**"
        - "apps/**"
        - "docs/**"

# =============================================================================
# Environment Group (Shared across services)
# =============================================================================
envVarGroups:
  - name: sator-production
    envVars:
      - key: APP_NAME
        value: "SATOR-API"
      - key: APP_VERSION
        value: "2.0.0"
      - key: FEATURE_FLAGS_PATH
        value: "packages/shared/config/features.json"

# =============================================================================
# NOTES FOR DEPLOYMENT
# =============================================================================
# 
# 1. FIRST DEPLOY:
#    - Set DATABASE_URL in Render Dashboard before first deploy
#    - Set REDIS_URL if using caching
#    - Set PANDASCORE_API_KEY for legal data source
#
# 2. VERIFY BUILD:
#    - Check build logs for import errors
#    - Verify /health endpoint returns 200
#    - Test /api/ endpoints
#
# 3. MONITORING:
#    - Set up Logtail or similar for logs
#    - Configure alerts for 500 errors
#    - Monitor connection pool usage
#
# 4. TROUBLESHOOTING:
#    - If "Module not found": Check PYTHONPATH
#    - If DB connection fails: Verify DATABASE_URL format
#    - If workers crash: Reduce API_WORKERS to 1
#
# 5. UPDATES:
#    - This file is in infrastructure/render.yaml
#    - Push to main triggers auto-deploy
#    - Use Preview Environments for testing changes
# =============================================================================