# [Ver001.000]
# Render.com Deployment Configuration
# SATOR API - Production Deployment

services:
  # FastAPI Backend
  - type: web
    name: sator-api
    env: python
    buildCommand: |
      pip install -r packages/shared/axiom-esports-data/api/requirements.txt
    startCommand: |
      cd packages/shared/axiom_esports_data/api && 
      uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sator-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: sator-redis
          property: connectionString
      - key: APP_ENVIRONMENT
        value: production
      - key: APP_NAME
        value: SATOR-API
      - key: APP_VERSION
        value: 2.1.0
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: "https://sator-platform.vercel.app,https://sator-web.onrender.com"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PANDASCORE_API_KEY
        sync: false  # Set manually in dashboard
    healthCheckPath: /health
    autoDeploy: true
    plan: free  # Use 'starter' for paid tier

  # Redis for caching and rate limiting
  - type: redis
    name: sator-redis
    plan: free  # 100MB, no persistence on free tier
    ipAllowList: []  # Allow all (required for Render services)

databases:
  - name: sator-db
    plan: free  # 1GB storage on free tier
    databaseName: sator_production
    user: sator_api

# Environment group for shared variables
envVarGroups:
  - name: sator-shared
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: API_VERSION
        value: v1
