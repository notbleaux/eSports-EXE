<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Dropout Style Owl - 128x128 -->
  <defs>
    <linearGradient id="bodyGrad128" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9D4EDD"/>
      <stop offset="50%" style="stop-color:#7B2CBF"/>
      <stop offset="100%" style="stop-color:#5A189A"/>
    </linearGradient>
    <linearGradient id="sweaterGrad128" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9E00"/>
      <stop offset="100%" style="stop-color:#CC7000"/>
    </linearGradient>
    <linearGradient id="glassesGrad128" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <filter id="shadow128" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Body -->
  <ellipse cx="64" cy="80" rx="40" ry="36" fill="url(#bodyGrad128)" filter="url(#shadow128)"/>
  
  <!-- Sweater -->
  <path d="M24 80 Q24 112 64 112 Q104 112 104 80 L104 72 Q104 96 64 96 Q24 96 24 72 Z" fill="url(#sweaterGrad128)"/>
  
  <!-- Sweater Ribbing Detail -->
  <g opacity="0.4">
    <path d="M28 88 Q64 98 100 88" stroke="#AA5500" stroke-width="1.5" fill="none"/>
    <path d="M28 96 Q64 106 100 96" stroke="#AA5500" stroke-width="1.5" fill="none"/>
    <path d="M28 104 Q64 114 100 104" stroke="#AA5500" stroke-width="1.5" fill="none"/>
  </g>
  
  <!-- Sweater Collar -->
  <ellipse cx="64" cy="72" rx="32" ry="10" fill="#FF9E00" stroke="#CC7000" stroke-width="1"/>
  <ellipse cx="64" cy="72" rx="28" ry="8" fill="none" stroke="#E08500" stroke-width="0.5"/>
  
  <!-- Head -->
  <ellipse cx="64" cy="40" rx="36" ry="32" fill="url(#bodyGrad128)" filter="url(#shadow128)"/>
  
  <!-- Ears/Tufts -->
  <path d="M32 20 L24 8 L40 16 Z" fill="#7B2CBF"/>
  <path d="M96 20 L104 8 L88 16 Z" fill="#7B2CBF"/>
  <path d="M36 16 L32 6 L42 14 Z" fill="#9D4EDD"/>
  <path d="M92 16 L96 6 L86 14 Z" fill="#9D4EDD"/>
  
  <!-- Eyes Background -->
  <circle cx="48" cy="40" r="14" fill="#FFFFFF"/>
  <circle cx="80" cy="40" r="14" fill="#FFFFFF"/>
  
  <!-- Pupils -->
  <circle cx="48" cy="40" r="8" fill="#1A1A2E"/>
  <circle cx="80" cy="40" r="8" fill="#1A1A2E"/>
  
  <!-- Eye Highlights -->
  <circle cx="52" cy="36" r="3" fill="#FFFFFF"/>
  <circle cx="84" cy="36" r="3" fill="#FFFFFF"/>
  <circle cx="46" cy="42" r="1.5" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="78" cy="42" r="1.5" fill="#FFFFFF" opacity="0.6"/>
  
  <!-- Glasses Frame -->
  <circle cx="48" cy="40" r="16" stroke="url(#glassesGrad128)" stroke-width="2.5" fill="none"/>
  <circle cx="80" cy="40" r="16" stroke="url(#glassesGrad128)" stroke-width="2.5" fill="none"/>
  
  <!-- Glasses Bridge -->
  <path d="M64 40 Q64 32 64 32" stroke="url(#glassesGrad128)" stroke-width="2" fill="none"/>
  <line x1="64" y1="38" x2="64" y2="42" stroke="url(#glassesGrad128)" stroke-width="2"/>
  
  <!-- Glasses Temples -->
  <line x1="32" y1="40" x2="28" y2="36" stroke="url(#glassesGrad128)" stroke-width="2"/>
  <line x1="96" y1="40" x2="100" y2="36" stroke="url(#glassesGrad128)" stroke-width="2"/>
  
  <!-- Glasses Glint -->
  <path d="M40 32 Q44 28 52 32" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M72 32 Q76 28 84 32" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.7"/>
  
  <!-- Beak -->
  <path d="M60 52 L64 60 L68 52 Z" fill="#FFB347"/>
  <path d="M60 52 L64 56 L68 52 Z" fill="#FFA500"/>
  
  <!-- Thoughtful Eyebrows -->
  <path d="M36 28 Q48 24 56 28" stroke="#5A189A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M72 28 Q80 24 92 28" stroke="#5A189A" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Chest Feather Detail -->
  <g opacity="0.5">
    <path d="M56 88 Q64 92 72 88" stroke="#9D4EDD" stroke-width="2" fill="none"/>
    <path d="M56 96 Q64 100 72 96" stroke="#9D4EDD" stroke-width="2" fill="none"/>
    <path d="M56 104 Q64 108 72 104" stroke="#9D4EDD" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Wing Hints -->
  <path d="M28 72 Q24 84 28 96" stroke="#5A189A" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M100 72 Q104 84 100 96" stroke="#5A189A" stroke-width="2" fill="none" opacity="0.4"/>
</svg>