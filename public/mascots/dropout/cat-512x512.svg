<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Cat in Bunny Onesie - Dropout Style 512x512 -->
  <defs>
    <linearGradient id="catBlack512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A4A4A"/>
      <stop offset="30%" style="stop-color:#2D2D2D"/>
      <stop offset="70%" style="stop-color:#1A1A1A"/>
      <stop offset="100%" style="stop-color:#0D0D0D"/>
    </linearGradient>
    <linearGradient id="catWhite512" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="50%" style="stop-color:#F8F8F8"/>
      <stop offset="100%" style="stop-color:#F0F0F0"/>
    </linearGradient>
    <linearGradient id="onesiePink512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF85C0"/>
      <stop offset="40%" style="stop-color:#FF1493"/>
      <stop offset="100%" style="stop-color:#F72585"/>
    </linearGradient>
    <linearGradient id="eyeBlue512" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00F5FF"/>
      <stop offset="40%" style="stop-color:#00B4D8"/>
      <stop offset="100%" style="stop-color:#0077B6"/>
    </linearGradient>
    <linearGradient id="earPink512" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C1"/>
      <stop offset="100%" style="stop-color:#FF69B4"/>
    </linearGradient>
    <filter id="shadow512" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="4" stdDeviation="5" flood-opacity="0.2"/>
    </filter>
    <filter id="glow512">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Shadow -->
  <ellipse cx="256" cy="478" rx="120" ry="20" fill="#000" opacity="0.1"/>
  
  <!-- Tail peeking from onesie -->
  <g className="tail" filter="url(#shadow512)">
    <path d="M96 352 Q64 288 96 224 Q128 160 192 192 Q160 256 128 320 Q112 352 96 352Z" fill="url(#catBlack512)"/>
    <path d="M96 224 Q80 192 96 160 Q112 128 144 160" fill="none" stroke="#2D2D2D" stroke-width="6" stroke-linecap="round"/>
    <path d="M112 336 Q144 312 160 280" fill="none" stroke="#333333" stroke-width="5" opacity="0.6"/>
    <path d="M128 304 Q152 284 168 260" fill="none" stroke="#333333" stroke-width="4" opacity="0.5"/>
    <path d="M144 280 Q164 264 176 244" fill="none" stroke="#333333" stroke-width="3" opacity="0.4"/>
    <!-- Tail stripes -->
    <path d="M100 240 Q108 236 116 240" fill="none" stroke="#1A1A1A" stroke-width="3" opacity="0.5"/>
    <path d="M104 264 Q112 260 120 264" fill="none" stroke="#1A1A1A" stroke-width="3" opacity="0.5"/>
    <path d="M108 288 Q116 284 124 288" fill="none" stroke="#1A1A1A" stroke-width="3" opacity="0.5"/>
    <!-- Tail tip white -->
    <ellipse cx="104" cy="340" rx="10" ry="12" fill="#FFFFFF" opacity="0.4"/>
  </g>
  
  <!-- Onesie Body -->
  <g className="onesie" filter="url(#shadow512)">
    <ellipse cx="256" cy="352" rx="144" ry="112" fill="url(#onesiePink512)"/>
    <!-- Belly patch -->
    <ellipse cx="256" cy="368" rx="80" ry="64" fill="#FFB6C1" opacity="0.6"/>
    <!-- Belly highlight -->
    <ellipse cx="256" cy="360" rx="60" ry="40" fill="#FFC0CB" opacity="0.4"/>
    <!-- Zipper -->
    <line x1="256" y1="256" x2="256" y2="416" stroke="#D41675" stroke-width="6" stroke-dasharray="12,6"/>
    <circle cx="256" cy="248" r="20" fill="#FF1493"/>
    <circle cx="256" cy="248" r="14" fill="#FF69B4" opacity="0.5"/>
    <rect x="248" y="264" width="16" height="32" fill="#FF69B4"/>
    <!-- Zipper teeth detail -->
    <line x1="252" y1="272" x2="252" y2="408" stroke="#FFB6C1" stroke-width="2" stroke-dasharray="6,6" opacity="0.6"/>
    <line x1="260" y1="272" x2="260" y2="408" stroke="#FFB6C1" stroke-width="2" stroke-dasharray="6,6" opacity="0.6"/>
    <!-- Bottom hem -->
    <path d="M160 440 Q256 464 352 440" stroke="#D41675" stroke-width="16" fill="none"/>
    <!-- Hem stitching -->
    <line x1="176" y1="440" x2="176" y2="452" stroke="#FF1493" stroke-width="3"/>
    <line x1="208" y1="444" x2="208" y2="456" stroke="#FF1493" stroke-width="3"/>
    <line x1="256" y1="448" x2="256" y2="460" stroke="#FF1493" stroke-width="3"/>
    <line x1="304" y1="444" x2="304" y2="456" stroke="#FF1493" stroke-width="3"/>
    <line x1="336" y1="440" x2="336" y2="452" stroke="#FF1493" stroke-width="3"/>
  </g>
  
  <!-- Onesie Arms -->
  <g className="arm-left" filter="url(#shadow512)">
    <path d="M128 320 Q96 352 112 384 Q128 416 160 384" fill="url(#onesiePink512)"/>
    <!-- Cuff -->
    <rect x="116" y="368" width="32" height="20" fill="#D41675" rx="6"/>
    <!-- Paw -->
    <ellipse cx="120" cy="380" rx="20" ry="16" fill="#FFB6C1"/>
    <!-- Grey paw pads -->
    <ellipse cx="112" cy="376" rx="5" ry="4" fill="#6B7280" opacity="0.5"/>
    <ellipse cx="120" cy="384" rx="5" ry="4" fill="#6B7280" opacity="0.5"/>
    <ellipse cx="128" cy="376" rx="5" ry="4" fill="#6B7280" opacity="0.5"/>
    <ellipse cx="120" cy="370" rx="4" ry="3" fill="#6B7280" opacity="0.5"/>
  </g>
  <g className="arm-right" filter="url(#shadow512)">
    <path d="M384 320 Q416 352 400 384 Q384 416 352 384" fill="url(#onesiePink512)"/>
    <!-- Cuff -->
    <rect x="364" y="368" width="32" height="20" fill="#D41675" rx="6"/>
    <!-- Paw -->
    <ellipse cx="392" cy="380" rx="20" ry="16" fill="#FFB6C1"/>
    <!-- Grey paw pads -->
    <ellipse cx="384" cy="376" rx="5" ry="4" fill="#6B7280" opacity="0.5"/>
    <ellipse cx="392" cy="384" rx="5" ry="4" fill="#6B7280" opacity="0.5"/>
    <ellipse cx="400" cy="376" rx="5" ry="4" fill="#6B7280" opacity="0.5"/>
    <ellipse cx="392" cy="370" rx="4" ry="3" fill="#6B7280" opacity="0.5"/>
  </g>
  
  <!-- Bunny Ears (hood) -->
  <g className="bunny-ears" filter="url(#shadow512)">
    <!-- Left ear -->
    <ellipse cx="176" cy="128" rx="40" ry="96" fill="url(#onesiePink512)" transform="rotate(-6 176 128)"/>
    <ellipse cx="176" cy="128" rx="20" ry="56" fill="url(#earPink512)" transform="rotate(-6 176 128)"/>
    <!-- Inner ear shading -->
    <path d="M176 64 L168 112 L184 112Z" fill="#FF1493" opacity="0.25" transform="rotate(-6 176 128)"/>
    <ellipse cx="176" cy="176" rx="24" ry="16" fill="#FF1493" opacity="0.15" transform="rotate(-6 176 128)"/>
    <!-- Ear fold -->
    <path d="M160 144 Q176 152 192 144" fill="none" stroke="#D41675" stroke-width="3" opacity="0.4" transform="rotate(-6 176 128)"/>
    
    <!-- Right ear -->
    <ellipse cx="336" cy="128" rx="40" ry="96" fill="url(#onesiePink512)" transform="rotate(6 336 128)"/>
    <ellipse cx="336" cy="128" rx="20" ry="56" fill="url(#earPink512)" transform="rotate(6 336 128)"/>
    <!-- Inner ear shading -->
    <path d="M336 64 L328 112 L344 112Z" fill="#FF1493" opacity="0.25" transform="rotate(6 336 128)"/>
    <ellipse cx="336" cy="176" rx="24" ry="16" fill="#FF1493" opacity="0.15" transform="rotate(6 336 128)"/>
    <!-- Ear fold -->
    <path d="M320 144 Q336 152 352 144" fill="none" stroke="#D41675" stroke-width="3" opacity="0.4" transform="rotate(6 336 128)"/>
  </g>
  
  <!-- Cat Head -->
  <g className="head" filter="url(#shadow512)">
    <!-- Face base -->
    <ellipse cx="256" cy="208" rx="128" ry="112" fill="url(#catBlack512)"/>
    
    <!-- White muzzle/chest patch -->
    <ellipse cx="256" cy="256" rx="64" ry="48" fill="url(#catWhite512)"/>
    <!-- White blaze on forehead -->
    <path d="M240 128 L256 160 L272 128" fill="#FFFFFF" opacity="0.35"/>
    <ellipse cx="256" cy="144" rx="8" ry="12" fill="#FFFFFF" opacity="0.25"/>
    
    <!-- Grey markings on face -->
    <path d="M160 160 Q192 128 224 160" fill="none" stroke="#6B7280" stroke-width="7" opacity="0.6"/>
    <path d="M288 160 Q320 128 352 160" fill="none" stroke="#6B7280" stroke-width="7" opacity="0.6"/>
    
    <!-- Grey tabby stripes on forehead -->
    <path d="M224 144 L240 176 L256 144 L272 176 L288 144" fill="none" stroke="#6B7280" stroke-width="4" opacity="0.5"/>
    <path d="M232 128 L244 152 L256 128" fill="none" stroke="#6B7280" stroke-width="3" opacity="0.4"/>
    <path d="M256 128 L268 152 L280 128" fill="none" stroke="#6B7280" stroke-width="3" opacity="0.4"/>
    <!-- Extra stripes -->
    <path d="M208 176 Q256 192 304 176" fill="none" stroke="#6B7280" stroke-width="2.5" opacity="0.35"/>
    <path d="M216 192 Q256 204 296 192" fill="none" stroke="#6B7280" stroke-width="2" opacity="0.3"/>
    
    <!-- Grey markings on cheeks -->
    <ellipse cx="192" cy="224" rx="12" ry="8" fill="#6B7280" opacity="0.4"/>
    <ellipse cx="320" cy="224" rx="12" ry="8" fill="#6B7280" opacity="0.4"/>
    <!-- Whiskers base spots -->
    <ellipse cx="176" cy="240" rx="4" ry="3" fill="#6B7280" opacity="0.3"/>
    <ellipse cx="336" cy="240" rx="4" ry="3" fill="#6B7280" opacity="0.3"/>
    
    <!-- Cat Ears (peeking from hood) -->
    <path d="M160 144 L128 64 L192 128Z" fill="url(#catBlack512)"/>
    <path d="M160 112 L144 80 L176 104Z" fill="#6B7280" opacity="0.5"/>
    <path d="M352 144 L384 64 L320 128Z" fill="url(#catBlack512)"/>
    <path d="M352 112 L368 80 L336 104Z" fill="#6B7280" opacity="0.5"/>
    
    <!-- Eyes (bright blue #00B4D8, cheeky/mischievous) -->
    <g className="eye-left" filter="url(#glow512)">
      <ellipse cx="208" cy="192" rx="32" ry="40" fill="url(#eyeBlue512)"/>
      <ellipse cx="212" cy="184" rx="12" ry="16" fill="#FFF"/>
      <circle cx="216" cy="196" rx="6" fill="#000" opacity="0.3"/>
      <!-- Eye shine -->
      <ellipse cx="220" cy="180" rx="4" ry="5" fill="#FFF" opacity="0.9"/>
      <circle cx="224" cy="176" r="2" fill="#FFF" opacity="0.7"/>
    </g>
    <g className="eye-right" filter="url(#glow512)">
      <ellipse cx="304" cy="192" rx="32" ry="40" fill="url(#eyeBlue512)"/>
      <ellipse cx="300" cy="184" rx="12" ry="16" fill="#FFF"/>
      <circle cx="296" cy="196" rx="6" fill="#000" opacity="0.3"/>
      <!-- Eye shine -->
      <ellipse cx="292" cy="180" rx="4" ry="5" fill="#FFF" opacity="0.9"/>
      <circle cx="288" cy="176" r="2" fill="#FFF" opacity="0.7"/>
    </g>
    
    <!-- Cheeky eyebrows (asymmetrical for mischief) -->
    <path d="M176 152 Q208 144 232 160" fill="none" stroke="#1A1A1A" stroke-width="7" stroke-linecap="round"/>
    <path d="M280 160 Q304 144 336 152" fill="none" stroke="#1A1A1A" stroke-width="7" stroke-linecap="round"/>
    <!-- Eyebrow detail -->
    <path d="M184 156 Q208 150 224 160" fill="none" stroke="#333333" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <path d="M288 160 Q304 150 328 156" fill="none" stroke="#333333" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    
    <!-- Nose -->
    <ellipse cx="256" cy="240" rx="16" ry="12" fill="#FF69B4"/>
    <ellipse cx="248" cy="236" rx="5" ry="3" fill="#FFF" opacity="0.5"/>
    <!-- Nose shine -->
    <ellipse cx="260" cy="234" rx="3" ry="2" fill="#FFB6C1" opacity="0.8"/>
    
    <!-- Cheeky smile (crooked, mischievous) -->
    <path d="M224 264 Q256 288 288 256" fill="none" stroke="#1A1A1A" stroke-width="7" stroke-linecap="round"/>
    <path d="M280 252 L288 256 L284 268" fill="none" stroke="#1A1A1A" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Whiskers -->
    <line x1="160" y1="240" x2="112" y2="232" stroke="#FFF" stroke-width="2.5" opacity="0.8"/>
    <line x1="160" y1="256" x2="112" y2="256" stroke="#FFF" stroke-width="2.5" opacity="0.8"/>
    <line x1="160" y1="272" x2="112" y2="280" stroke="#FFF" stroke-width="2.5" opacity="0.8"/>
    <line x1="352" y1="240" x2="400" y2="232" stroke="#FFF" stroke-width="2.5" opacity="0.8"/>
    <line x1="352" y1="256" x2="400" y2="256" stroke="#FFF" stroke-width="2.5" opacity="0.8"/>
    <line x1="352" y1="272" x2="400" y2="280" stroke="#FFF" stroke-width="2.5" opacity="0.8"/>
    <!-- Extra whisker -->
    <line x1="164" y1="248" x2="120" y2="244" stroke="#FFF" stroke-width="2" opacity="0.6"/>
    <line x1="348" y1="248" x2="392" y2="244" stroke="#FFF" stroke-width="2" opacity="0.6"/>
    
    <!-- Tiny fang peeking -->
    <path d="M284 272 L288 280 L292 272" fill="#FFFFFF" opacity="0.95"/>
    <path d="M220 276 L224 284 L228 276" fill="#FFFFFF" opacity="0.7"/>
    
    <!-- Mischievous glint -->
    <ellipse cx="280" cy="200" rx="4" ry="6" fill="#00E5FF" opacity="0.4"/>
  </g>
</svg>