<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Dropout Style Owl - 32x32 -->
  <defs>
    <linearGradient id="bodyGrad32" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9D4EDD"/>
      <stop offset="100%" style="stop-color:#7B2CBF"/>
    </linearGradient>
    <linearGradient id="sweaterGrad32" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9E00"/>
      <stop offset="100%" style="stop-color:#E08500"/>
    </linearGradient>
  </defs>
  
  <!-- Body -->
  <ellipse cx="16" cy="20" rx="10" ry="9" fill="url(#bodyGrad32)"/>
  
  <!-- Sweater -->
  <path d="M6 20 Q6 28 16 28 Q26 28 26 20 L26 18 Q26 24 16 24 Q6 24 6 18 Z" fill="url(#sweaterGrad32)"/>
  
  <!-- Sweater Texture Lines -->
  <path d="M8 22 Q16 25 24 22" stroke="#CC7000" stroke-width="0.5" fill="none" opacity="0.5"/>
  <path d="M8 24 Q16 27 24 24" stroke="#CC7000" stroke-width="0.5" fill="none" opacity="0.5"/>
  
  <!-- Head -->
  <ellipse cx="16" cy="10" rx="9" ry="8" fill="url(#bodyGrad32)"/>
  
  <!-- Ears/Tufts -->
  <path d="M8 5 L6 2 L10 4 Z" fill="#7B2CBF"/>
  <path d="M24 5 L26 2 L22 4 Z" fill="#7B2CBF"/>
  
  <!-- Eyes Background -->
  <circle cx="12" cy="10" r="3.5" fill="#FFFFFF"/>
  <circle cx="20" cy="10" r="3.5" fill="#FFFFFF"/>
  
  <!-- Pupils -->
  <circle cx="12" cy="10" r="2" fill="#1A1A2E"/>
  <circle cx="20" cy="10" r="2" fill="#1A1A2E"/>
  
  <!-- Eye Highlights -->
  <circle cx="13" cy="9" r="0.8" fill="#FFFFFF"/>
  <circle cx="21" cy="9" r="0.8" fill="#FFFFFF"/>
  
  <!-- Glasses Frame -->
  <circle cx="12" cy="10" r="4" stroke="#FFD700" stroke-width="0.8" fill="none"/>
  <circle cx="20" cy="10" r="4" stroke="#FFD700" stroke-width="0.8" fill="none"/>
  <line x1="16" y1="10" x2="16" y2="10" stroke="#FFD700" stroke-width="0.8"/>
  
  <!-- Glasses Bridge -->
  <path d="M16 10 Q16 8.5 16 8.5" stroke="#FFD700" stroke-width="0.6" fill="none"/>
  
  <!-- Beak -->
  <path d="M15 13 L16 15 L17 13 Z" fill="#FFB347"/>
  
  <!-- Thoughtful Eyebrows -->
  <path d="M9 7 Q12 6 14 7" stroke="#5A189A" stroke-width="0.6" fill="none"/>
  <path d="M18 7 Q20 6 23 7" stroke="#5A189A" stroke-width="0.6" fill="none"/>
</svg>