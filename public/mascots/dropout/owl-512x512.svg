<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Dropout Style Owl - 512x512 -->
  <defs>
    <linearGradient id="bodyGrad512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9D4EDD"/>
      <stop offset="30%" style="stop-color:#7B2CBF"/>
      <stop offset="70%" style="stop-color:#5A189A"/>
      <stop offset="100%" style="stop-color:#3C096C"/>
    </linearGradient>
    <linearGradient id="sweaterGrad512" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB347"/>
      <stop offset="40%" style="stop-color:#FF9E00"/>
      <stop offset="70%" style="stop-color:#E08500"/>
      <stop offset="100%" style="stop-color:#CC7000"/>
    </linearGradient>
    <linearGradient id="glassesGrad512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8DC"/>
      <stop offset="20%" style="stop-color:#FFD700"/>
      <stop offset="45%" style="stop-color:#FFA500"/>
      <stop offset="55%" style="stop-color:#FFA500"/>
      <stop offset="80%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFF8DC"/>
    </linearGradient>
    <filter id="shadow512" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="5" dy="8" stdDeviation="6" flood-opacity="0.35"/>
    </filter>
    <filter id="glint512" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Body -->
  <ellipse cx="256" cy="320" rx="160" ry="144" fill="url(#bodyGrad512)" filter="url(#shadow512)"/>
  
  <!-- Body Texture Layers -->
  <ellipse cx="256" cy="320" rx="140" ry="120" fill="none" stroke="#5A189A" stroke-width="2" opacity="0.2"/>
  <ellipse cx="256" cy="320" rx="110" ry="96" fill="none" stroke="#9D4EDD" stroke-width="1" opacity="0.25"/>
  <ellipse cx="256" cy="320" rx="80" ry="72" fill="none" stroke="#7B2CBF" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Sweater -->
  <path d="M96 320 Q96 448 256 448 Q416 448 416 320 L416 288 Q416 384 256 384 Q96 384 96 288 Z" fill="url(#sweaterGrad512)"/>
  
  <!-- Sweater Ribbing Detail -->
  <g opacity="0.3">
    <path d="M112 352 Q256 392 400 352" stroke="#8B4513" stroke-width="3" fill="none"/>
    <path d="M112 384 Q256 424 400 384" stroke="#8B4513" stroke-width="3" fill="none"/>
    <path d="M112 416 Q256 456 400 416" stroke="#8B4513" stroke-width="3" fill="none"/>
  </g>
  
  <!-- Sweater Cable Knit Pattern -->
  <g opacity="0.2">
    <path d="M128 336 Q136 344 128 352 M144 340 Q152 348 144 356 M160 344 Q168 352 160 360" stroke="#8B4513" stroke-width="2"/>
    <path d="M384 336 Q376 344 384 352 M368 340 Q360 348 368 356 M352 344 Q344 352 352 360" stroke="#8B4513" stroke-width="2"/>
  </g>
  
  <!-- Sweater Collar -->
  <ellipse cx="256" cy="288" rx="128" ry="40" fill="#FF9E00" stroke="#CC7000" stroke-width="3"/>
  <ellipse cx="256" cy="288" rx="112" ry="32" fill="none" stroke="#E08500" stroke-width="2"/>
  <ellipse cx="256" cy="288" rx="96" ry="24" fill="none" stroke="#CC7000" stroke-width="1" opacity="0.5"/>
  <ellipse cx="256" cy="288" rx="80" ry="16" fill="none" stroke="#AA5500" stroke-width="0.5" opacity="0.4"/>
  
  <!-- Head -->
  <ellipse cx="256" cy="160" rx="144" ry="128" fill="url(#bodyGrad512)" filter="url(#shadow512)"/>
  
  <!-- Head Highlights -->
  <ellipse cx="224" cy="112" rx="60" ry="40" fill="#9D4EDD" opacity="0.25"/>
  <ellipse cx="288" cy="120" rx="40" ry="30" fill="#7B2CBF" opacity="0.2"/>
  
  <!-- Ears/Tufts -->
  <path d="M128 80 L96 32 L160 64 Z" fill="#7B2CBF"/>
  <path d="M384 80 L416 32 L352 64 Z" fill="#7B2CBF"/>
  <path d="M144 64 L128 24 L168 56 Z" fill="#9D4EDD"/>
  <path d="M368 64 L384 24 L344 56 Z" fill="#9D4EDD"/>
  <path d="M136 56 L120 16 L152 48 Z" fill="#5A189A"/>
  <path d="M376 56 L392 16 L360 48 Z" fill="#5A189A"/>
  <path d="M152 48 L144 20 L168 44 Z" fill="#3C096C"/>
  <path d="M360 48 L368 20 L344 44 Z" fill="#3C096C"/>
  
  <!-- Face Disc -->
  <ellipse cx="256" cy="168" rx="120" ry="96" fill="#7B2CBF" opacity="0.25"/>
  <ellipse cx="256" cy="172" rx="100" ry="80" fill="#9D4EDD" opacity="0.15"/>
  
  <!-- Eyes Background -->
  <circle cx="192" cy="160" r="56" fill="#FFFFFF"/>
  <circle cx="320" cy="160" r="56" fill="#FFFFFF"/>
  
  <!-- Eye Shadows -->
  <ellipse cx="192" cy="216" rx="40" ry="16" fill="#5A189A" opacity="0.1"/>
  <ellipse cx="320" cy="216" rx="40" ry="16" fill="#5A189A" opacity="0.1"/>
  
  <!-- Pupils -->
  <circle cx="192" cy="160" r="32" fill="#1A1A2E"/>
  <circle cx="320" cy="160" r="32" fill="#1A1A2E"/>
  
  <!-- Pupil Details -->
  <circle cx="184" cy="152" r="10" fill="#33334D"/>
  <circle cx="312" cy="152" r="10" fill="#33334D"/>
  
  <!-- Eye Highlights -->
  <circle cx="208" cy="144" r="12" fill="#FFFFFF"/>
  <circle cx="336" cy="144" r="12" fill="#FFFFFF"/>
  <circle cx="184" cy="168" r="6" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="312" cy="168" r="6" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="200" cy="176" r="3" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="328" cy="176" r="3" fill="#FFFFFF" opacity="0.5"/>
  
  <!-- Glasses Frame -->
  <circle cx="192" cy="160" r="64" stroke="url(#glassesGrad512)" stroke-width="6" fill="none"/>
  <circle cx="320" cy="160" r="64" stroke="url(#glassesGrad512)" stroke-width="6" fill="none"/>
  
  <!-- Glasses Bridge -->
  <path d="M256 160 Q256 128 256 128" stroke="url(#glassesGrad512)" stroke-width="4" fill="none"/>
  <line x1="256" y1="152" x2="256" y2="168" stroke="url(#glassesGrad512)" stroke-width="4"/>
  
  <!-- Glasses Temples -->
  <line x1="128" y1="160" x2="112" y2="144" stroke="url(#glassesGrad512)" stroke-width="4"/>
  <line x1="384" y1="160" x2="400" y2="144" stroke="url(#glassesGrad512)" stroke-width="4"/>
  
  <!-- Glasses Glint -->
  <g filter="url(#glint512)">
    <path d="M152 128 Q176 112 208 128" stroke="#FFFFFF" stroke-width="5" fill="none" opacity="0.9"/>
    <path d="M280 128 Q304 112 336 128" stroke="#FFFFFF" stroke-width="5" fill="none" opacity="0.9"/>
    <path d="M160 136 Q180 124 200 136" stroke="#FFFFFF" stroke-width="3" fill="none" opacity="0.6"/>
    <path d="M288 136 Q308 124 328 136" stroke="#FFFFFF" stroke-width="3" fill="none" opacity="0.6"/>
  </g>
  
  <!-- Frame Detail Lines -->
  <circle cx="192" cy="160" r="56" stroke="#B8860B" stroke-width="1.5" fill="none" opacity="0.4"/>
  <circle cx="320" cy="160" r="56" stroke="#B8860B" stroke-width="1.5" fill="none" opacity="0.4"/>
  <circle cx="192" cy="160" r="48" stroke="#DAA520" stroke-width="0.5" fill="none" opacity="0.3"/>
  <circle cx="320" cy="160" r="48" stroke="#DAA520" stroke-width="0.5" fill="none" opacity="0.3"/>
  
  <!-- Beak -->
  <path d="M240 208 L256 240 L272 208 Z" fill="#FFB347"/>
  <path d="M240 208 L256 224 L272 208 Z" fill="#FFA500"/>
  <path d="M248 216 L256 228 L264 216 Z" fill="#FF8C00"/>
  
  <!-- Beak Highlights -->
  <path d="M248 212 L256 220 L264 212" stroke="#FFE4B5" stroke-width="2" fill="none"/>
  <path d="M252 224 L256 232 L260 224" stroke="#FFD700" stroke-width="1" fill="none" opacity="0.7"/>
  
  <!-- Thoughtful Eyebrows -->
  <path d="M144 112 Q192 96 224 112" stroke="#5A189A" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M288 112 Q320 96 368 112" stroke="#5A189A" stroke-width="5" fill="none" stroke-linecap="round"/>
  
  <!-- Eyebrow Detail -->
  <path d="M152 108 Q192 94 216 108" stroke="#7B2CBF" stroke-width="2.5" fill="none" opacity="0.5"/>
  <path d="M296 108 Q320 94 360 108" stroke="#7B2CBF" stroke-width="2.5" fill="none" opacity="0.5"/>
  
  <!-- Feather Tufts on Head -->
  <path d="M200 64 Q192 72 196 80" stroke="#9D4EDD" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M256 56 Q256 68 256 76" stroke="#9D4EDD" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M312 64 Q320 72 316 80" stroke="#9D4EDD" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- Chest Feather Detail -->
  <g opacity="0.35">
    <path d="M224 352 Q256 368 288 352" stroke="#9D4EDD" stroke-width="4" fill="none"/>
    <path d="M224 384 Q256 400 288 384" stroke="#9D4EDD" stroke-width="4" fill="none"/>
    <path d="M224 416 Q256 432 288 416" stroke="#9D4EDD" stroke-width="4" fill="none"/>
  </g>
  
  <!-- Wing Hints -->
  <path d="M112 288 Q96 336 112 384" stroke="#5A189A" stroke-width="4" fill="none" opacity="0.25"/>
  <path d="M400 288 Q416 336 400 384" stroke="#5A189A" stroke-width="4" fill="none" opacity="0.25"/>
  
  <!-- Wing Detail -->
  <path d="M120 304 Q108 336 120 368" stroke="#7B2CBF" stroke-width="3" fill="none" opacity="0.35"/>
  <path d="M392 304 Q404 336 392 368" stroke="#7B2CBF" stroke-width="3" fill="none" opacity="0.35"/>
  <path d="M128 320 Q120 336 128 352" stroke="#9D4EDD" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M384 320 Q392 336 384 352" stroke="#9D4EDD" stroke-width="2" fill="none" opacity="0.4"/>
</svg>