<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Dropout Style Hawk - 64x64 -->
  <defs>
    <linearGradient id="dropoutBody64" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D00000"/>
      <stop offset="50%" style="stop-color:#9D0208"/>
      <stop offset="100%" style="stop-color:#6A040F"/>
    </linearGradient>
    <linearGradient id="jacket64" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6A040F"/>
      <stop offset="50%" style="stop-color:#4A040F"/>
      <stop offset="100%" style="stop-color:#370617"/>
    </linearGradient>
    <linearGradient id="goldAccent64" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFBA08"/>
      <stop offset="50%" style="stop-color:#FAA307"/>
      <stop offset="100%" style="stop-color:#E85D04"/>
    </linearGradient>
  </defs>
  
  <!-- Body -->
  <ellipse cx="32" cy="40" rx="14" ry="16" fill="url(#dropoutBody64)"/>
  
  <!-- Aviator Jacket -->
  <path d="M20 36 Q32 32 44 36 L44 52 Q32 56 20 52 Z" fill="url(#jacket64)"/>
  <path d="M20 36 L20 52 M44 36 L44 52" stroke="url(#goldAccent64)" stroke-width="1.5" fill="none"/>
  
  <!-- Jacket Collar -->
  <path d="M20 36 Q26 40 32 38 Q38 40 44 36" stroke="url(#goldAccent64)" stroke-width="1" fill="none"/>
  
  <!-- Zipper line -->
  <line x1="32" y1="38" x2="32" y2="54" stroke="#FAA307" stroke-width="0.8" stroke-dasharray="2,1"/>
  
  <!-- Head -->
  <ellipse cx="32" cy="20" rx="10" ry="8" fill="url(#dropoutBody64)"/>
  
  <!-- Feather details on head -->
  <path d="M24 16 Q28 14 30 18" stroke="#9D0208" stroke-width="0.5" fill="none"/>
  <path d="M40 16 Q36 14 34 18" stroke="#9D0208" stroke-width="0.5" fill="none"/>
  
  <!-- Sharp Beak -->
  <path d="M40 17 L50 20 L40 24 Z" fill="url(#goldAccent64)"/>
  <path d="M40 17 L50 20 L40 24" stroke="#E85D04" stroke-width="0.5" fill="none"/>
  
  <!-- Beak shine -->
  <path d="M42 19 L46 20 L42 21" fill="#FFD60A"/>
  
  <!-- Intense Eyes with white sclera -->
  <ellipse cx="28" cy="18" rx="4" ry="3" fill="#FFFFFF"/>
  <ellipse cx="36" cy="18" rx="4" ry="3" fill="#FFFFFF"/>
  
  <!-- Pupils -->
  <ellipse cx="29" cy="18" rx="2.5" ry="2" fill="#000000"/>
  <ellipse cx="37" cy="18" rx="2.5" ry="2" fill="#000000"/>
  
  <!-- Eye highlights -->
  <circle cx="30" cy="17" r="1" fill="#FFFFFF"/>
  <circle cx="38" cy="17" r="1" fill="#FFFFFF"/>
  
  <!-- Sharp Angled Brow -->
  <path d="M22 14 L27 17" stroke="#370617" stroke-width="2" stroke-linecap="round"/>
  <path d="M42 14 L37 17" stroke="#370617" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Wing details (folded) -->
  <path d="M18 38 L12 48 L18 44" fill="#9D0208"/>
  <path d="M46 38 L52 48 L46 44" fill="#9D0208"/>
  
  <!-- Wing accents -->
  <path d="M15 42 L14 46" stroke="#FAA307" stroke-width="1"/>
  <path d="M49 42 L50 46" stroke="#FAA307" stroke-width="1"/>
  
  <!-- Jacket pockets -->
  <rect x="23" y="42" width="4" height="5" rx="1" fill="none" stroke="#FAA307" stroke-width="0.5"/>
  <rect x="37" y="42" width="4" height="5" rx="1" fill="none" stroke="#FAA307" stroke-width="0.5"/>
</svg>