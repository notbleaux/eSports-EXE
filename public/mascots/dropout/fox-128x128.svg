<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="foxOrange128" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F48C06"/>
      <stop offset="100%" style="stop-color:#E85D04"/>
    </linearGradient>
    <linearGradient id="jacketBurgundy128" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6A040F"/>
      <stop offset="100%" style="stop-color:#370617"/>
    </linearGradient>
    <linearGradient id="goldAccent128" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD60A"/>
      <stop offset="100%" style="stop-color:#FFC300"/>
    </linearGradient>
    <filter id="shadow128" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Shadow -->
  <ellipse cx="64" cy="118" rx="30" ry="6" fill="#000" opacity="0.15"/>
  
  <!-- Tail -->
  <g filter="url(#shadow128)">
    <path d="M24 80 Q16 64 24 48 Q32 32 48 40 Q40 56 32 72 Q28 80 24 80Z" fill="url(#foxOrange128)"/>
    <path d="M24 48 Q20 40 24 32 Q28 24 36 32" fill="none" stroke="#F48C06" stroke-width="2"/>
    <path d="M28 76 Q36 72 40 64" fill="none" stroke="#FAA307" stroke-width="1.5"/>
    <path d="M32 68 Q38 64 42 58" fill="none" stroke="#FAA307" stroke-width="1"/>
  </g>
  
  <!-- Body/Jacket -->
  <g filter="url(#shadow128)">
    <path d="M40 72 Q40 56 56 52 Q72 48 88 56 Q96 64 96 80 Q96 104 80 112 Q64 120 48 112 Q40 104 40 88 Q40 80 40 72Z" fill="url(#jacketBurgundy128)"/>
    
    <!-- Jacket Details -->
    <path d="M56 64 L56 96" stroke="#9D0208" stroke-width="2"/>
    <path d="M72 64 L72 96" stroke="#9D0208" stroke-width="2"/>
    <rect x="60" y="72" width="8" height="8" fill="url(#goldAccent128)" rx="1"/>
    
    <!-- Zipper -->
    <line x1="64" y1="64" x2="64" y2="100" stroke="#FFD60A" stroke-width="1" stroke-dasharray="3,2"/>
    <circle cx="64" cy="62" r="3" fill="#FFC300"/>
    
    <!-- Jacket Collar -->
    <path d="M48 56 L56 64 L72 64 L80 56" fill="none" stroke="#9D0208" stroke-width="3"/>
    <path d="M52 60 Q64 68 76 60" fill="#6A040F"/>
    
    <!-- Jacket Ribbing -->
    <path d="M44 104 Q64 112 84 104" stroke="#6A040F" stroke-width="4" fill="none"/>
    <line x1="48" y1="104" x2="48" y2="108" stroke="#9D0208" stroke-width="1"/>
    <line x1="56" y1="106" x2="56" y2="110" stroke="#9D0208" stroke-width="1"/>
    <line x1="64" y1="107" x2="64" y2="111" stroke="#9D0208" stroke-width="1"/>
    <line x1="72" y1="106" x2="72" y2="110" stroke="#9D0208" stroke-width="1"/>
    <line x1="80" y1="104" x2="80" y2="108" stroke="#9D0208" stroke-width="1"/>
  </g>
  
  <!-- Head -->
  <g filter="url(#shadow128)">
    <ellipse cx="64" cy="40" rx="24" ry="20" fill="url(#foxOrange128)"/>
    
    <!-- Cheeks -->
    <ellipse cx="44" cy="44" rx="6" ry="4" fill="#FFBA08" opacity="0.6"/>
    <ellipse cx="84" cy="44" rx="6" ry="4" fill="#FFBA08" opacity="0.6"/>
    
    <!-- Ears -->
    <path d="M44 28 L40 12 L52 24Z" fill="url(#foxOrange128)"/>
    <path d="M44 20 L44 16 L48 20Z" fill="#370617"/>
    <path d="M84 28 L88 12 L76 24Z" fill="url(#foxOrange128)"/>
    <path d="M84 20 L84 16 L80 20Z" fill="#370617"/>
    
    <!-- Snout -->
    <ellipse cx="64" cy="48" rx="10" ry="6" fill="#FFBA08"/>
    <ellipse cx="64" cy="46" rx="4" ry="3" fill="#370617"/>
    <line x1="64" y1="49" x2="64" y2="52" stroke="#370617" stroke-width="1"/>
    
    <!-- Mouth (confident smirk) -->
    <path d="M56 52 Q64 56 72 50" fill="none" stroke="#370617" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M70 49 L72 50 L71 52" fill="none" stroke="#370617" stroke-width="1"/>
    
    <!-- Eyes (clever expression) -->
    <ellipse cx="54" cy="38" rx="5" ry="6" fill="#FFF"/>
    <ellipse cx="55" cy="38" rx="2.5" ry="3.5" fill="#370617"/>
    <circle cx="56" cy="37" r="1" fill="#FFF"/>
    <ellipse cx="74" cy="38" rx="5" ry="6" fill="#FFF"/>
    <ellipse cx="73" cy="38" rx="2.5" ry="3.5" fill="#370617"/>
    <circle cx="72" cy="37" r="1" fill="#FFF"/>
    
    <!-- Eyebrows (confident) -->
    <path d="M48 30 Q54 28 60 30" stroke="#370617" stroke-width="1.5" fill="none"/>
    <path d="M68 30 Q74 28 80 30" stroke="#370617" stroke-width="1.5" fill="none"/>
    
    <!-- Nose shine -->
    <ellipse cx="62" cy="45" rx="1" ry="0.8" fill="#FFF" opacity="0.5"/>
  </g>
  
  <!-- Arms -->
  <g filter="url(#shadow128)">
    <path d="M40 80 Q32 88 36 96 Q40 104 48 96" fill="url(#jacketBurgundy128)"/>
    <path d="M96 80 Q104 88 100 96 Q96 104 88 96" fill="url(#jacketBurgundy128)"/>
    
    <!-- Jacket Cuffs -->
    <rect x="38" y="92" width="10" height="6" fill="#6A040F" rx="2"/>
    <rect x="80" y="92" width="10" height="6" fill="#6A040F" rx="2"/>
    
    <!-- Jacket Emblem -->
    <circle cx="80" cy="76" r="6" fill="url(#goldAccent128)"/>
    <text x="80" y="79" font-size="6" text-anchor="middle" fill="#370617" font-weight="bold">F</text>
    
    <!-- Jacket Pockets -->
    <path d="M48 84 L52 84 L52 92 L48 92Z" fill="#6A040F"/>
    <path d="M76 84 L80 84 L80 92 L76 92Z" fill="#6A040F"/>
  </g>
</svg>