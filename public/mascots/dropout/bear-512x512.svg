<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bearBrown512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A0522D"/>
      <stop offset="30%" style="stop-color:#8B4513"/>
      <stop offset="70%" style="stop-color:#654321"/>
      <stop offset="100%" style="stop-color:#4A3018"/>
    </linearGradient>
    <linearGradient id="bearJacket512" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DC143C"/>
      <stop offset="40%" style="stop-color:#B22222"/>
      <stop offset="100%" style="stop-color:#8B0000"/>
    </linearGradient>
    <linearGradient id="goldAccent512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFC125"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
    <filter id="shadow512" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Shadow -->
  <ellipse cx="256" cy="480" rx="100" ry="20" fill="#000" opacity="0.1"/>
  
  <!-- Ears -->
  <g filter="url(#shadow512)">
    <circle cx="160" cy="128" r="64" fill="url(#bearBrown512)"/>
    <circle cx="352" cy="128" r="64" fill="url(#bearBrown512)"/>
    <circle cx="160" cy="128" r="32" fill="#CD853F"/>
    <circle cx="352" cy="128" r="32" fill="#CD853F"/>
  </g>
  
  <!-- Head -->
  <g filter="url(#shadow512)">
    <ellipse cx="256" cy="192" rx="128" ry="112" fill="url(#bearBrown512)"/>
    
    <!-- Forehead highlight -->
    <ellipse cx="224" cy="152" rx="40" ry="24" fill="#FFF" opacity="0.08"/>
    <ellipse cx="288" cy="148" rx="24" ry="16" fill="#FFF" opacity="0.05"/>
  </g>
  
  <!-- Snout -->
  <g filter="url(#shadow512)">
    <ellipse cx="256" cy="224" rx="64" ry="48" fill="#DEB887"/>
    <ellipse cx="256" cy="208" rx="24" ry="20" fill="#333"/>
    <ellipse cx="248" cy="200" rx="8" ry="6" fill="#FFF" opacity="0.3"/>
    
    <!-- Nose shine -->
    <ellipse cx="248" cy="200" rx="4" ry="3" fill="#FFF" opacity="0.6"/>
    <ellipse cx="252" cy="198" rx="2" ry="1.5" fill="#FFF" opacity="0.8"/>
  </g>
  
  <!-- Mouth -->
  <path d="M224 248 Q256 272 288 248" fill="none" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <path d="M280 242 L288 248 L282 256" fill="none" stroke="#333" stroke-width="3"/>
  
  <!-- Eyes -->
  <g filter="url(#shadow512)">
    <ellipse cx="208" cy="176" rx="24" ry="28" fill="#FFF"/>
    <ellipse cx="212" cy="176" rx="12" ry="16" fill="#333"/>
    <circle cx="216" cy="172" r="5" fill="#FFF"/>
    <circle cx="218" cy="170" r="2.5" fill="#FFF"/>
    
    <ellipse cx="304" cy="176" rx="24" ry="28" fill="#FFF"/>
    <ellipse cx="300" cy="176" rx="12" ry="16" fill="#333"/>
    <circle cx="296" cy="172" r="5" fill="#FFF"/>
    <circle cx="294" cy="170" r="2.5" fill="#FFF"/>
  </g>
  
  <!-- Eyebrows -->
  <path d="M184 152 Q208 144 232 152" stroke="#333" stroke-width="5" fill="none"/>
  <path d="M280 152 Q304 144 328 152" stroke="#333" stroke-width="5" fill="none"/>
  
  <!-- Graduation Cap -->
  <g filter="url(#shadow512)">
    <!-- Cap base -->
    <rect x="160" y="64" width="192" height="48" fill="#1a1a2e" rx="4"/>
    <rect x="160" y="64" width="192" height="12" fill="#16213e"/>
    
    <!-- Cap top -->
    <path d="M176 64 L256 32 L336 64" fill="#1a1a2e"/>
    <rect x="176" y="64" width="160" height="8" fill="#16213e"/>
    
    <!-- Cap button -->
    <circle cx="336" cy="80" r="12" fill="url(#goldAccent512)"/>
    
    <!-- Tassel -->
    <line x1="336" y1="80" x2="352" y2="128" stroke="#FFD700" stroke-width="4"/>
    <circle cx="352" cy="128" r="6" fill="#FFD700"/>
    <line x1="352" y1="128" x2="348" y2="144" stroke="#FFD700" stroke-width="2"/>
    <line x1="352" y1="128" x2="356" y2="144" stroke="#FFD700" stroke-width="2"/>
    <line x1="352" y1="128" x2="352" y2="148" stroke="#FFD700" stroke-width="2"/>
  </g>
  
  <!-- Body/Jacket -->
  <g filter="url(#shadow512)">
    <path d="M160 288 Q160 240 256 224 Q352 240 352 288 Q352 416 256 448 Q160 416 160 288Z" fill="url(#bearJacket512)"/>
    
    <!-- Jacket texture -->
    <path d="M160 288 Q160 240 256 224 Q352 240 352 288 Q352 416 256 448 Q160 416 160 288Z" fill="url(#bearJacket512)" opacity="0.3"/>
    
    <!-- Jacket panels -->
    <path d="M256 256 L256 416" stroke="#8B0000" stroke-width="6"/>
    <path d="M192 272 L192 384" stroke="#8B0000" stroke-width="3" opacity="0.5"/>
    <path d="M320 272 L320 384" stroke="#8B0000" stroke-width="3" opacity="0.5"/>
    
    <!-- Jacket zipper -->
    <line x1="256" y1="256" x2="256" y2="416" stroke="#FFD700" stroke-width="3" stroke-dasharray="8,4"/>
    <circle cx="256" cy="248" r="16" fill="url(#goldAccent512)"/>
    <rect x="248" y="264" width="16" height="24" fill="#FFD700"/>
  </g>
  
  <!-- Jacket Collar -->
  <path d="M192 240 L224 256 L288 256 L320 240" fill="none" stroke="#8B0000" stroke-width="8"/>
  <path d="M208 248 L224 256 L288 256 L304 248" fill="#B22222"/>
  
  <!-- Arms -->
  <g filter="url(#shadow512)">
    <path d="M160 320 Q128 352 144 384 Q160 416 192 384" fill="url(#bearJacket512)"/>
    <path d="M352 320 Q384 352 368 384 Q352 416 320 384" fill="url(#bearJacket512)"/>
    
    <!-- Cuffs -->
    <rect x="152" y="368" width="40" height="24" fill="#8B0000" rx="4"/>
    <rect x="320" y="368" width="40" height="24" fill="#8B0000" rx="4"/>
    
    <!-- Paws -->
    <circle cx="160" cy="400" r="20" fill="#8B4513"/>
    <circle cx="352" cy="400" r="20" fill="#8B4513"/>
  </g>
  
  <!-- Emblem -->
  <circle cx="320" cy="304" r="24" fill="url(#goldAccent512)"/>
  <text x="320" y="312" font-size="24" text-anchor="middle" fill="#8B0000" font-weight="bold">D</text>
</svg>