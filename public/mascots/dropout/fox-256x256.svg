<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="foxOrange256" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F48C06"/>
      <stop offset="50%" style="stop-color:#FAA307"/>
      <stop offset="100%" style="stop-color:#E85D04"/>
    </linearGradient>
    <linearGradient id="jacketBurgundy256" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9D0208"/>
      <stop offset="50%" style="stop-color:#6A040F"/>
      <stop offset="100%" style="stop-color:#370617"/>
    </linearGradient>
    <linearGradient id="goldAccent256" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD60A"/>
      <stop offset="100%" style="stop-color:#FFC300"/>
    </linearGradient>
    <filter id="shadow256" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
    <filter id="glow256">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Shadow -->
  <ellipse cx="128" cy="238" rx="60" ry="12" fill="#000" opacity="0.12"/>
  
  <!-- Tail -->
  <g filter="url(#shadow256)">
    <path d="M48 160 Q32 128 48 96 Q64 64 96 80 Q80 112 64 144 Q56 160 48 160Z" fill="url(#foxOrange256)"/>
    <path d="M48 96 Q40 80 48 64 Q56 48 72 64" fill="none" stroke="#F48C06" stroke-width="3"/>
    <path d="M56 152 Q72 144 80 128" fill="none" stroke="#FAA307" stroke-width="2.5"/>
    <path d="M64 136 Q76 128 84 116" fill="none" stroke="#FAA307" stroke-width="2"/>
    <path d="M72 120 Q82 114 88 104" fill="none" stroke="#FAA307" stroke-width="1.5"/>
    <!-- Tail tip -->
    <ellipse cx="52" cy="156" rx="6" ry="8" fill="#FFF" opacity="0.3"/>
  </g>
  
  <!-- Body/Jacket -->
  <g filter="url(#shadow256)">
    <path d="M80 144 Q80 112 112 104 Q144 96 176 112 Q192 128 192 160 Q192 208 160 224 Q128 240 96 224 Q80 208 80 176 Q80 160 80 144Z" fill="url(#jacketBurgundy256)"/>
    
    <!-- Jacket Details -->
    <path d="M112 128 L112 192" stroke="#9D0208" stroke-width="3"/>
    <path d="M144 128 L144 192" stroke="#9D0208" stroke-width="3"/>
    <rect x="120" y="144" width="16" height="16" fill="url(#goldAccent256)" rx="2"/>
    
    <!-- Zipper -->
    <line x1="128" y1="128" x2="128" y2="200" stroke="#FFD60A" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="128" cy="124" r="6" fill="#FFC300"/>
    <rect x="126" y="130" width="4" height="8" fill="#FFD60A"/>
    
    <!-- Jacket Collar -->
    <path d="M96 112 L112 128 L144 128 L160 112" fill="none" stroke="#9D0208" stroke-width="4"/>
    <path d="M104 120 L112 128 L144 128 L152 120" fill="#6A040F"/>
    <path d="M104 120 Q128 136 152 120" fill="#6A040F"/>
    
    <!-- Jacket Ribbing (bottom) -->
    <path d="M88 208 Q128 224 168 208" stroke="#6A040F" stroke-width="8" fill="none"/>
    <line x1="96" y1="208" x2="96" y2="216" stroke="#9D0208" stroke-width="1.5"/>
    <line x1="112" y1="212" x2="112" y2="220" stroke="#9D0208" stroke-width="1.5"/>
    <line x1="128" y1="214" x2="128" y2="222" stroke="#9D0208" stroke-width="1.5"/>
    <line x1="144" y1="212" x2="144" y2="220" stroke="#9D0208" stroke-width="1.5"/>
    <line x1="160" y1="208" x2="160" y2="216" stroke="#9D0208" stroke-width="1.5"/>
    
    <!-- Sleeve details -->
    <path d="M88 152 Q80 160 84 168" stroke="#9D0208" stroke-width="1" fill="none"/>
    <path d="M184 152 Q192 160 188 168" stroke="#9D0208" stroke-width="1" fill="none"/>
  </g>
  
  <!-- Head -->
  <g filter="url(#shadow256)">
    <ellipse cx="128" cy="80" rx="48" ry="40" fill="url(#foxOrange256)"/>
    
    <!-- Forehead marking -->
    <path d="M112 48 Q128 56 144 48" stroke="#FAA307" stroke-width="2" fill="none" opacity="0.6"/>
    
    <!-- Cheeks -->
    <ellipse cx="88" cy="88" rx="12" ry="8" fill="#FFBA08" opacity="0.6"/>
    <ellipse cx="168" cy="88" rx="12" ry="8" fill="#FFBA08" opacity="0.6"/>
    
    <!-- Ears -->
    <path d="M88 56 L80 24 L104 48Z" fill="url(#foxOrange256)"/>
    <path d="M88 40 L88 32 L96 40Z" fill="#370617"/>
    <path d="M80 24 L84 36 L92 32Z" fill="#FAA307" opacity="0.5"/>
    <path d="M168 56 L176 24 L152 48Z" fill="url(#foxOrange256)"/>
    <path d="M168 40 L168 32 L160 40Z" fill="#370617"/>
    <path d="M176 24 L172 36 L164 32Z" fill="#FAA307" opacity="0.5"/>
    
    <!-- Snout -->
    <ellipse cx="128" cy="96" rx="20" ry="12" fill="#FFBA08"/>
    <ellipse cx="128" cy="92" rx="8" ry="6" fill="#370617"/>
    <line x1="128" y1="98" x2="128" y2="104" stroke="#370617" stroke-width="1.5"/>
    
    <!-- Mouth (confident smirk) -->
    <path d="M112 104 Q128 112 144 100" fill="none" stroke="#370617" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M140 98 L144 100 L142 104" fill="none" stroke="#370617" stroke-width="1.5"/>
    
    <!-- Eyes (clever expression) -->
    <g filter="url(#glow256)">
      <ellipse cx="108" cy="76" rx="10" ry="12" fill="#FFF"/>
      <ellipse cx="110" cy="76" rx="5" ry="7" fill="#370617"/>
      <circle cx="112" cy="74" r="2" fill="#FFF"/>
    </g>
    <g filter="url(#glow256)">
      <ellipse cx="148" cy="76" rx="10" ry="12" fill="#FFF"/>
      <ellipse cx="146" cy="76" rx="5" ry="7" fill="#370617"/>
      <circle cx="144" cy="74" r="2" fill="#FFF"/>
    </g>
    
    <!-- Eyebrows (confident) -->
    <path d="M96 60 Q108 56 120 60" stroke="#370617" stroke-width="2.5" fill="none"/>
    <path d="M136 60 Q148 56 160 60" stroke="#370617" stroke-width="2.5" fill="none"/>
    
    <!-- Nose shine -->
    <ellipse cx="124" cy="90" rx="2" ry="1.5" fill="#FFF" opacity="0.6"/>
    
    <!-- Whiskers -->
    <line x1="92" y1="96" x2="82" y2="94" stroke="#370617" stroke-width="0.5" opacity="0.5"/>
    <line x1="92" y1="100" x2="80" y2="100" stroke="#370617" stroke-width="0.5" opacity="0.5"/>
    <line x1="164" y1="96" x2="174" y2="94" stroke="#370617" stroke-width="0.5" opacity="0.5"/>
    <line x1="164" y1="100" x2="176" y2="100" stroke="#370617" stroke-width="0.5" opacity="0.5"/>
  </g>
  
  <!-- Arms -->
  <g filter="url(#shadow256)">
    <path d="M80 160 Q64 176 72 192 Q80 208 96 192" fill="url(#jacketBurgundy256)"/>
    <path d="M192 160 Q208 176 200 192 Q192 208 176 192" fill="url(#jacketBurgundy256)"/>
    
    <!-- Jacket Cuffs -->
    <rect x="76" y="184" width="20" height="12" fill="#6A040F" rx="3"/>
    <rect x="160" y="184" width="20" height="12" fill="#6A040F" rx="3"/>
    
    <!-- Cuff details -->
    <line x1="80" y1="188" x2="80" y2="192" stroke="#9D0208" stroke-width="1"/>
    <line x1="86" y1="188" x2="86" y2="192" stroke="#9D0208" stroke-width="1"/>
    <line x1="92" y1="188" x2="92" y2="192" stroke="#9D0208" stroke-width="1"/>
    <line x1="164" y1="188" x2="164" y2="192" stroke="#9D0208" stroke-width="1"/>
    <line x1="170" y1="188" x2="170" y2="192" stroke="#9D0208" stroke-width="1"/>
    <line x1="176" y1="188" x2="176" y2="192" stroke="#9D0208" stroke-width="1"/>
    
    <!-- Jacket Emblem -->
    <circle cx="160" cy="152" r="12" fill="url(#goldAccent256)"/>
    <circle cx="160" cy="152" r="10" fill="none" stroke="#9D0208" stroke-width="1"/>
    <text x="160" y="158" font-size="12" text-anchor="middle" fill="#370617" font-weight="bold">F</text>
    
    <!-- Jacket Pockets -->
    <path d="M96 168 L104 168 L104 184 L96 184Z" fill="#6A040F"/>
    <path d="M152 168 L160 168 L160 184 L152 184Z" fill="#6A040F"/>
    
    <!-- Pocket flaps -->
    <path d="M94 168 L106 168 L100 172Z" fill="#9D0208"/>
    <path d="M150 168 L162 168 L156 172Z" fill="#9D0208"/>
  </g>
</svg>