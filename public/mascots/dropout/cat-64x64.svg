<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Cat in Bunny Onesie - Dropout Style 64x64 -->
  <defs>
    <linearGradient id="catBlack64" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D2D2D"/>
      <stop offset="50%" style="stop-color:#1F1F1F"/>
      <stop offset="100%" style="stop-color:#1A1A1A"/>
    </linearGradient>
    <linearGradient id="catWhite64" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F5F5F5"/>
    </linearGradient>
    <linearGradient id="onesiePink64" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF69B4"/>
      <stop offset="50%" style="stop-color:#FF1493"/>
      <stop offset="100%" style="stop-color:#F72585"/>
    </linearGradient>
    <linearGradient id="eyeBlue64" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF"/>
      <stop offset="100%" style="stop-color:#00B4D8"/>
    </linearGradient>
    <filter id="shadow64" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Shadow -->
  <ellipse cx="32" cy="60" rx="16" ry="3" fill="#000" opacity="0.12"/>
  
  <!-- Tail peeking from onesie -->
  <g className="tail" filter="url(#shadow64)">
    <path d="M12 44 Q8 36 12 28 Q16 20 24 28 Q20 36 16 44 Q14 48 12 44Z" fill="url(#catBlack64)"/>
    <path d="M12 28 Q10 24 12 20 Q14 16 18 20" fill="none" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="14" cy="42" rx="2" ry="3" fill="#FFFFFF" opacity="0.25"/>
  </g>
  
  <!-- Onesie Body -->
  <g className="onesie" filter="url(#shadow64)">
    <ellipse cx="32" cy="44" rx="18" ry="14" fill="url(#onesiePink64)"/>
    <!-- Belly patch -->
    <ellipse cx="32" cy="46" rx="10" ry="8" fill="#FFB6C1" opacity="0.6"/>
    <!-- Zipper -->
    <line x1="32" y1="32" x2="32" y2="52" stroke="#D41675" stroke-width="1.5" stroke-dasharray="3,2"/>
    <circle cx="32" cy="31" r="2.5" fill="#FF1493"/>
    <rect x="31" y="33" width="2" height="4" fill="#FF69B4"/>
    <!-- Paws -->
    <ellipse cx="20" cy="54" rx="4" ry="3" fill="#FFB6C1"/>
    <ellipse cx="44" cy="54" rx="4" ry="3" fill="#FFB6C1"/>
  </g>
  
  <!-- Onesie Arms -->
  <g className="arm-left" filter="url(#shadow64)">
    <ellipse cx="16" cy="40" rx="5" ry="8" fill="url(#onesiePink64)"/>
    <circle cx="14" cy="46" rx="3" ry="2.5" fill="#FFB6C1"/>
  </g>
  <g className="arm-right" filter="url(#shadow64)">
    <ellipse cx="48" cy="40" rx="5" ry="8" fill="url(#onesiePink64)"/>
    <circle cx="50" cy="46" rx="3" ry="2.5" fill="#FFB6C1"/>
  </g>
  
  <!-- Bunny Ears (hood) -->
  <g className="bunny-ears" filter="url(#shadow64)">
    <ellipse cx="22" cy="16" rx="5" ry="12" fill="url(#onesiePink64)" transform="rotate(-12 22 16)"/>
    <ellipse cx="22" cy="16" rx="2.5" ry="7" fill="#FFB6C1" transform="rotate(-12 22 16)"/>
    <ellipse cx="42" cy="16" rx="5" ry="12" fill="url(#onesiePink64)" transform="rotate(12 42 16)"/>
    <ellipse cx="42" cy="16" rx="2.5" ry="7" fill="#FFB6C1" transform="rotate(12 42 16)"/>
  </g>
  
  <!-- Cat Head -->
  <g className="head" filter="url(#shadow64)">
    <!-- Face base -->
    <ellipse cx="32" cy="26" rx="16" ry="14" fill="url(#catBlack64)"/>
    <!-- White muzzle/chest patch -->
    <ellipse cx="32" cy="32" rx="8" ry="6" fill="url(#catWhite64)"/>
    <!-- Grey markings on face -->
    <path d="M20 20 Q24 16 28 20" fill="none" stroke="#6B7280" stroke-width="1.5" opacity="0.6"/>
    <path d="M36 20 Q40 16 44 20" fill="none" stroke="#6B7280" stroke-width="1.5" opacity="0.6"/>
    <!-- Grey markings on forehead -->
    <ellipse cx="28" cy="22" rx="2" ry="1.5" fill="#6B7280" opacity="0.4"/>
    <ellipse cx="36" cy="22" rx="2" ry="1.5" fill="#6B7280" opacity="0.4"/>
    
    <!-- Cat Ears (peeking from hood) -->
    <path d="M20 18 L16 8 L24 16Z" fill="url(#catBlack64)"/>
    <path d="M20 14 L18 10 L22 13Z" fill="#6B7280" opacity="0.5"/>
    <path d="M44 18 L48 8 L40 16Z" fill="url(#catBlack64)"/>
    <path d="M44 14 L46 10 L42 13Z" fill="#6B7280" opacity="0.5"/>
    
    <!-- Eyes (bright blue, cheeky/mischievous) -->
    <g className="eye-left">
      <ellipse cx="26" cy="24" rx="4" ry="5" fill="url(#eyeBlue64)"/>
      <ellipse cx="26.5" cy="23" rx="1.5" ry="2" fill="#FFF"/>
      <circle cx="27" cy="25" rx="0.8" fill="#000" opacity="0.3"/>
      <!-- Mischievous eyebrow -->
      <path d="M22 19 Q26 18 29 20" fill="none" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <g className="eye-right">
      <ellipse cx="38" cy="24" rx="4" ry="5" fill="url(#eyeBlue64)"/>
      <ellipse cx="37.5" cy="23" rx="1.5" ry="2" fill="#FFF"/>
      <circle cx="37" cy="25" rx="0.8" fill="#000" opacity="0.3"/>
      <!-- Mischievous eyebrow (raised) -->
      <path d="M35 20 Q38 17 42 19" fill="none" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    
    <!-- Nose -->
    <ellipse cx="32" cy="30" rx="2" ry="1.5" fill="#FF69B4"/>
    <ellipse cx="31" cy="29.5" rx="0.6" ry="0.4" fill="#FFF" opacity="0.5"/>
    
    <!-- Cheeky smile -->
    <path d="M28 33 Q32 36 36 32" fill="none" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M35 31.5 L36 32 L36.5 33" fill="none" stroke="#1A1A1A" stroke-width="1" stroke-linecap="round"/>
    
    <!-- Whiskers -->
    <line x1="20" y1="30" x2="14" y2="29" stroke="#FFF" stroke-width="0.5" opacity="0.7"/>
    <line x1="20" y1="32" x2="14" y2="32" stroke="#FFF" stroke-width="0.5" opacity="0.7"/>
    <line x1="20" y1="34" x2="14" y2="35" stroke="#FFF" stroke-width="0.5" opacity="0.7"/>
    <line x1="44" y1="30" x2="50" y2="29" stroke="#FFF" stroke-width="0.5" opacity="0.7"/>
    <line x1="44" y1="32" x2="50" y2="32" stroke="#FFF" stroke-width="0.5" opacity="0.7"/>
    <line x1="44" y1="34" x2="50" y2="35" stroke="#FFF" stroke-width="0.5" opacity="0.7"/>
  </g>
  
  <!-- Grey paw pads -->
  <ellipse cx="14" cy="47" rx="1.5" ry="1" fill="#6B7280" opacity="0.6"/>
  <ellipse cx="50" cy="47" rx="1.5" ry="1" fill="#6B7280" opacity="0.6"/>
</svg>