<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Dropout Style Hawk - 32x32 -->
  <defs>
    <linearGradient id="dropoutBody32" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D00000"/>
      <stop offset="100%" style="stop-color:#9D0208"/>
    </linearGradient>
    <linearGradient id="jacket32" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6A040F"/>
      <stop offset="100%" style="stop-color:#370617"/>
    </linearGradient>
  </defs>
  
  <!-- Body -->
  <ellipse cx="16" cy="20" rx="7" ry="8" fill="url(#dropoutBody32)"/>
  
  <!-- Aviator Jacket -->
  <path d="M10 18 Q16 16 22 18 L22 26 Q16 28 10 26 Z" fill="url(#jacket32)"/>
  <path d="M10 18 L10 26 M22 18 L22 26" stroke="#FAA307" stroke-width="0.8" fill="none"/>
  
  <!-- Jacket Collar -->
  <path d="M10 18 Q13 20 16 19 Q19 20 22 18" stroke="#FAA307" stroke-width="0.5" fill="none"/>
  
  <!-- Head -->
  <ellipse cx="16" cy="10" rx="5" ry="4" fill="url(#dropoutBody32)"/>
  
  <!-- Beak -->
  <path d="M20 9 L25 10 L20 12 Z" fill="#FFC300"/>
  <path d="M20 9 L25 10 L20 12" stroke="#E85D04" stroke-width="0.3" fill="none"/>
  
  <!-- Intense Eyes -->
  <ellipse cx="14" cy="9" rx="2" ry="1.5" fill="#FFFFFF"/>
  <ellipse cx="18" cy="9" rx="2" ry="1.5" fill="#FFFFFF"/>
  <circle cx="14.5" cy="9" r="1" fill="#000000"/>
  <circle cx="18.5" cy="9" r="1" fill="#000000"/>
  
  <!-- Eye highlights -->
  <circle cx="14.8" cy="8.7" r="0.3" fill="#FFFFFF"/>
  <circle cx="18.8" cy="8.7" r="0.3" fill="#FFFFFF"/>
  
  <!-- Sharp Brow -->
  <path d="M11 7 L14 8.5" stroke="#370617" stroke-width="1" fill="none"/>
  <path d="M21 7 L18 8.5" stroke="#370617" stroke-width="1" fill="none"/>
  
  <!-- Wings (folded) -->
  <path d="M9 20 L6 24 L9 22" fill="#9D0208"/>
  <path d="M23 20 L26 24 L23 22" fill="#9D0208"/>
  
  <!-- Wing accents -->
  <path d="M8 21 L7 23" stroke="#FAA307" stroke-width="0.4"/>
  <path d="M24 21 L25 23" stroke="#FAA307" stroke-width="0.4"/>
</svg>