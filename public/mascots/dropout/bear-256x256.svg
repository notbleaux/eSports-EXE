<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bearBrown256" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A0522D"/>
      <stop offset="50%" style="stop-color:#8B4513"/>
      <stop offset="100%" style="stop-color:#654321"/>
    </linearGradient>
    <linearGradient id="bearJacket256" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DC143C"/>
      <stop offset="50%" style="stop-color:#B22222"/>
      <stop offset="100%" style="stop-color:#8B0000"/>
    </linearGradient>
    <linearGradient id="goldAccent256" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
    <filter id="shadow256" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Shadow -->
  <ellipse cx="128" cy="240" rx="50" ry="10" fill="#000" opacity="0.1"/>
  
  <!-- Ears -->
  <g filter="url(#shadow256)">
    <circle cx="80" cy="64" r="32" fill="url(#bearBrown256)"/>
    <circle cx="176" cy="64" r="32" fill="url(#bearBrown256)"/>
    <circle cx="80" cy="64" r="16" fill="#CD853F"/>
    <circle cx="176" cy="64" r="16" fill="#CD853F"/>
  </g>
  
  <!-- Head -->
  <g filter="url(#shadow256)">
    <ellipse cx="128" cy="96" rx="64" ry="56" fill="url(#bearBrown256)"/>
    <ellipse cx="112" cy="76" rx="20" ry="12" fill="#FFF" opacity="0.08"/>
  </g>
  
  <!-- Snout -->
  <g filter="url(#shadow256)">
    <ellipse cx="128" cy="112" rx="32" ry="24" fill="#DEB887"/>
    <ellipse cx="128" cy="104" rx="12" ry="10" fill="#333"/>
    <ellipse cx="124" cy="100" rx="4" ry="3" fill="#FFF" opacity="0.5"/>
  </g>
  
  <!-- Mouth -->
  <path d="M112 128 Q128 136 144 128" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <path d="M140 124 L144 128 L140 134" fill="none" stroke="#333" stroke-width="1.5"/>
  
  <!-- Eyes -->
  <g filter="url(#shadow256)">
    <ellipse cx="104" cy="88" rx="12" ry="14" fill="#FFF"/>
    <ellipse cx="106" cy="88" rx="6" ry="8" fill="#333"/>
    <circle cx="108" cy="86" r="2.5" fill="#FFF"/>
    
    <ellipse cx="152" cy="88" rx="12" ry="14" fill="#FFF"/>
    <ellipse cx="150" cy="88" rx="6" ry="8" fill="#333"/>
    <circle cx="148" cy="86" r="2.5" fill="#FFF"/>
  </g>
  
  <!-- Eyebrows -->
  <path d="M92 76 Q104 72 116 76" stroke="#333" stroke-width="2.5" fill="none"/>
  <path d="M140 76 Q152 72 164 76" stroke="#333" stroke-width="2.5" fill="none"/>
  
  <!-- Graduation Cap -->
  <g filter="url(#shadow256)">
    <rect x="80" y="32" width="96" height="24" fill="#1a1a2e" rx="2"/>
    <rect x="80" y="32" width="96" height="8" fill="#16213e"/>
    <path d="M96 32 L128 16 L160 32" fill="#1a1a2e"/>
    <circle cx="160" cy="40" r="6" fill="url(#goldAccent256)"/>
    <line x1="160" y1="40" x2="176" y2="64" stroke="#FFD700" stroke-width="3"/>
    <circle cx="176" cy="64" r="5" fill="#FFD700"/>
    <line x1="176" y1="64" x2="174" y2="72" stroke="#FFD700" stroke-width="1.5"/>
    <line x1="176" y1="64" x2="178" y2="72" stroke="#FFD700" stroke-width="1.5"/>
    <line x1="176" y1="64" x2="176" y2="74" stroke="#FFD700" stroke-width="1.5"/>
  </g>
  
  <!-- Body/Jacket -->
  <g filter="url(#shadow256)">
    <path d="M80 144 Q80 120 128 112 Q176 120 176 144 Q176 208 128 224 Q80 208 80 144Z" fill="url(#bearJacket256)"/>
    
    <line x1="128" y1="128" x2="128" y2="208" stroke="#8B0000" stroke-width="3"/>
    <circle cx="128" cy="136" r="8" fill="url(#goldAccent256)"/>
    
    <!-- Collar -->
    <path d="M96 128 L112 144 L144 144 L160 128" fill="none" stroke="#8B0000" stroke-width="4"/>
    <path d="M104 136 L112 144 L144 144 L152 136" fill="#B22222"/>
  </g>
  
  <!-- Arms -->
  <g filter="url(#shadow256)">
    <path d="M80 160 Q64 176 72 192 Q80 208 96 192" fill="url(#bearJacket256)"/>
    <path d="M176 160 Q192 176 184 192 Q176 208 160 192" fill="url(#bearJacket256)"/>
    
    <rect x="76" y="184" width="20" height="12" fill="#8B0000" rx="2"/>
    <rect x="160" y="184" width="20" height="12" fill="#8B0000" rx="2"/>
    
    <circle cx="80" cy="200" r="10" fill="#8B4513"/>
    <circle cx="176" cy="200" r="10" fill="#8B4513"/>
  </g>
  
  <!-- Emblem -->
  <circle cx="160" cy="152" r="12" fill="url(#goldAccent256)"/>
  <text x="160" y="156" font-size="12" text-anchor="middle" fill="#8B0000" font-weight="bold">D</text>
</svg>