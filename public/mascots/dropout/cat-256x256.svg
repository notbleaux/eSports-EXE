<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Cat in Bunny Onesie - Dropout Style 256x256 -->
  <defs>
    <linearGradient id="catBlack256" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3D3D3D"/>
      <stop offset="40%" style="stop-color:#1F1F1F"/>
      <stop offset="100%" style="stop-color:#0A0A0A"/>
    </linearGradient>
    <linearGradient id="catWhite256" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F5F5F5"/>
    </linearGradient>
    <linearGradient id="onesiePink256" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF7EBC"/>
      <stop offset="50%" style="stop-color:#FF1493"/>
      <stop offset="100%" style="stop-color:#F72585"/>
    </linearGradient>
    <linearGradient id="eyeBlue256" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF"/>
      <stop offset="50%" style="stop-color:#00B4D8"/>
      <stop offset="100%" style="stop-color:#0096C7"/>
    </linearGradient>
    <filter id="shadow256" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <filter id="glow256">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Shadow -->
  <ellipse cx="128" cy="238" rx="60" ry="10" fill="#000" opacity="0.1"/>
  
  <!-- Tail peeking from onesie -->
  <g className="tail" filter="url(#shadow256)">
    <path d="M48 176 Q32 144 48 112 Q64 80 96 96 Q80 128 64 160 Q56 176 48 176Z" fill="url(#catBlack256)"/>
    <path d="M48 112 Q40 96 48 80 Q56 64 72 80" fill="none" stroke="#2D2D2D" stroke-width="4" stroke-linecap="round"/>
    <path d="M56 168 Q72 156 80 140" fill="none" stroke="#333333" stroke-width="3" opacity="0.6"/>
    <path d="M64 152 Q76 142 84 130" fill="none" stroke="#333333" stroke-width="2.5" opacity="0.5"/>
    <!-- Tail tip white -->
    <ellipse cx="52" cy="170" rx="5" ry="6" fill="#FFFFFF" opacity="0.35"/>
  </g>
  
  <!-- Onesie Body -->
  <g className="onesie" filter="url(#shadow256)">
    <ellipse cx="128" cy="176" rx="72" ry="56" fill="url(#onesiePink256)"/>
    <!-- Belly patch -->
    <ellipse cx="128" cy="184" rx="40" ry="32" fill="#FFB6C1" opacity="0.6"/>
    <!-- Zipper -->
    <line x1="128" y1="128" x2="128" y2="208" stroke="#D41675" stroke-width="4" stroke-dasharray="8,4"/>
    <circle cx="128" cy="124" r="10" fill="#FF1493"/>
    <rect x="124" y="132" width="8" height="16" fill="#FF69B4"/>
    <!-- Zipper teeth detail -->
    <line x1="126" y1="136" x2="126" y2="204" stroke="#FF69B4" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
    <line x1="130" y1="136" x2="130" y2="204" stroke="#FF69B4" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
    <!-- Bottom hem -->
    <path d="M80 220 Q128 232 176 220" stroke="#D41675" stroke-width="8" fill="none"/>
    <!-- Hem stitching -->
    <line x1="88" y1="220" x2="88" y2="226" stroke="#FF1493" stroke-width="2"/>
    <line x1="104" y1="222" x2="104" y2="228" stroke="#FF1493" stroke-width="2"/>
    <line x1="128" y1="224" x2="128" y2="230" stroke="#FF1493" stroke-width="2"/>
    <line x1="152" y1="222" x2="152" y2="228" stroke="#FF1493" stroke-width="2"/>
    <line x1="168" y1="220" x2="168" y2="226" stroke="#FF1493" stroke-width="2"/>
  </g>
  
  <!-- Onesie Arms -->
  <g className="arm-left" filter="url(#shadow256)">
    <path d="M64 160 Q48 176 56 192 Q64 208 80 192" fill="url(#onesiePink256)"/>
    <!-- Cuff -->
    <rect x="58" y="184" width="16" height="10" fill="#D41675" rx="3"/>
    <!-- Paw -->
    <ellipse cx="60" cy="190" rx="10" ry="8" fill="#FFB6C1"/>
    <!-- Grey paw pads -->
    <ellipse cx="56" cy="188" rx="2.5" ry="2" fill="#6B7280" opacity="0.5"/>
    <ellipse cx="60" cy="192" rx="2.5" ry="2" fill="#6B7280" opacity="0.5"/>
    <ellipse cx="64" cy="188" rx="2.5" ry="2" fill="#6B7280" opacity="0.5"/>
    <ellipse cx="60" cy="185" rx="2" ry="1.5" fill="#6B7280" opacity="0.5"/>
  </g>
  <g className="arm-right" filter="url(#shadow256)">
    <path d="M192 160 Q208 176 200 192 Q192 208 176 192" fill="url(#onesiePink256)"/>
    <!-- Cuff -->
    <rect x="182" y="184" width="16" height="10" fill="#D41675" rx="3"/>
    <!-- Paw -->
    <ellipse cx="196" cy="190" rx="10" ry="8" fill="#FFB6C1"/>
    <!-- Grey paw pads -->
    <ellipse cx="192" cy="188" rx="2.5" ry="2" fill="#6B7280" opacity="0.5"/>
    <ellipse cx="196" cy="192" rx="2.5" ry="2" fill="#6B7280" opacity="0.5"/>
    <ellipse cx="200" cy="188" rx="2.5" ry="2" fill="#6B7280" opacity="0.5"/>
    <ellipse cx="196" cy="185" rx="2" ry="1.5" fill="#6B7280" opacity="0.5"/>
  </g>
  
  <!-- Bunny Ears (hood) -->
  <g className="bunny-ears" filter="url(#shadow256)">
    <!-- Left ear -->
    <ellipse cx="88" cy="64" rx="20" ry="48" fill="url(#onesiePink256)" transform="rotate(-8 88 64)"/>
    <ellipse cx="88" cy="64" rx="10" ry="28" fill="#FFB6C1" transform="rotate(-8 88 64)"/>
    <!-- Inner ear shading -->
    <path d="M88 32 L84 56 L92 56Z" fill="#FF1493" opacity="0.25" transform="rotate(-8 88 64)"/>
    <ellipse cx="88" cy="88" rx="12" ry="8" fill="#FF1493" opacity="0.15" transform="rotate(-8 88 64)"/>
    
    <!-- Right ear -->
    <ellipse cx="168" cy="64" rx="20" ry="48" fill="url(#onesiePink256)" transform="rotate(8 168 64)"/>
    <ellipse cx="168" cy="64" rx="10" ry="28" fill="#FFB6C1" transform="rotate(8 168 64)"/>
    <!-- Inner ear shading -->
    <path d="M168 32 L164 56 L172 56Z" fill="#FF1493" opacity="0.25" transform="rotate(8 168 64)"/>
    <ellipse cx="168" cy="88" rx="12" ry="8" fill="#FF1493" opacity="0.15" transform="rotate(8 168 64)"/>
  </g>
  
  <!-- Cat Head -->
  <g className="head" filter="url(#shadow256)">
    <!-- Face base -->
    <ellipse cx="128" cy="104" rx="64" ry="56" fill="url(#catBlack256)"/>
    
    <!-- White muzzle/chest patch -->
    <ellipse cx="128" cy="128" rx="32" ry="24" fill="url(#catWhite256)"/>
    <!-- White blaze on forehead -->
    <path d="M120 64 L128 80 L136 64" fill="#FFFFFF" opacity="0.3"/>
    
    <!-- Grey markings on face -->
    <path d="M80 80 Q96 64 112 80" fill="none" stroke="#6B7280" stroke-width="4" opacity="0.6"/>
    <path d="M144 80 Q160 64 176 80" fill="none" stroke="#6B7280" stroke-width="4" opacity="0.6"/>
    <!-- Grey tabby stripes on forehead -->
    <path d="M112 72 L120 88 L128 72 L136 88 L144 72" fill="none" stroke="#6B7280" stroke-width="2.5" opacity="0.5"/>
    <path d="M116 64 L122 76 L128 64" fill="none" stroke="#6B7280" stroke-width="2" opacity="0.4"/>
    
    <!-- Grey markings on cheeks -->
    <ellipse cx="96" cy="112" rx="6" ry="4" fill="#6B7280" opacity="0.4"/>
    <ellipse cx="160" cy="112" rx="6" ry="4" fill="#6B7280" opacity="0.4"/>
    
    <!-- Cat Ears (peeking from hood) -->
    <path d="M80 72 L64 32 L96 64Z" fill="url(#catBlack256)"/>
    <path d="M80 56 L72 40 L88 52Z" fill="#6B7280" opacity="0.5"/>
    <path d="M176 72 L192 32 L160 64Z" fill="url(#catBlack256)"/>
    <path d="M176 56 L184 40 L168 52Z" fill="#6B7280" opacity="0.5"/>
    
    <!-- Eyes (bright blue #00B4D8, cheeky/mischievous) -->
    <g className="eye-left" filter="url(#glow256)">
      <ellipse cx="104" cy="96" rx="16" ry="20" fill="url(#eyeBlue256)"/>
      <ellipse cx="106" cy="92" rx="6" ry="8" fill="#FFF"/>
      <circle cx="108" cy="98" rx="3" fill="#000" opacity="0.3"/>
      <!-- Eye shine -->
      <ellipse cx="110" cy="90" rx="2" ry="2.5" fill="#FFF" opacity="0.8"/>
    </g>
    <g className="eye-right" filter="url(#glow256)">
      <ellipse cx="152" cy="96" rx="16" ry="20" fill="url(#eyeBlue256)"/>
      <ellipse cx="150" cy="92" rx="6" ry="8" fill="#FFF"/>
      <circle cx="148" cy="98" rx="3" fill="#000" opacity="0.3"/>
      <!-- Eye shine -->
      <ellipse cx="146" cy="90" rx="2" ry="2.5" fill="#FFF" opacity="0.8"/>
    </g>
    
    <!-- Cheeky eyebrows (one raised) -->
    <path d="M88 76 Q104 72 116 80" fill="none" stroke="#1A1A1A" stroke-width="4" stroke-linecap="round"/>
    <path d="M140 80 Q152 72 168 76" fill="none" stroke="#1A1A1A" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Nose -->
    <ellipse cx="128" cy="120" rx="8" ry="6" fill="#FF69B4"/>
    <ellipse cx="124" cy="118" rx="2.5" ry="1.5" fill="#FFF" opacity="0.5"/>
    
    <!-- Cheeky smile (crooked) -->
    <path d="M112 132 Q128 144 144 128" fill="none" stroke="#1A1A1A" stroke-width="4" stroke-linecap="round"/>
    <path d="M140 126 L144 128 L142 134" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Whiskers -->
    <line x1="80" y1="120" x2="56" y2="116" stroke="#FFF" stroke-width="1.2" opacity="0.7"/>
    <line x1="80" y1="128" x2="56" y2="128" stroke="#FFF" stroke-width="1.2" opacity="0.7"/>
    <line x1="80" y1="136" x2="56" y2="140" stroke="#FFF" stroke-width="1.2" opacity="0.7"/>
    <line x1="176" y1="120" x2="200" y2="116" stroke="#FFF" stroke-width="1.2" opacity="0.7"/>
    <line x1="176" y1="128" x2="200" y2="128" stroke="#FFF" stroke-width="1.2" opacity="0.7"/>
    <line x1="176" y1="136" x2="200" y2="140" stroke="#FFF" stroke-width="1.2" opacity="0.7"/>
    
    <!-- Tiny fang peeking -->
    <path d="M142 136 L144 140 L146 136" fill="#FFF" opacity="0.9"/>
  </g>
</svg>