<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Dropout Style Owl - 64x64 -->
  <defs>
    <linearGradient id="bodyGrad64" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9D4EDD"/>
      <stop offset="100%" style="stop-color:#7B2CBF"/>
    </linearGradient>
    <linearGradient id="sweaterGrad64" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9E00"/>
      <stop offset="100%" style="stop-color:#E08500"/>
    </linearGradient>
    <filter id="shadow64" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="1" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Body -->
  <ellipse cx="32" cy="40" rx="20" ry="18" fill="url(#bodyGrad64)" filter="url(#shadow64)"/>
  
  <!-- Sweater -->
  <path d="M12 40 Q12 56 32 56 Q52 56 52 40 L52 36 Q52 48 32 48 Q12 48 12 36 Z" fill="url(#sweaterGrad64)"/>
  
  <!-- Sweater Ribbing -->
  <path d="M14 44 Q32 50 50 44" stroke="#CC7000" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M14 48 Q32 54 50 48" stroke="#CC7000" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M14 52 Q32 58 50 52" stroke="#CC7000" stroke-width="1" fill="none" opacity="0.5"/>
  
  <!-- Sweater Collar -->
  <ellipse cx="32" cy="36" rx="16" ry="5" fill="#FF9E00" stroke="#CC7000" stroke-width="0.5"/>
  
  <!-- Head -->
  <ellipse cx="32" cy="20" rx="18" ry="16" fill="url(#bodyGrad64)" filter="url(#shadow64)"/>
  
  <!-- Ears/Tufts -->
  <path d="M16 10 L12 4 L20 8 Z" fill="#7B2CBF"/>
  <path d="M48 10 L52 4 L44 8 Z" fill="#7B2CBF"/>
  
  <!-- Eyes Background -->
  <circle cx="24" cy="20" r="7" fill="#FFFFFF"/>
  <circle cx="40" cy="20" r="7" fill="#FFFFFF"/>
  
  <!-- Pupils -->
  <circle cx="24" cy="20" r="4" fill="#1A1A2E"/>
  <circle cx="40" cy="20" r="4" fill="#1A1A2E"/>
  
  <!-- Eye Highlights -->
  <circle cx="26" cy="18" r="1.5" fill="#FFFFFF"/>
  <circle cx="42" cy="18" r="1.5" fill="#FFFFFF"/>
  
  <!-- Glasses Frame -->
  <circle cx="24" cy="20" r="8" stroke="#FFD700" stroke-width="1.5" fill="none"/>
  <circle cx="40" cy="20" r="8" stroke="#FFD700" stroke-width="1.5" fill="none"/>
  
  <!-- Glasses Bridge -->
  <path d="M32 20 Q32 16 32 16" stroke="#FFD700" stroke-width="1.2" fill="none"/>
  
  <!-- Glasses Temples -->
  <line x1="16" y1="20" x2="14" y2="18" stroke="#FFD700" stroke-width="1"/>
  <line x1="48" y1="20" x2="50" y2="18" stroke="#FFD700" stroke-width="1"/>
  
  <!-- Beak -->
  <path d="M30 26 L32 30 L34 26 Z" fill="#FFB347"/>
  
  <!-- Thoughtful Eyebrows -->
  <path d="M18 14 Q24 12 28 14" stroke="#5A189A" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M36 14 Q40 12 46 14" stroke="#5A189A" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  
  <!-- Chest Feather Detail -->
  <path d="M28 44 Q32 46 36 44" stroke="#9D4EDD" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M28 48 Q32 50 36 48" stroke="#9D4EDD" stroke-width="1" fill="none" opacity="0.6"/>
</svg>