<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Minimalist line art fox - NJ Style -->
  
  <!-- Tail (fluffy, flowing) -->
  <path d="M32 160 Q16 128 32 96 Q48 64 80 80 Q64 112 48 144 Q40 160 32 160Z" 
        fill="none" stroke="#0000FF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M32 96 Q24 80 32 64" fill="none" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tail fluff lines -->
  <path d="M40 144 Q56 128 64 112" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M48 128 Q60 116 68 104" fill="none" stroke="#0000FF" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>
  <path d="M56 112 Q66 102 72 92" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <path d="M64 96 Q72 88 76 80" fill="none" stroke="#0000FF" stroke-width="1.2" stroke-linecap="round" opacity="0.25"/>
  
  <!-- Body (simple rounded shape) -->
  <path d="M80 176 Q80 128 128 120 Q176 112 208 144 Q224 176 208 208 Q192 240 144 232 Q96 224 80 176Z" 
        fill="none" stroke="#0000FF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Body contour lines -->
  <path d="M96 152 Q104 144 112 152" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <path d="M144 152 Q152 144 160 152" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  
  <!-- Chest marking -->
  <path d="M112 152 Q128 168 144 152" fill="none" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M116 164 Q128 176 140 164" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <path d="M120 176 Q128 184 136 176" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  
  <!-- Head (circular with pointed ears) -->
  <ellipse cx="144" cy="80" rx="48" ry="44" fill="none" stroke="#0000FF" stroke-width="3"/>
  
  <!-- Head contour -->
  <path d="M104 72 Q128 64 152 72" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  
  <!-- Ears (triangular, pointed) -->
  <path d="M104 48 L88 16 L120 40" fill="none" stroke="#0000FF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M104 40 L96 24 L112 36" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round"/>
  <path d="M100 32 L94 20 L108 30" fill="none" stroke="#0000FF" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  
  <path d="M184 48 L200 16 L168 40" fill="none" stroke="#0000FF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M184 40 L192 24 L176 36" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round"/>
  <path d="M188 32 L194 20 L180 30" fill="none" stroke="#0000FF" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Snout (small rounded) -->
  <ellipse cx="144" cy="104" rx="20" ry="12" fill="none" stroke="#0000FF" stroke-width="3"/>
  <ellipse cx="144" cy="100" rx="8" ry="6" fill="#0000FF"/>
  
  <!-- Snout detail -->
  <path d="M132 108 Q144 114 156 106" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Mouth (small smile) -->
  <path d="M128 112 Q144 120 160 108" fill="none" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M152 105 L160 108 L156 116" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Eyes (clever, cute expression) -->
  <ellipse cx="120" cy="72" rx="10" ry="12" fill="#0000FF"/>
  <ellipse cx="122" cy="70" rx="4" ry="5" fill="#FFF"/>
  <circle cx="124" cy="68" r="2" fill="#FFF"/>
  
  <ellipse cx="168" cy="72" rx="10" ry="12" fill="#0000FF"/>
  <ellipse cx="166" cy="70" rx="4" ry="5" fill="#FFF"/>
  <circle cx="164" cy="68" r="2" fill="#FFF"/>
  
  <!-- Eyebrows (playful arch) -->
  <path d="M104 56 Q120 48 136 56" fill="none" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M152 56 Q168 48 184 56" fill="none" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Cheek details -->
  <path d="M104 88 Q112 92 120 88" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <path d="M168 88 Q176 92 184 88" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Whiskers -->
  <line x1="100" y1="100" x2="80" y2="96" stroke="#0000FF" stroke-width="1" opacity="0.3"/>
  <line x1="100" y1="104" x2="76" y2="104" stroke="#0000FF" stroke-width="1" opacity="0.3"/>
  <line x1="188" y1="100" x2="208" y2="96" stroke="#0000FF" stroke-width="1" opacity="0.3"/>
  <line x1="188" y1="104" x2="212" y2="104" stroke="#0000FF" stroke-width="1" opacity="0.3"/>
  
  <!-- Paws (simple circles with details) -->
  <circle cx="96" cy="208" r="16" fill="none" stroke="#0000FF" stroke-width="3"/>
  <line x1="88" y1="200" x2="88" y2="216" stroke="#0000FF" stroke-width="2"/>
  <line x1="96" y1="196" x2="96" y2="220" stroke="#0000FF" stroke-width="2"/>
  <line x1="104" y1="200" x2="104" y2="216" stroke="#0000FF" stroke-width="2"/>
  
  <circle cx="192" cy="208" r="16" fill="none" stroke="#0000FF" stroke-width="3"/>
  <line x1="184" y1="200" x2="184" y2="216" stroke="#0000FF" stroke-width="2"/>
  <line x1="192" y1="196" x2="192" y2="220" stroke="#0000FF" stroke-width="2"/>
  <line x1="200" y1="200" x2="200" y2="216" stroke="#0000FF" stroke-width="2"/>
</svg>