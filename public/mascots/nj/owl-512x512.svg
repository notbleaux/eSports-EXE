<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- NJ Style Owl - 512x512 - Minimalist Line Art -->
  
  <!-- Body - Rounded -->
  <ellipse cx="256" cy="304" rx="144" ry="160" stroke="#0000FF" stroke-width="2" fill="none"/>
  
  <!-- Body Detail Lines -->
  <g opacity="0.35">
    <path d="M192 368 Q256 408 320 368" stroke="#0000FF" stroke-width="2" fill="none"/>
    <path d="M176 336 Q256 376 336 336" stroke="#0000FF" stroke-width="1.5" fill="none"/>
    <path d="M208 400 Q256 424 304 400" stroke="#0000FF" stroke-width="1.2" fill="none"/>
    <path d="M184 384 Q256 416 328 384" stroke="#0000FF" stroke-width="1" fill="none"/>
  </g>
  
  <!-- Body Subtle Shading Lines -->
  <g opacity="0.2">
    <path d="M224 352 Q256 364 288 352" stroke="#0000FF" stroke-width="1" fill="none"/>
    <path d="M216 384 Q256 396 296 384" stroke="#0000FF" stroke-width="1" fill="none"/>
    <path d="M232 416 Q256 424 280 416" stroke="#0000FF" stroke-width="0.8" fill="none"/>
  </g>
  
  <!-- Body Contour Lines -->
  <g opacity="0.15">
    <path d="M240 320 Q256 326 272 320" stroke="#0000FF" stroke-width="0.8" fill="none"/>
