    <path d="M248 392 Q256 396 264 392" stroke="#0000FF" stroke-width="0.6" fill="none"/>
  </g>
  
  <!-- Head - Circular -->
  <circle cx="256" cy="160" rx="112" ry="104" stroke="#0000FF" stroke-width="2" fill="none"/>
  
  <!-- Face Disc Outline -->
  <ellipse cx="256" cy="176" rx="80" ry="64" stroke="#0000FF" stroke-width="1" fill="none" opacity="0.3"/>
  <ellipse cx="256" cy="176" rx="64" ry="48" stroke="#0000FF" stroke-width="0.8" fill="none" opacity="0.25"/>
  <ellipse cx="256" cy="176" rx="48" ry="36" stroke="#0000FF" stroke-width="0.5" fill="none" opacity="0.2"/>
  
  <!-- Large Wise Eyes - Simple Circles -->
  <circle cx="208" cy="144" r="40" stroke="#0000FF" stroke-width="2" fill="none"/>
  <circle cx="304" cy="144" r="40" stroke="#0000FF" stroke-width="2" fill="none"/>
  
  <!-- Eye Detail Rings -->
  <g opacity="0.35">
    <circle cx="208" cy="144" r="28" stroke="#0000FF" stroke-width="1.2" fill="none"/>
    <circle cx="304" cy="144" r="28" stroke="#0000FF" stroke-width="1.2" fill="none"/>
  </g>
  <g opacity="0.25">
    <circle cx="208" cy="144" r="16" stroke="#0000FF" stroke-width="0.8" fill="none"/>
    <circle cx="304" cy="144" r="16" stroke="#0000FF" stroke-width="0.8" fill="none"/>
  </g>
  <g opacity="0.15">
    <circle cx="208" cy="144" r="8" stroke="#0000FF" stroke-width="0.5" fill="none"/>
    <circle cx="304" cy="144" r="8" stroke="#0000FF" stroke-width="0.5" fill="none"/>
  </g>
  
  <!-- Pupils -->
  <circle cx="208" cy="144" r="16" fill="#0000FF"/>
  <circle cx="304" cy="144" r="16" fill="#0000FF"/>
  
  <!-- Pupil Details -->
  <circle cx="200" cy="136" r="6" fill="#3333FF"/>
  <circle cx="296" cy="136" r="6" fill="#3333FF"/>
  
  <!-- Eye Shine -->
  <circle cx="220" cy="132" r="6" fill="#FFFFFF"/>
  <circle cx="316" cy="132" r="6" fill="#FFFFFF"/>
  <circle cx="200" cy="152" r="4" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="296" cy="152" r="4" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="216" cy="156" r="3" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="312" cy="156" r="3" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="208" cy="140" r="2" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="304" cy="140" r="2" fill="#FFFFFF" opacity="0.4"/>
  
  <!-- Small Beak -->
  <path d="M240 192 L256 216 L272 192" stroke="#0000FF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M248 200 L256 208 L264 200" stroke="#0000FF" stroke-width="1.2" fill="none" opacity="0.5"/>
  <path d="M252 196 L256 200 L260 196" stroke="#0000FF" stroke-width="0.8" fill="none" opacity="0.4"/>
  <path d="M254 194 L256 196 L258 194" stroke="#0000FF" stroke-width="0.5" fill="none" opacity="0.3"/>
  
  <!-- Ear Tufts - Minimal -->
