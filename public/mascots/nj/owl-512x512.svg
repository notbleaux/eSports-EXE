  </g>
  <g opacity="0.3">
    <path d="M176 52 L172 36 L188 48" stroke="#0000FF" stroke-width="1" fill="none"/>
    <path d="M336 52 L340 36 L324 48" stroke="#0000FF" stroke-width="1" fill="none"/>
  </g>
  <g opacity="0.2">
    <path d="M180 46 L178 34 L188 42" stroke="#0000FF" stroke-width="0.8" fill="none"/>
    <path d="M332 46 L334 34 L324 42" stroke="#0000FF" stroke-width="0.8" fill="none"/>
  </g>
  
  <!-- Wing Lines -->
  <path d="M144 288 Q112 320 144 384" stroke="#0000FF" stroke-width="1.5" fill="none" opacity="0.55"/>
  <path d="M368 288 Q400 320 368 384" stroke="#0000FF" stroke-width="1.5" fill="none" opacity="0.55"/>
  
  <!-- Wing Detail -->
  <g opacity="0.4">
    <path d="M128 320 Q112 344 128 376" stroke="#0000FF" stroke-width="1.2" fill="none"/>
    <path d="M384 320 Q400 344 384 376" stroke="#0000FF" stroke-width="1.2" fill="none"/>
  </g>
  <g opacity="0.3">
    <path d="M120 336 Q108 354 120 376" stroke="#0000FF" stroke-width="1" fill="none"/>
    <path d="M392 336 Q404 354 392 376" stroke="#0000FF" stroke-width="1" fill="none"/>
  </g>
  <g opacity="0.2">
    <path d="M116 348 Q108 362 116 376" stroke="#0000FF" stroke-width="0.8" fill="none"/>
    <path d="M396 348 Q404 362 396 376" stroke="#0000FF" stroke-width="0.8" fill="none"/>
  </g>
  
  <!-- Feet -->
  <g opacity="0.45">
    <line x1="208" y1="456" x2="208" y2="472" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="256" y1="456" x2="256" y2="472" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="304" y1="456" x2="304" y2="472" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- Feather Detail on Head -->
  <g opacity="0.35">
    <path d="M224 72 Q208 80 216 96" stroke="#0000FF" stroke-width="1.2" fill="none"/>
    <path d="M256 64 Q256 80 256 96" stroke="#0000FF" stroke-width="1.2" fill="none"/>
    <path d="M288 72 Q304 80 296 96" stroke="#0000FF" stroke-width="1.2" fill="none"/>
  </g>
  <g opacity="0.25">
    <path d="M232 80 Q224 84 228 92" stroke="#0000FF" stroke-width="0.8" fill="none"/>
    <path d="M280 80 Q288 84 284 92" stroke="#0000FF" stroke-width="0.8" fill="none"/>
  </g>
  
  <!-- Head Highlight -->
  <g opacity="0.2">
    <path d="M240 88 Q256 92 272 88" stroke="#0000FF" stroke-width="1" fill="none"/>
    <path d="M232 96 Q256 100 280 96" stroke="#0000FF" stroke-width="0.8" fill="none"/>
  </g>
  
  <!-- Body Base Lines -->
  <g opacity="0.12">
    <path d="M192 304 Q256 314 320 304" stroke="#0000FF" stroke-width="0.8" fill="none"/>
    <path d="M176 336 Q256 350 336 336" stroke="#0000FF" stroke-width="0.6" fill="none"/>
    <path d="M200 368 Q256 378 312 368" stroke="#0000FF" stroke-width="0.6" fill="none"/>
