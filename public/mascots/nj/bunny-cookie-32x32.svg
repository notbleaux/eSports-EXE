<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- NJ Bunny - Cookie Variant (shy, cute) -->
  <!-- Droopy ears -->
  <path d="M12 12 Q8 8 10 6 Q13 5 15 10" 
        fill="none" stroke="#0000FF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M17 10 Q19 5 22 6 Q24 8 20 12" 
        fill="none" stroke="#0000FF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <ellipse cx="16" cy="16" rx="7" ry="6" fill="none" stroke="#0000FF" stroke-width="1.8"/>
  <ellipse cx="16" cy="18" rx="3" ry="2.5" fill="none" stroke="#0000FF" stroke-width="1.5"/>
  <ellipse cx="16" cy="17" rx="1.5" ry="1.2" fill="#0000FF"/>
  <!-- Shy eyes (looking down) -->
  <path d="M11.5 14.5 Q13 14 14.5 14.5" fill="none" stroke="#0000FF" stroke-width="1" stroke-linecap="round"/>
  <path d="M17.5 14.5 Q19 14 20.5 14.5" fill="none" stroke="#0000FF" stroke-width="1" stroke-linecap="round"/>
  <!-- Blush marks -->
  <ellipse cx="10" cy="17" rx="1.5" ry="1" fill="none" stroke="#0000FF" stroke-width="0.8" opacity="0.5"/>
  <ellipse cx="22" cy="17" rx="1.5" ry="1" fill="none" stroke="#0000FF" stroke-width="0.8" opacity="0.5"/>
  <!-- Small smile -->
  <path d="M14.5 20 Q16 21 17.5 20" fill="none" stroke="#0000FF" stroke-width="1" stroke-linecap="round"/>
  <!-- Curling body -->
  <path d="M10 22 Q10 27 16 28 Q22 27 22 22" 
        fill="none" stroke="#0000FF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <ellipse cx="10" cy="25" rx="2" ry="2.5" fill="none" stroke="#0000FF" stroke-width="1.5"/>
  <ellipse cx="22" cy="25" rx="2" ry="2.5" fill="none" stroke="#0000FF" stroke-width="1.5"/>
</svg>