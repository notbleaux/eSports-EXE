<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Minimalist line art fox - NJ Style -->
  
  <!-- Tail (fluffy, flowing) -->
  <path d="M64 320 Q32 256 64 192 Q96 128 160 160 Q128 224 96 288 Q80 320 64 320Z" 
        fill="none" stroke="#0000FF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M64 192 Q48 160 64 128" fill="none" stroke="#0000FF" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Tail fluff lines -->
  <path d="M80 288 Q112 256 128 224" fill="none" stroke="#0000FF" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <path d="M96 256 Q120 232 136 208" fill="none" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <path d="M112 224 Q132 204 144 184" fill="none" stroke="#0000FF" stroke-width="2.2" stroke-linecap="round" opacity="0.35"/>
  <path d="M128 192 Q144 176 152 160" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <path d="M72 280 Q100 260 116 236" fill="none" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Body (simple rounded shape) -->
  <path d="M160 352 Q160 256 256 240 Q352 224 416 288 Q448 352 416 416 Q384 480 288 464 Q192 448 160 352Z" 
        fill="none" stroke="#0000FF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Body contour lines -->
  <path d="M192 304 Q208 288 224 304" fill="none" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <path d="M288 304 Q304 288 320 304" fill="none" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <path d="M176 336 Q256 360 336 336" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  
  <!-- Chest marking -->
  <path d="M224 304 Q256 336 288 304" fill="none" stroke="#0000FF" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M232 328 Q256 352 280 328" fill="none" stroke="#0000FF" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <path d="M240 352 Q256 368 272 352" fill="none" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <path d="M248 376 Q256 384 264 376" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  
  <!-- Head (circular with pointed ears) -->
  <ellipse cx="288" cy="160" rx="96" ry="88" fill="none" stroke="#0000FF" stroke-width="4"/>
  
  <!-- Head contour -->
  <path d="M208 144 Q256 128 304 144" fill="none" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <path d="M216 176 Q256 188 296 176" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  
  <!-- Ears (triangular, pointed) -->
  <path d="M208 96 L176 32 L240 80" fill="none" stroke="#0000FF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M208 80 L192 48 L224 72" fill="none" stroke="#0000FF" stroke-width="3" stroke-linecap="round"/>
  <path d="M200 64 L188 40 L216 60" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M192 56 L184 36 L204 52" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  
  <path d="M368 96 L400 32 L336 80" fill="none" stroke="#0000FF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M368 80 L384 48 L352 72" fill="none" stroke="#0000FF" stroke-width="3" stroke-linecap="round"/>
  <path d="M376 64 L388 40 L360 60" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M384 56 L392 36 L372 52" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  
  <!-- Snout (small rounded) -->
  <ellipse cx="288" cy="208" rx="40" ry="24" fill="none" stroke="#0000FF" stroke-width="4"/>
  <ellipse cx="288" cy="200" rx="16" ry="12" fill="#0000FF"/>
  
  <!-- Snout detail -->
  <path d="M264 216 Q288 228 312 212" fill="none" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <path d="M272 228 Q288 236 304 224" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  
  <!-- Mouth (small smile) -->
  <path d="M256 224 Q288 240 320 216" fill="none" stroke="#0000FF" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M304 210 L320 216 L312 232" fill="none" stroke="#0000FF" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Eyes (clever, cute expression) -->
  <ellipse cx="240" cy="144" rx="20" ry="24" fill="#0000FF"/>
  <ellipse cx="244" cy="140" rx="8" ry="10" fill="#FFF"/>
  <circle cx="248" cy="136" r="4" fill="#FFF"/>
  <circle cx="252" cy="132" r="2" fill="#FFF"/>
  
  <ellipse cx="336" cy="144" rx="20" ry="24" fill="#0000FF"/>
  <ellipse cx="332" cy="140" rx="8" ry="10" fill="#FFF"/>
  <circle cx="328" cy="136" r="4" fill="#FFF"/>
  <circle cx="324" cy="132" r="2" fill="#FFF"/>
  
  <!-- Eyebrows (playful arch) -->
  <path d="M208 112 Q240 96 272 112" fill="none" stroke="#0000FF" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M304 112 Q336 96 368 112" fill="none" stroke="#0000FF" stroke-width="3.5" stroke-linecap="round"/>
  
  <!-- Cheek details -->
  <path d="M208 176 Q224 184 240 176" fill="none" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <path d="M336 176 Q352 184 368 176" fill="none" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Whiskers -->
  <line x1="200" y1="200" x2="160" y2="192" stroke="#0000FF" stroke-width="1.5" opacity="0.3"/>
  <line x1="200" y1="208" x2="152" y2="208" stroke="#0000FF" stroke-width="1.5" opacity="0.3"/>
  <line x1="200" y1="216" x2="160" y2="224" stroke="#0000FF" stroke-width="1.5" opacity="0.3"/>
  <line x1="376" y1="200" x2="416" y2="192" stroke="#0000FF" stroke-width="1.5" opacity="0.3"/>
  <line x1="376" y1="208" x2="424" y2="208" stroke="#0000FF" stroke-width="1.5" opacity="0.3"/>
  <line x1="376" y1="216" x2="416" y2="224" stroke="#0000FF" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Paws (simple circles with details) -->
  <circle cx="192" cy="416" r="32" fill="none" stroke="#0000FF" stroke-width="4"/>
  <line x1="176" y1="400" x2="176" y2="432" stroke="#0000FF" stroke-width="3"/>
  <line x1="192" y1="392" x2="192" y2="440" stroke="#0000FF" stroke-width="3"/>
  <line x1="208" y1="400" x2="208" y2="432" stroke="#0000FF" stroke-width="3"/>
  <!-- Paw pad -->
  <ellipse cx="192" cy="428" rx="8" ry="6" fill="none" stroke="#0000FF" stroke-width="2" opacity="0.5"/>
  
  <circle cx="384" cy="416" r="32" fill="none" stroke="#0000FF" stroke-width="4"/>
  <line x1="368" y1="400" x2="368" y2="432" stroke="#0000FF" stroke-width="3"/>
  <line x1="384" y1="392" x2="384" y2="440" stroke="#0000FF" stroke-width="3"/>
  <line x1="400" y1="400" x2="400" y2="432" stroke="#0000FF" stroke-width="3"/>
  <!-- Paw pad -->
  <ellipse cx="384" cy="428" rx="8" ry="6" fill="none" stroke="#0000FF" stroke-width="2" opacity="0.5"/>
</svg>