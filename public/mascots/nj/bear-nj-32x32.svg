<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- NJ Style Bear - Simple line art bear in NJ style -->
  <!-- Ears -->
  <circle cx="10" cy="8" r="3" fill="none" stroke="#0000FF" stroke-width="1.5"/>
  <circle cx="22" cy="8" r="3" fill="none" stroke="#0000FF" stroke-width="1.5"/>
  <circle cx="10" cy="8" r="1.5" fill="none" stroke="#0000FF" stroke-width="0.8" opacity="0.5"/>
  <circle cx="22" cy="8" r="1.5" fill="none" stroke="#0000FF" stroke-width="0.8" opacity="0.5"/>
  
  <!-- Head -->
  <circle cx="16" cy="13" r="6" fill="none" stroke="#0000FF" stroke-width="1.8"/>
  
  <!-- Snout -->
  <ellipse cx="16" cy="15" rx="3" ry="2" fill="none" stroke="#0000FF" stroke-width="1.5"/>
  <ellipse cx="16" cy="14.5" rx="1.5" ry="1.2" fill="#0000FF"/>
  
  <!-- Eyes (friendly) -->
  <circle cx="13.5" cy="12" r="1.2" fill="#0000FF"/>
  <circle cx="13.6" cy="11.8" r="0.4" fill="#FFF"/>
  <circle cx="18.5" cy="12" r="1.2" fill="#0000FF"/>
  <circle cx="18.4" cy="11.8" r="0.4" fill="#FFF"/>
  
  <!-- Smile -->
  <path d="M14 17 Q16 19 18 17" fill="none" stroke="#0000FF" stroke-width="1.2" stroke-linecap="round"/>
  
  <!-- Body -->
  <path d="M10 19 Q10 27 16 28 Q22 27 22 19" 
        fill="none" stroke="#0000FF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Belly patch -->
  <ellipse cx="16" cy="23" rx="3" ry="3.5" fill="none" stroke="#0000FF" stroke-width="1" opacity="0.4"/>
  
  <!-- Paws -->
  <ellipse cx="10" cy="25" rx="2" ry="2.5" fill="none" stroke="#0000FF" stroke-width="1.5"/>
  <ellipse cx="22" cy="25" rx="2" ry="2.5" fill="none" stroke="#0000FF" stroke-width="1.5"/>
</svg>