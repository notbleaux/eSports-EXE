  <path d="M88 48 Q96 32 112 48" fill="none" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M92 64 Q100 56 108 64" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <path d="M96 80 Q104 72 112 80" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  
  <!-- Right Ear (upright) -->
  <path d="M160 96 L176 16 Q192 0 208 16 L192 112" 
