  <!-- Body contour -->
  <path d="M104 192 Q128 200 152 192" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  
  <!-- Paws -->
  <ellipse cx="80" cy="208" rx="16" ry="20" fill="none" stroke="#0000FF" stroke-width="3"/>
  <line x1="72" y1="200" x2="72" y2="216" stroke="#0000FF" stroke-width="2"/>
  <line x1="80" y1="196" x2="80" y2="220" stroke="#0000FF" stroke-width="2"/>
  <line x1="88" y1="200" x2="88" y2="216" stroke="#0000FF" stroke-width="2"/>
  
  <ellipse cx="176" cy="208" rx="16" ry="20" fill="none" stroke="#0000FF" stroke-width="3"/>
  <line x1="168" y1="200" x2="168" y2="216" stroke="#0000FF" stroke-width="2"/>
  <line x1="176" y1="196" x2="176" y2="220" stroke="#0000FF" stroke-width="2"/>
  <line x1="184" y1="200" x2="184" y2="216" stroke="#0000FF" stroke-width="2"/>
