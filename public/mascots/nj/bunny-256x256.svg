  <path d="M176 32 Q192 24 200 32" fill="none" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M180 48 Q192 42 198 48" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  
  <!-- Head -->
  <ellipse cx="128" cy="128" rx="56" ry="48" fill="none" stroke="#0000FF" stroke-width="4"/>
  
  <!-- Face -->
  <ellipse cx="128" cy="144" rx="24" ry="20" fill="none" stroke="#0000FF" stroke-width="3"/>
  <ellipse cx="128" cy="136" rx="12" ry="10" fill="#0000FF"/>
  
  <!-- Eyes -->
  <ellipse cx="100" cy="116" rx="10" ry="12" fill="#0000FF"/>
  <ellipse cx="102" cy="114" rx="4" ry="5" fill="#FFF"/>
  <ellipse cx="156" cy="116" rx="10" ry="12" fill="#0000FF"/>
  <ellipse cx="154" cy="114" rx="4" ry="5" fill="#FFF"/>
  
  <!-- Eyelashes -->
  <path d="M88 104 L80 96" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M168 104 L176 96" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Cheeks -->
  <path d="M80 136 Q88 140 96 136" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <path d="M160 136 Q168 140 176 136" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  
  <!-- Mouth -->
  <path d="M112 160 Q128 176 144 160" fill="none" stroke="#0000FF" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Body -->
  <path d="M80 176 Q80 224 128 232 Q176 224 176 176" 
