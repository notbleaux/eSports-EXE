<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- NJ Bunny - Ditto Variant (morphing, ethereal) -->
  <!-- Wavy ears -->
  <path d="M12 12 Q10 8 11 5 Q13 3 15 8 Q16 11 15 13" 
        fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="2,1"/>
  <path d="M17 13 Q16 11 17 8 Q19 3 21 5 Q22 8 20 12" 
        fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="2,1"/>
  <!-- Morphing head -->
  <ellipse cx="16" cy="16" rx="7" ry="6" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-dasharray="3,2"/>
  <ellipse cx="16" cy="18" rx="3" ry="2.5" fill="none" stroke="#0000FF" stroke-width="1.2"/>
  <ellipse cx="16" cy="17" rx="1.2" ry="1" fill="#0000FF"/>
  <!-- Dreamy eyes -->
  <circle cx="12.5" cy="14.5" r="1" fill="none" stroke="#0000FF" stroke-width="1"/>
  <circle cx="19.5" cy="14.5" r="1" fill="none" stroke="#0000FF" stroke-width="1"/>
  <!-- Wavy mouth -->
  <path d="M14 20 Q15 21 16 20 Q17 21 18 20" fill="none" stroke="#0000FF" stroke-width="1" stroke-linecap="round"/>
  <!-- Flowing body -->
  <path d="M10 22 Q9 25 16 27 Q23 25 22 22" 
        fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3,2"/>
  <ellipse cx="10" cy="25" rx="1.8" ry="2.2" fill="none" stroke="#0000FF" stroke-width="1.2"/>
  <ellipse cx="22" cy="25" rx="1.8" ry="2.2" fill="none" stroke="#0000FF" stroke-width="1.2"/>
</svg>