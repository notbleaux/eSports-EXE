<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Left Ear (floppy) -->
  <path d="M48 40 Q32 16 40 8 Q56 0 64 24 Q68 40 64 56" 
        fill="none" stroke="#0000FF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M44 24 Q48 16 56 24" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M46 32 Q50 28 54 32" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  
  <!-- Right Ear (upright) -->
  <path d="M80 48 L88 8 Q96 0 104 8 L96 56" 
        fill="none" stroke="#0000FF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M88 16 Q96 12 100 16" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Head -->
  <ellipse cx="64" cy="64" rx="28" ry="24" fill="none" stroke="#0000FF" stroke-width="3"/>
  
  <!-- Face -->
  <ellipse cx="64" cy="72" rx="12" ry="10" fill="none" stroke="#0000FF" stroke-width="2.5"/>
  <ellipse cx="64" cy="68" rx="6" ry="5" fill="#0000FF"/>
  
  <!-- Eyes -->
  <ellipse cx="50" cy="58" rx="5" ry="6" fill="#0000FF"/>
  <circle cx="51" cy="57" r="2" fill="#FFF"/>
  <ellipse cx="78" cy="58" rx="5" ry="6" fill="#0000FF"/>
  <circle cx="77" cy="57" r="2" fill="#FFF"/>
  
  <!-- Eyelashes -->
  <path d="M44 52 L40 48" stroke="#0000FF" stroke-width="2" stroke-linecap="round"/>
  <path d="M84 52 L88 48" stroke="#0000FF" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Mouth -->
  <path d="M56 80 Q64 88 72 80" fill="none" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Body -->
  <path d="M40 88 Q40 112 64 116 Q88 112 88 88" 
        fill="none" stroke="#0000FF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Body detail -->
  <path d="M52 96 Q64 100 76 96" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Paws -->
  <ellipse cx="40" cy="104" rx="8" ry="10" fill="none" stroke="#0000FF" stroke-width="2.5"/>
  <line x1="36" y1="100" x2="36" y2="108" stroke="#0000FF" stroke-width="1.5"/>
  <line x1="40" y1="98" x2="40" y2="110" stroke="#0000FF" stroke-width="1.5"/>
  <line x1="44" y1="100" x2="44" y2="108" stroke="#0000FF" stroke-width="1.5"/>
  
  <ellipse cx="88" cy="104" rx="8" ry="10" fill="none" stroke="#0000FF" stroke-width="2.5"/>
  <line x1="84" y1="100" x2="84" y2="108" stroke="#0000FF" stroke-width="1.5"/>
  <line x1="88" y1="98" x2="88" y2="110" stroke="#0000FF" stroke-width="1.5"/>
  <line x1="92" y1="100" x2="92" y2="108" stroke="#0000FF" stroke-width="1.5"/>
</svg>