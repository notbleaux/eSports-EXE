<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Minimalist line art fox - NJ Style -->
  
  <!-- Tail (fluffy, flowing) -->
  <path d="M4 20 Q2 16 4 12 Q6 8 10 10 Q8 14 6 18 Q5 20 4 20Z" 
        fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M4 12 Q3 10 4 8" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Body (simple rounded shape) -->
  <path d="M10 22 Q10 16 16 15 Q22 14 26 18 Q28 22 26 26 Q24 30 18 29 Q12 28 10 22Z" 
        fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Head (circular with pointed ears) -->
  <circle cx="18" cy="10" r="6" fill="none" stroke="#0000FF" stroke-width="2"/>
  
  <!-- Ears (triangular, pointed) -->
  <path d="M13 6 L11 2 L15 5" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M23 6 L25 2 L21 5" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Snout (small rounded) -->
  <ellipse cx="18" cy="13" rx="2.5" ry="1.5" fill="none" stroke="#0000FF" stroke-width="1.5"/>
  <circle cx="18" cy="12.5" r="0.8" fill="#0000FF"/>
  
  <!-- Eyes (clever, cute expression) -->
  <circle cx="15" cy="9" r="1.2" fill="#0000FF"/>
  <circle cx="15.2" cy="8.7" r="0.4" fill="#FFF"/>
  <circle cx="21" cy="9" r="1.2" fill="#0000FF"/>
  <circle cx="20.8" cy="8.7" r="0.4" fill="#FFF"/>
  
  <!-- Eyebrows (playful arch) -->
  <path d="M13 7 Q15 6 17 7" fill="none" stroke="#0000FF" stroke-width="1" stroke-linecap="round"/>
  <path d="M19 7 Q21 6 23 7" fill="none" stroke="#0000FF" stroke-width="1" stroke-linecap="round"/>
  
  <!-- Paws (simple circles) -->
  <circle cx="12" cy="26" r="2" fill="none" stroke="#0000FF" stroke-width="1.5"/>
  <circle cx="24" cy="26" r="2" fill="none" stroke="#0000FF" stroke-width="1.5"/>
</svg>