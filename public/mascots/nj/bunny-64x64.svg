<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Left Ear (floppy) -->
  <path d="M24 20 Q16 8 20 4 Q28 0 32 12 Q34 20 32 28" 
        fill="none" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M22 12 Q24 8 28 12" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Right Ear (upright) -->
  <path d="M40 24 L44 4 Q48 0 52 4 L48 28" 
        fill="none" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M44 8 Q48 6 50 8" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Head -->
  <ellipse cx="32" cy="32" rx="14" ry="12" fill="none" stroke="#0000FF" stroke-width="2.5"/>
  
  <!-- Face -->
  <ellipse cx="32" cy="36" rx="6" ry="5" fill="none" stroke="#0000FF" stroke-width="2"/>
  <ellipse cx="32" cy="34" rx="3" ry="2.5" fill="#0000FF"/>
  
  <!-- Eyes -->
  <ellipse cx="25" cy="29" rx="2.5" ry="3" fill="#0000FF"/>
  <circle cx="25.5" cy="28.5" r="1" fill="#FFF"/>
  <ellipse cx="39" cy="29" rx="2.5" ry="3" fill="#0000FF"/>
  <circle cx="38.5" cy="28.5" r="1" fill="#FFF"/>
  
  <!-- Eyelashes -->
  <path d="M22 26 L20 24" stroke="#0000FF" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M42 26 L44 24" stroke="#0000FF" stroke-width="1.2" stroke-linecap="round"/>
  
  <!-- Mouth -->
  <path d="M28 40 Q32 44 36 40" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Body -->
  <path d="M20 44 Q20 56 32 58 Q44 56 44 44" 
        fill="none" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Paws -->
  <ellipse cx="20" cy="52" rx="4" ry="5" fill="none" stroke="#0000FF" stroke-width="2"/>
  <ellipse cx="44" cy="52" rx="4" ry="5" fill="none" stroke="#0000FF" stroke-width="2"/>
</svg>