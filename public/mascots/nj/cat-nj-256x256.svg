<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Cat in Bunny Onesie - NJ Style 256x256 (Line Art) -->
  
  <!-- Tail peeking from onesie -->
  <g className="tail">
    <path d="M48 176 Q32 144 48 112 Q64 80 96 96 Q80 128 64 160 Q56 176 48 176Z" fill="none" stroke="#F72585" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M48 112 Q40 96 48 80 Q56 64 72 80" fill="none" stroke="#F72585" stroke-width="3" stroke-linecap="round"/>
    <path d="M56 168 Q72 156 80 140" fill="none" stroke="#F72585" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M64 152 Q76 142 84 130" fill="none" stroke="#F72585" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <path d="M72 136 Q82 128 88 118" fill="none" stroke="#F72585" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  </g>
  
  <!-- Onesie Body outline -->
  <g className="onesie">
    <ellipse cx="128" cy="176" rx="72" ry="56" fill="none" stroke="#F72585" stroke-width="4"/>
    <!-- Belly patch outline -->
    <ellipse cx="128" cy="184" rx="40" ry="32" fill="none" stroke="#F72585" stroke-width="2.5" opacity="0.6"/>
    <!-- Zipper -->
    <line x1="128" y1="128" x2="128" y2="208" stroke="#F72585" stroke-width="3" stroke-dasharray="6,4"/>
    <circle cx="128" cy="124" r="8" fill="#F72585"/>
    <rect x="124" y="132" width="8" height="16" fill="#F72585" opacity="0.5"/>
    <!-- Bottom hem -->
    <path d="M80 220 Q128 232 176 220" stroke="#F72585" stroke-width="6" fill="none"/>
    <!-- Hem detail -->
    <line x1="96" y1="220" x2="96" y2="226" stroke="#F72585" stroke-width="2"/>
    <line x1="128" y1="224" x2="128" y2="230" stroke="#F72585" stroke-width="2"/>
    <line x1="160" y1="220" x2="160" y2="226" stroke="#F72585" stroke-width="2"/>
  </g>
  
  <!-- Onesie Arms -->
  <g className="arm-left">
    <path d="M64 160 Q48 176 56 192 Q64 208 80 192" fill="none" stroke="#F72585" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Cuff -->
    <rect x="58" y="184" width="16" height="8" fill="none" stroke="#F72585" stroke-width="2" rx="2"/>
    <!-- Paw -->
    <ellipse cx="60" cy="190" rx="10" ry="8" fill="none" stroke="#F72585" stroke-width="2.5"/>
    <!-- Paw pads -->
    <ellipse cx="56" cy="188" rx="2.5" ry="2" fill="#F72585" opacity="0.5"/>
    <ellipse cx="60" cy="192" rx="2.5" ry="2" fill="#F72585" opacity="0.5"/>
    <ellipse cx="64" cy="188" rx="2.5" ry="2" fill="#F72585" opacity="0.5"/>
  </g>
  <g className="arm-right">
    <path d="M192 160 Q208 176 200 192 Q192 208 176 192" fill="none" stroke="#F72585" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Cuff -->
    <rect x="182" y="184" width="16" height="8" fill="none" stroke="#F72585" stroke-width="2" rx="2"/>
    <!-- Paw -->
    <ellipse cx="196" cy="190" rx="10" ry="8" fill="none" stroke="#F72585" stroke-width="2.5"/>
    <!-- Paw pads -->
    <ellipse cx="192" cy="188" rx="2.5" ry="2" fill="#F72585" opacity="0.5"/>
    <ellipse cx="196" cy="192" rx="2.5" ry="2" fill="#F72585" opacity="0.5"/>
    <ellipse cx="200" cy="188" rx="2.5" ry="2" fill="#F72585" opacity="0.5"/>
  </g>
  
  <!-- Bunny Ears (hood) -->
  <g className="bunny-ears">
    <!-- Left ear -->
    <ellipse cx="88" cy="64" rx="20" ry="48" fill="none" stroke="#F72585" stroke-width="4" transform="rotate(-8 88 64)"/>
    <ellipse cx="88" cy="64" rx="10" ry="28" fill="none" stroke="#F72585" stroke-width="2" transform="rotate(-8 88 64)" opacity="0.6"/>
    <!-- Inner detail -->
    <path d="M88 32 L84 56 L92 56Z" fill="#F72585" opacity="0.25" transform="rotate(-8 88 64)"/>
    <ellipse cx="88" cy="88" rx="12" ry="8" fill="#F72585" opacity="0.15" transform="rotate(-8 88 64)"/>
    
    <!-- Right ear -->
    <ellipse cx="168" cy="64" rx="20" ry="48" fill="none" stroke="#F72585" stroke-width="4" transform="rotate(8 168 64)"/>
    <ellipse cx="168" cy="64" rx="10" ry="28" fill="none" stroke="#F72585" stroke-width="2" transform="rotate(8 168 64)" opacity="0.6"/>
    <!-- Inner detail -->
    <path d="M168 32 L164 56 L172 56Z" fill="#F72585" opacity="0.25" transform="rotate(8 168 64)"/>
    <ellipse cx="168" cy="88" rx="12" ry="8" fill="#F72585" opacity="0.15" transform="rotate(8 168 64)"/>
  </g>
  
  <!-- Cat Head -->
  <g className="head">
    <!-- Face outline -->
    <ellipse cx="128" cy="104" rx="64" ry="56" fill="none" stroke="#F72585" stroke-width="4"/>
    <!-- Head contour -->
    <path d="M96 88 Q128 80 160 88" fill="none" stroke="#F72585" stroke-width="2" opacity="0.4"/>
    <path d="M104 96 Q128 100 152 96" fill="none" stroke="#F72585" stroke-width="1.5" opacity="0.3"/>
    <!-- Muzzle outline -->
    <ellipse cx="128" cy="128" rx="32" ry="24" fill="none" stroke="#F72585" stroke-width="3"/>
    
    <!-- Forehead marking -->
    <path d="M112 72 Q128 80 144 72" fill="none" stroke="#F72585" stroke-width="2" opacity="0.5"/>
    
    <!-- Cat Ears (peeking from hood) -->
    <path d="M80 72 L64 32 L96 64Z" fill="none" stroke="#F72585" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M80 56 L72 40 L88 52Z" fill="none" stroke="#F72585" stroke-width="2"/>
    <path d="M176 72 L192 32 L160 64Z" fill="none" stroke="#F72585" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M176 56 L184 40 L168 52Z" fill="none" stroke="#F72585" stroke-width="2"/>
    
    <!-- Eyes (cute, cheeky) -->
    <g className="eye-left">
      <ellipse cx="104" cy="96" rx="16" ry="20" fill="#F72585"/>
      <ellipse cx="106" cy="92" rx="6" ry="8" fill="#FFF"/>
      <circle cx="108" cy="98" rx="2.5" fill="#FFF" opacity="0.7"/>
    </g>
    <g className="eye-right">
      <ellipse cx="152" cy="96" rx="16" ry="20" fill="#F72585"/>
      <ellipse cx="150" cy="92" rx="6" ry="8" fill="#FFF"/>
      <circle cx="148" cy="98" rx="2.5" fill="#FFF" opacity="0.7"/>
    </g>
    
    <!-- Cheeky eyebrows -->
    <path d="M88 76 Q104 72 116 80" fill="none" stroke="#F72585" stroke-width="3" stroke-linecap="round"/>
    <path d="M140 80 Q152 72 168 76" fill="none" stroke="#F72585" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Nose -->
    <ellipse cx="128" cy="120" rx="8" ry="6" fill="#F72585"/>
    <ellipse cx="124" cy="118" rx="2.5" ry="1.5" fill="#FFF" opacity="0.5"/>
    
    <!-- Cheeky smile -->
    <path d="M112 132 Q128 144 144 128" fill="none" stroke="#F72585" stroke-width="3" stroke-linecap="round"/>
    <path d="M140 126 L144 128 L142 134" fill="none" stroke="#F72585" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Whiskers -->
    <line x1="80" y1="120" x2="56" y2="116" stroke="#F72585" stroke-width="1.5" opacity="0.6"/>
    <line x1="80" y1="128" x2="56" y2="128" stroke="#F72585" stroke-width="1.5" opacity="0.6"/>
    <line x1="80" y1="136" x2="56" y2="140" stroke="#F72585" stroke-width="1.5" opacity="0.6"/>
    <line x1="176" y1="120" x2="200" y2="116" stroke="#F72585" stroke-width="1.5" opacity="0.6"/>
    <line x1="176" y1="128" x2="200" y2="128" stroke="#F72585" stroke-width="1.5" opacity="0.6"/>
    <line x1="176" y1="136" x2="200" y2="140" stroke="#F72585" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Cheek markings -->
    <ellipse cx="96" cy="112" rx="6" ry="4" fill="#F72585" opacity="0.3"/>
    <ellipse cx="160" cy="112" rx="6" ry="4" fill="#F72585" opacity="0.3"/>
  </g>
</svg>