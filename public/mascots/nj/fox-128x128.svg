<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Minimalist line art fox - NJ Style -->
  
  <!-- Tail (fluffy, flowing) -->
  <path d="M16 80 Q8 64 16 48 Q24 32 40 40 Q32 56 24 72 Q20 80 16 80Z" 
        fill="none" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M16 48 Q12 40 16 32" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round"/>
  <!-- Tail fluff lines -->
  <path d="M20 72 Q28 64 32 56" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M24 64 Q30 58 34 52" fill="none" stroke="#0000FF" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <path d="M28 56 Q33 51 36 46" fill="none" stroke="#0000FF" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  
  <!-- Body (simple rounded shape) -->
  <path d="M40 88 Q40 64 64 60 Q88 56 104 72 Q112 88 104 104 Q96 120 72 116 Q48 112 40 88Z" 
        fill="none" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Chest marking -->
  <path d="M56 76 Q64 84 72 76" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M58 82 Q64 88 70 82" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Head (circular with pointed ears) -->
  <circle cx="72" cy="40" rx="24" ry="22" fill="none" stroke="#0000FF" stroke-width="2.5"/>
  
  <!-- Ears (triangular, pointed) -->
  <path d="M52 24 L44 8 L60 20" fill="none" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M52 20 L48 12 L56 18" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round"/>
  
  <path d="M92 24 L100 8 L84 20" fill="none" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M92 20 L96 12 L88 18" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Snout (small rounded) -->
  <ellipse cx="72" cy="52" rx="10" ry="6" fill="none" stroke="#0000FF" stroke-width="2.5"/>
  <ellipse cx="72" cy="50" rx="4" ry="3" fill="#0000FF"/>
  
  <!-- Mouth (small smile) -->
  <path d="M64 56 Q72 60 80 54" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round"/>
  <path d="M76 53 L80 54 L78 58" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Eyes (clever, cute expression) -->
  <ellipse cx="60" cy="36" rx="5" ry="6" fill="#0000FF"/>
  <circle cx="61" cy="35" r="1.8" fill="#FFF"/>
  <ellipse cx="84" cy="36" rx="5" ry="6" fill="#0000FF"/>
  <circle cx="83" cy="35" r="1.8" fill="#FFF"/>
  
  <!-- Eyebrows (playful arch) -->
  <path d="M52 28 Q60 24 68 28" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round"/>
  <path d="M76 28 Q84 24 92 28" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Cheek details -->
  <path d="M52 44 Q56 46 60 44" fill="none" stroke="#0000FF" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <path d="M84 44 Q88 46 92 44" fill="none" stroke="#0000FF" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Paws (simple circles with details) -->
  <circle cx="48" cy="104" r="8" fill="none" stroke="#0000FF" stroke-width="2.5"/>
  <line x1="44" y1="100" x2="44" y2="108" stroke="#0000FF" stroke-width="1.5"/>
  <line x1="48" y1="98" x2="48" y2="110" stroke="#0000FF" stroke-width="1.5"/>
  <line x1="52" y1="100" x2="52" y2="108" stroke="#0000FF" stroke-width="1.5"/>
  
  <circle cx="96" cy="104" r="8" fill="none" stroke="#0000FF" stroke-width="2.5"/>
  <line x1="92" y1="100" x2="92" y2="108" stroke="#0000FF" stroke-width="1.5"/>
  <line x1="96" y1="98" x2="96" y2="110" stroke="#0000FF" stroke-width="1.5"/>
  <line x1="100" y1="100" x2="100" y2="108" stroke="#0000FF" stroke-width="1.5"/>
</svg>