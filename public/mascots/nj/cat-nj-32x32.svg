<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Cat in Bunny Onesie - NJ Style 32x32 (Line Art) - Electric Blue -->
  
  <!-- Tail peeking from onesie -->
  <g className="tail">
    <path d="M6 22 Q4 18 6 14 Q8 10 12 14" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round"/>
    <path d="M6 14 Q5 12 6 10" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- Onesie Body outline -->
  <g className="onesie">
    <ellipse cx="16" cy="22" rx="9" ry="7" fill="none" stroke="#0000FF" stroke-width="2"/>
    <!-- Belly patch outline -->
    <ellipse cx="16" cy="23" rx="5" ry="4" fill="none" stroke="#0000FF" stroke-width="1" opacity="0.6"/>
    <!-- Zipper -->
    <line x1="16" y1="16" x2="16" y2="26" stroke="#0000FF" stroke-width="1" stroke-dasharray="2,1"/>
    <circle cx="16" cy="15.5" r="1.2" fill="#0000FF"/>
  </g>
  
  <!-- Onesie Arms -->
  <g className="arm-left">
    <ellipse cx="9" cy="20" rx="2.5" ry="4" fill="none" stroke="#0000FF" stroke-width="1.5"/>
    <circle cx="8" cy="23" r="1.5" fill="none" stroke="#0000FF" stroke-width="1"/>
  </g>
  <g className="arm-right">
    <ellipse cx="23" cy="20" rx="2.5" ry="4" fill="none" stroke="#0000FF" stroke-width="1.5"/>
    <circle cx="24" cy="23" r="1.5" fill="none" stroke="#0000FF" stroke-width="1"/>
  </g>
  
  <!-- Bunny Ears (hood) -->
  <g className="bunny-ears">
    <ellipse cx="11" cy="8" rx="3" ry="6" fill="none" stroke="#0000FF" stroke-width="2" transform="rotate(-15 11 8)"/>
    <ellipse cx="11" cy="8" rx="1.5" ry="3.5" fill="none" stroke="#0000FF" stroke-width="1" transform="rotate(-15 11 8)" opacity="0.6"/>
    <ellipse cx="21" cy="8" rx="3" ry="6" fill="none" stroke="#0000FF" stroke-width="2" transform="rotate(15 21 8)"/>
    <ellipse cx="21" cy="8" rx="1.5" ry="3.5" fill="none" stroke="#0000FF" stroke-width="1" transform="rotate(15 21 8)" opacity="0.6"/>
  </g>
  
  <!-- Cat Head -->
  <g className="head">
    <!-- Face outline -->
    <ellipse cx="16" cy="13" rx="8" ry="7" fill="none" stroke="#0000FF" stroke-width="2"/>
    <!-- Muzzle outline -->
    <ellipse cx="16" cy="16" rx="4" ry="3" fill="none" stroke="#0000FF" stroke-width="1.5"/>
    
    <!-- Cat Ears (peeking from hood) -->
    <path d="M10 8 L8 4 L12 7Z" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M22 8 L24 4 L20 7Z" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Eyes (simple, cheeky) -->
    <g className="eye-left">
      <ellipse cx="13" cy="12" rx="2" ry="2.5" fill="#0000FF"/>
      <ellipse cx="13.3" cy="11.5" rx="0.8" ry="1" fill="#FFF"/>
    </g>
    <g className="eye-right">
      <ellipse cx="19" cy="12" rx="2" ry="2.5" fill="#0000FF"/>
      <ellipse cx="18.7" cy="11.5" rx="0.8" ry="1" fill="#FFF"/>
    </g>
    
    <!-- Cheeky eyebrows -->
    <path d="M11 9 Q13 8 14 9.5" fill="none" stroke="#0000FF" stroke-width="1" stroke-linecap="round"/>
    <path d="M18 9.5 Q19 8 21 9" fill="none" stroke="#0000FF" stroke-width="1" stroke-linecap="round"/>
    
    <!-- Nose -->
    <ellipse cx="16" cy="15" rx="1" ry="0.7" fill="#0000FF"/>
    
    <!-- Cheeky smile -->
    <path d="M14 16.5 Q16 18 18 16" fill="none" stroke="#0000FF" stroke-width="1" stroke-linecap="round"/>
    <path d="M17.5 16.2 L18 16 L18.3 16.5" fill="none" stroke="#0000FF" stroke-width="0.8" stroke-linecap="round"/>
    
    <!-- Whiskers -->
    <line x1="10" y1="15" x2="7" y2="14.5" stroke="#0000FF" stroke-width="0.5" opacity="0.6"/>
    <line x1="10" y1="16" x2="7" y2="16" stroke="#0000FF" stroke-width="0.5" opacity="0.6"/>
    <line x1="22" y1="15" x2="25" y2="14.5" stroke="#0000FF" stroke-width="0.5" opacity="0.6"/>
    <line x1="22" y1="16" x2="25" y2="16" stroke="#0000FF" stroke-width="0.5" opacity="0.6"/>
  </g>
</svg>
