<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Cat in Bunny Onesie - NJ Style 64x64 (Line Art) - Electric Blue -->
  
  <!-- Tail peeking from onesie -->
  <g className="tail">
    <path d="M12 44 Q8 36 12 28 Q16 20 24 28 Q20 36 16 44 Q14 48 12 44Z" fill="none" stroke="#0000FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M12 28 Q10 24 12 20 Q14 16 18 20" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round"/>
    <path d="M14 40 Q18 36 20 32" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>
  
  <!-- Onesie Body outline -->
  <g className="onesie">
    <ellipse cx="32" cy="44" rx="18" ry="14" fill="none" stroke="#0000FF" stroke-width="2.5"/>
    <!-- Belly patch outline -->
    <ellipse cx="32" cy="46" rx="10" ry="8" fill="none" stroke="#0000FF" stroke-width="1.5" opacity="0.6"/>
    <!-- Zipper -->
    <line x1="32" y1="32" x2="32" y2="52" stroke="#0000FF" stroke-width="1.5" stroke-dasharray="3,2"/>
    <circle cx="32" cy="31" r="2.5" fill="#0000FF"/>
    <!-- Paws -->
    <ellipse cx="20" cy="54" rx="4" ry="3" fill="none" stroke="#0000FF" stroke-width="1.5"/>
    <ellipse cx="44" cy="54" rx="4" ry="3" fill="none" stroke="#0000FF" stroke-width="1.5"/>
  </g>
  
  <!-- Onesie Arms -->
  <g className="arm-left">
    <ellipse cx="16" cy="40" rx="5" ry="8" fill="none" stroke="#0000FF" stroke-width="2"/>
    <circle cx="14" cy="46" rx="3" ry="2.5" fill="none" stroke="#0000FF" stroke-width="1.5"/>
  </g>
  <g className="arm-right">
    <ellipse cx="48" cy="40" rx="5" ry="8" fill="none" stroke="#0000FF" stroke-width="2"/>
    <circle cx="50" cy="46" rx="3" ry="2.5" fill="none" stroke="#0000FF" stroke-width="1.5"/>
  </g>
  
  <!-- Bunny Ears (hood) -->
  <g className="bunny-ears">
    <ellipse cx="22" cy="16" rx="5" ry="12" fill="none" stroke="#0000FF" stroke-width="2.5" transform="rotate(-12 22 16)"/>
    <ellipse cx="22" cy="16" rx="2.5" ry="7" fill="none" stroke="#0000FF" stroke-width="1.2" transform="rotate(-12 22 16)" opacity="0.6"/>
    <ellipse cx="42" cy="16" rx="5" ry="12" fill="none" stroke="#0000FF" stroke-width="2.5" transform="rotate(12 42 16)"/>
    <ellipse cx="42" cy="16" rx="2.5" ry="7" fill="none" stroke="#0000FF" stroke-width="1.2" transform="rotate(12 42 16)" opacity="0.6"/>
  </g>
  
  <!-- Cat Head -->
  <g className="head">
    <!-- Face outline -->
    <ellipse cx="32" cy="26" rx="16" ry="14" fill="none" stroke="#0000FF" stroke-width="2.5"/>
    <!-- Muzzle outline -->
    <ellipse cx="32" cy="32" rx="8" ry="6" fill="none" stroke="#0000FF" stroke-width="2"/>
    <!-- Forehead marking -->
    <path d="M24 20 Q32 24 40 20" fill="none" stroke="#0000FF" stroke-width="1" opacity="0.5"/>
    
    <!-- Cat Ears (peeking from hood) -->
    <path d="M20 18 L16 8 L24 16Z" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M44 18 L48 8 L40 16Z" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Eyes (cute, cheeky) -->
    <g className="eye-left">
      <ellipse cx="26" cy="24" rx="4" ry="5" fill="#0000FF"/>
      <ellipse cx="26.5" cy="23" rx="1.5" ry="2" fill="#FFF"/>
      <circle cx="26.8" cy="25" r="0.8" fill="#FFF" opacity="0.7"/>
    </g>
    <g className="eye-right">
      <ellipse cx="38" cy="24" rx="4" ry="5" fill="#0000FF"/>
      <ellipse cx="37.5" cy="23" rx="1.5" ry="2" fill="#FFF"/>
      <circle cx="37.2" cy="25" r="0.8" fill="#FFF" opacity="0.7"/>
    </g>
    
    <!-- Cheeky eyebrows -->
    <path d="M22 18 Q26 16 30 19" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M34 19 Q38 16 42 18" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Nose -->
    <ellipse cx="32" cy="30" rx="2" ry="1.5" fill="#0000FF"/>
    <ellipse cx="31" cy="29.5" rx="0.6" ry="0.4" fill="#FFF" opacity="0.5"/>
    
    <!-- Cheeky smile -->
    <path d="M28 33 Q32 36 36 32" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M35 31.5 L36 32 L36.5 33" fill="none" stroke="#0000FF" stroke-width="1" stroke-linecap="round"/>
    
    <!-- Whiskers -->
    <line x1="20" y1="30" x2="14" y2="29" stroke="#0000FF" stroke-width="0.8" opacity="0.6"/>
    <line x1="20" y1="32" x2="14" y2="32" stroke="#0000FF" stroke-width="0.8" opacity="0.6"/>
    <line x1="20" y1="34" x2="14" y2="35" stroke="#0000FF" stroke-width="0.8" opacity="0.6"/>
    <line x1="44" y1="30" x2="50" y2="29" stroke="#0000FF" stroke-width="0.8" opacity="0.6"/>
    <line x1="44" y1="32" x2="50" y2="32" stroke="#0000FF" stroke-width="0.8" opacity="0.6"/>
    <line x1="44" y1="34" x2="50" y2="35" stroke="#0000FF" stroke-width="0.8" opacity="0.6"/>
  </g>
</svg>
