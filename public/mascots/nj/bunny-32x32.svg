<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- NJ Style Line Art Bunny - Classic Blue -->
  
  <!-- Left Ear (floppy) -->
  <path d="M12 10 Q8 4 10 2 Q14 0 16 6 Q17 10 16 14" 
        fill="none" stroke="#0000FF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M11 6 Q12 4 14 6" fill="none" stroke="#0000FF" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Right Ear (upright) -->
  <path d="M20 12 L22 2 Q24 0 26 2 L24 14" 
        fill="none" stroke="#0000FF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M22 4 Q24 3 25 4" fill="none" stroke="#0000FF" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Head -->
  <ellipse cx="16" cy="16" rx="7" ry="6" fill="none" stroke="#0000FF" stroke-width="1.8"/>
  
  <!-- Face -->
  <ellipse cx="16" cy="18" rx="3" ry="2.5" fill="none" stroke="#0000FF" stroke-width="1.5"/>
  <ellipse cx="16" cy="17" rx="1.5" ry="1.2" fill="#0000FF"/>
  
  <!-- Eyes -->
  <circle cx="12.5" cy="14.5" r="1.3" fill="#0000FF"/>
  <circle cx="12.7" cy="14.3" r="0.5" fill="#FFF"/>
  <circle cx="19.5" cy="14.5" r="1.3" fill="#0000FF"/>
  <circle cx="19.3" cy="14.3" r="0.5" fill="#FFF"/>
  
  <!-- Eyelashes -->
  <path d="M11 13 L10 12" stroke="#0000FF" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M21 13 L22 12" stroke="#0000FF" stroke-width="0.8" stroke-linecap="round"/>
  
  <!-- Mouth -->
  <path d="M14 20 Q16 22 18 20" fill="none" stroke="#0000FF" stroke-width="1.2" stroke-linecap="round"/>
  
  <!-- Body -->
  <path d="M10 22 Q10 28 16 29 Q22 28 22 22" 
        fill="none" stroke="#0000FF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Paws -->
  <ellipse cx="10" cy="26" rx="2" ry="2.5" fill="none" stroke="#0000FF" stroke-width="1.5"/>
  <ellipse cx="22" cy="26" rx="2" ry="2.5" fill="none" stroke="#0000FF" stroke-width="1.5"/>
</svg>