<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- NJ Style Owl - 128x128 - Minimalist Line Art -->
  
  <!-- Body - Rounded -->
  <ellipse cx="64" cy="76" rx="36" ry="40" stroke="#0000FF" stroke-width="2" fill="none"/>
  
  <!-- Body Detail Lines -->
  <path d="M48 92 Q64 102 80 92" stroke="#0000FF" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M44 84 Q64 94 84 84" stroke="#0000FF" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M52 100 Q64 106 76 100" stroke="#0000FF" stroke-width="1" fill="none" opacity="0.3"/>
  
  <!-- Head - Circular -->
  <circle cx="64" cy="40" rx="28" ry="26" stroke="#0000FF" stroke-width="2" fill="none"/>
  
  <!-- Face Disc Outline -->
  <ellipse cx="64" cy="44" rx="20" ry="16" stroke="#0000FF" stroke-width="1" fill="none" opacity="0.3"/>
  
  <!-- Large Wise Eyes - Simple Circles -->
  <circle cx="52" cy="36" r="10" stroke="#0000FF" stroke-width="2" fill="none"/>
  <circle cx="76" cy="36" r="10" stroke="#0000FF" stroke-width="2" fill="none"/>
  
  <!-- Eye Detail Rings -->
  <circle cx="52" cy="36" r="7" stroke="#0000FF" stroke-width="1" fill="none" opacity="0.4"/>
  <circle cx="76" cy="36" r="7" stroke="#0000FF" stroke-width="1" fill="none" opacity="0.4"/>
  
  <!-- Pupils -->
  <circle cx="52" cy="36" r="4" fill="#0000FF"/>
  <circle cx="76" cy="36" r="4" fill="#0000FF"/>
  
  <!-- Eye Shine -->
  <circle cx="55" cy="33" r="1.5" fill="#FFFFFF"/>
  <circle cx="79" cy="33" r="1.5" fill="#FFFFFF"/>
  <circle cx="50" cy="38" r="1" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="74" cy="38" r="1" fill="#FFFFFF" opacity="0.6"/>
  
  <!-- Small Beak -->
  <path d="M60 48 L64 54 L68 48" stroke="#0000FF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M62 50 L64 52 L66 50" stroke="#0000FF" stroke-width="1" fill="none" opacity="0.5"/>
  
  <!-- Ear Tufts - Minimal -->
  <path d="M40 20 L36 8 L48 16" stroke="#0000FF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M88 20 L92 8 L80 16" stroke="#0000FF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Inner Ear Lines -->
  <path d="M42 16 L40 10 L46 14" stroke="#0000FF" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M86 16 L88 10 L82 14" stroke="#0000FF" stroke-width="1" fill="none" opacity="0.5"/>
  
  <!-- Wing Lines -->
  <path d="M36 72 Q28 80 36 96" stroke="#0000FF" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M92 72 Q100 80 92 96" stroke="#0000FF" stroke-width="1.5" fill="none" opacity="0.6"/>
  
  <!-- Wing Detail -->
  <path d="M32 80 Q28 86 32 94" stroke="#0000FF" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M96 80 Q100 86 96 94" stroke="#0000FF" stroke-width="1" fill="none" opacity="0.4"/>
  
  <!-- Feet -->
  <g opacity="0.5">
    <line x1="52" y1="114" x2="52" y2="118" stroke="#0000FF" stroke-width="2" stroke-linecap="round"/>
    <line x1="64" y1="114" x2="64" y2="118" stroke="#0000FF" stroke-width="2" stroke-linecap="round"/>
    <line x1="76" y1="114" x2="76" y2="118" stroke="#0000FF" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Feather Detail on Head -->
  <path d="M56 18 Q52 20 54 24" stroke="#0000FF" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M64 16 Q64 20 64 24" stroke="#0000FF" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M72 18 Q76 20 74 24" stroke="#0000FF" stroke-width="1" fill="none" opacity="0.4"/>
</svg>