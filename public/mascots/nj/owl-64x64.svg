<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- NJ Style Owl - 64x64 - Minimalist Line Art -->
  
  <!-- Body - Rounded -->
  <ellipse cx="32" cy="38" rx="18" ry="20" stroke="#0000FF" stroke-width="2" fill="none"/>
  
  <!-- Body Detail - Subtle Belly Curve -->
  <path d="M22 46 Q32 52 42 46" stroke="#0000FF" stroke-width="1" fill="none" opacity="0.4"/>
  
  <!-- Head - Circular -->
  <circle cx="32" cy="20" r="14" stroke="#0000FF" stroke-width="2" fill="none"/>
  
  <!-- Head Detail - Face Circle -->
  <circle cx="32" cy="22" r="10" stroke="#0000FF" stroke-width="1" fill="none" opacity="0.3"/>
  
  <!-- Large Wise Eyes - Simple Circles -->
  <circle cx="26" cy="18" r="5" stroke="#0000FF" stroke-width="2" fill="none"/>
  <circle cx="38" cy="18" r="5" stroke="#0000FF" stroke-width="2" fill="none"/>
  
  <!-- Pupils -->
  <circle cx="26" cy="18" r="2" fill="#0000FF"/>
  <circle cx="38" cy="18" r="2" fill="#0000FF"/>
  
  <!-- Eye Shine -->
  <circle cx="27.5" cy="16.5" r="0.8" fill="#FFFFFF"/>
  <circle cx="39.5" cy="16.5" r="0.8" fill="#FFFFFF"/>
  
  <!-- Small Beak -->
  <path d="M30 24 L32 27 L34 24" stroke="#0000FF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Ear Tufts - Minimal -->
  <path d="M20 10 L18 4 L24 8" stroke="#0000FF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M44 10 L46 4 L40 8" stroke="#0000FF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Simple Wing Lines -->
  <path d="M18 36 Q14 40 18 48" stroke="#0000FF" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M46 36 Q50 40 46 48" stroke="#0000FF" stroke-width="1.5" fill="none" opacity="0.6"/>
  
  <!-- Wing Detail -->
  <path d="M16 40 Q14 44 16 48" stroke="#0000FF" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M48 40 Q50 44 48 48" stroke="#0000FF" stroke-width="1" fill="none" opacity="0.4"/>
  
  <!-- Feet Lines -->
  <path d="M26 56 L26 58 M32 56 L32 58 M38 56 L38 58" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>