<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- NJ Style Hawk - 32x32 -->
  <!-- Sleek outline style, precision lines, #0000FF stroke -->
  
  <!-- Main body outline - sleek streamlined form -->
  <path d="M10 26 Q8 20 12 16 Q10 14 12 10 Q14 6 20 6 Q26 6 28 10 L24 14 Q28 18 24 24 Q20 28 10 26" 
        stroke="#0000FF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Wing detail - sharp angular lines -->
  <path d="M12 16 Q16 14 22 16" stroke="#0000FF" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M10 20 L14 18" stroke="#0000FF" stroke-width="1" fill="none" stroke-linecap="round"/>
  
  <!-- Head outline with alert posture -->
  <path d="M12 10 Q14 6 20 6 Q24 6 26 9" stroke="#0000FF" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Sharp beak outline -->
  <path d="M26 9 L29 10 L26 12" stroke="#0000FF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Alert eye - focused -->
  <ellipse cx="20" cy="9" rx="2" ry="1.5" stroke="#0000FF" stroke-width="1.5" fill="none"/>
  <circle cx="20.5" cy="9" r="0.8" fill="#0000FF"/>
  
  <!-- Sharp brow line -->
  <path d="M17 7 L21 8.5" stroke="#0000FF" stroke-width="1" fill="none" stroke-linecap="round"/>
  
  <!-- Tail feathers - angular precision -->
  <path d="M8 22 L6 26 M10 24 L9 27" stroke="#0000FF" stroke-width="1" fill="none" stroke-linecap="round"/>
  
  <!-- Chest detail line -->
  <path d="M14 18 Q16 22 14 26" stroke="#0000FF" stroke-width="0.8" fill="none" stroke-linecap="round"/>
</svg>