<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- NJ Bunny - Hype Boy Variant (energetic pose) -->
  <!-- Both ears up -->
  <path d="M11 12 L12 2 Q14 0 16 2 L15 12" 
        fill="none" stroke="#0000FF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M17 12 L18 2 Q20 0 22 2 L21 12" 
        fill="none" stroke="#0000FF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <ellipse cx="16" cy="16" rx="7" ry="6" fill="none" stroke="#0000FF" stroke-width="1.8"/>
  <ellipse cx="16" cy="18" rx="3" ry="2.5" fill="none" stroke="#0000FF" stroke-width="1.5"/>
  <ellipse cx="16" cy="17" rx="1.5" ry="1.2" fill="#0000FF"/>
  <!-- Excited eyes -->
  <path d="M11 14 L14 15" stroke="#0000FF" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M18 15 L21 14" stroke="#0000FF" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Big smile -->
  <path d="M13 20 Q16 24 19 20" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Bouncing body -->
  <path d="M10 22 Q10 26 16 27 Q22 26 22 22" 
        fill="none" stroke="#0000FF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arms up -->
  <path d="M9 23 L6 20" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M23 23 L26 20" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round"/>
</svg>