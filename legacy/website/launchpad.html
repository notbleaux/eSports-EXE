<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SATOR eXe Launch Pad - Mission control interface for esports analytics. Access tactical review, advanced analytics, and game intelligence tools.">
    <meta name="keywords" content="esports analytics, valorant stats, tactical intelligence, sator exe, radiantx, mission control interface, esports dashboard, game analytics platform">
    <meta property="og:title" content="eXе Launch Pad — SATOR eXe">
    <meta property="og:description" content="Mission control interface for esports analytics and tactical intelligence.">
    <meta property="og:image" content="https://sator.exe/og-image.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sator.exe/launchpad.html">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="eXе Launch Pad — SATOR eXe">
    <meta name="twitter:description" content="Mission control interface for esports analytics and tactical intelligence.">
    <meta name="twitter:image" content="https://sator.exe/og-image.png">
    <link rel="canonical" href="https://sator.exe/launchpad.html">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <title>eXе Launch Pad — SATOR eXe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="system/core.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(180deg, #0a1628 0%, #050d18 100%);
            color: #f8f9fa;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(180deg, rgba(10,22,40,0.95) 0%, transparent 100%);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: #f8f9fa;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #00f0ff 0%, #0080ff 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.875rem;
            color: #0a1628;
        }

        .logo-text {
            font-weight: 600;
            font-size: 1.125rem;
            letter-spacing: -0.01em;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.375rem 0.75rem;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 20px;
            font-size: 0.625rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #00f0ff;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #00f0ff;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* Main Container */
        .launchpad {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5rem 2rem 8rem;
            position: relative;
        }

        /* Constellation Container */
        .constellation {
            position: relative;
            width: min(90vw, 800px);
            aspect-ratio: 1.2;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* SVG Connections */
        .constellation-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .connection-line {
            stroke: rgba(0, 240, 255, 0.2);
            stroke-width: 1;
            fill: none;
        }

        .connection-line.active {
            stroke: rgba(0, 240, 255, 0.5);
            stroke-dasharray: 8 4;
            animation: dataFlow 2s linear infinite;
        }

        @keyframes dataFlow {
            to { stroke-dashoffset: -24; }
        }

        /* Service Nodes */
        .node {
            position: absolute;
            z-index: 10;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .node:hover {
            transform: scale(1.1);
            z-index: 20;
        }

        .node-content {
            width: 120px;
            padding: 1rem;
            background: rgba(10, 22, 40, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .node:hover .node-content {
            border-color: var(--node-color);
            box-shadow: 0 0 30px var(--node-glow);
        }

        .node-icon {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .node-label {
            font-size: 0.625rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 500;
            color: rgba(248, 249, 250, 0.7);
        }

        .node-title {
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 0.25rem;
        }

        /* Node Positions & Colors */
        .node-exe {
            --node-color: #00f0ff;
            --node-glow: rgba(0, 240, 255, 0.4);
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
        }
        .node-exe .node-title { color: #00f0ff; }

        .node-analytics {
            --node-color: #e34234;
            --node-glow: rgba(227, 66, 52, 0.4);
            top: 35%;
            left: 8%;
        }
        .node-analytics .node-title { color: #e34234; }

        .node-tactical {
            --node-color: #ffd700;
            --node-glow: rgba(255, 215, 0, 0.4);
            top: 35%;
            right: 8%;
        }
        .node-tactical .node-title { color: #ffd700; }

        .node-efan {
            --node-color: #9d4edd;
            --node-glow: rgba(157, 78, 221, 0.4);
            bottom: 20%;
            left: 15%;
        }
        .node-efan .node-title { color: #9d4edd; }

        .node-help {
            --node-color: #f8f9fa;
            --node-glow: rgba(248, 249, 250, 0.3);
            bottom: 20%;
            right: 15%;
        }
        .node-help .node-title { color: #f8f9fa; }

        /* ZN Junction (Center) */
        .zn-junction {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15;
            text-align: center;
        }

        .zn-ring {
            width: 100px;
            height: 100px;
            border: 2px solid rgba(0, 240, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: rgba(10, 22, 40, 0.8);
            backdrop-filter: blur(8px);
        }

        .zn-ring::before {
            content: '';
            position: absolute;
            inset: -10px;
            border: 1px solid rgba(0, 240, 255, 0.1);
            border-radius: 50%;
            animation: znPulse 3s ease-in-out infinite;
        }

        @keyframes znPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.2; }
        }

        .zn-glyph {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            font-weight: 600;
            color: #00f0ff;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
            transition: all 0.3s ease;
        }

        .zn-label {
            margin-top: 0.75rem;
            font-size: 0.625rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(248, 249, 250, 0.5);
        }

        /* Quick Access Dock */
        .dock {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem 2rem;
            background: linear-gradient(0deg, rgba(10,22,40,0.98) 0%, transparent 100%);
            z-index: 50;
        }

        .dock-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .dock-label {
            font-size: 0.625rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(248, 249, 250, 0.4);
            white-space: nowrap;
        }

        .dock-items {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 1;
            overflow-x: auto;
        }

        .dock-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            font-size: 0.75rem;
            color: rgba(248, 249, 250, 0.7);
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .dock-item:hover {
            background: rgba(0, 240, 255, 0.1);
            border-color: rgba(0, 240, 255, 0.3);
            color: #00f0ff;
        }

        .dock-shortcuts {
            font-size: 0.625rem;
            color: rgba(248, 249, 250, 0.3);
            white-space: nowrap;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .constellation {
                aspect-ratio: 0.8;
            }
            
            .node-content {
                width: 90px;
                padding: 0.75rem;
            }
            
            .node-icon {
                font-size: 1.25rem;
            }
            
            .node-label, .node-title {
                font-size: 0.625rem;
            }
            
            .zn-ring {
                width: 70px;
                height: 70px;
            }
            
            .zn-glyph {
                font-size: 1.5rem;
            }
            
            .dock-content {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <a href="landing.html" class="logo">
            <div class="logo-icon">S</div>
            <span class="logo-text">SATOR eXe</span>
        </a>
        <div class="header-actions">
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span>All Systems Online</span>
            </div>
        </div>
    </header>

    <!-- Launch Pad -->
    <main class="launchpad">
        <div class="constellation">
            <!-- SVG Connection Lines -->
            <svg class="constellation-svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet">
                <!-- Center to eXе -->
                <line class="connection-line active" x1="400" y1="300" x2="400" y2="60" />
                <!-- Center to Analytics -->
                <line class="connection-line active" x1="400" y1="300" x2="120" y2="240" />
                <!-- Center to Tactical -->
                <line class="connection-line active" x1="400" y1="300" x2="680" y2="240" />
                <!-- Center to eFan -->
                <line class="connection-line" x1="400" y1="300" x2="180" y2="450" />
                <!-- Center to Help -->
                <line class="connection-line" x1="400" y1="300" x2="620" y2="450" />
                
                <!-- Cross connections -->
                <line class="connection-line" x1="120" y1="240" x2="680" y2="240" opacity="0.3" />
                <line class="connection-line" x1="180" y1="450" x2="620" y2="450" opacity="0.3" />
            </svg>

            <!-- eXе Node (Top) -->
            <div class="node node-exe" onclick="navigateTo('landing')">
                <div class="node-content">
                    <div class="node-icon">🚀</div>
                    <div class="node-label">eXе</div>
                    <div class="node-title">LAUNCH PAD</div>
                </div>
            </div>

            <!-- Advanced Analytics Node (Left) -->
            <div class="node node-analytics" onclick="navigateTo('analytics')">
                <div class="node-content">
                    <div class="node-icon">📊</div>
                    <div class="node-label">Advanced</div>
                    <div class="node-title">ANALYTICS</div>
                </div>
            </div>

            <!-- Tactical Review Node (Right) -->
            <div class="node node-tactical" onclick="navigateTo('tactical')">
                <div class="node-content">
                    <div class="node-icon">🎮</div>
                    <div class="node-label">Tactical</div>
                    <div class="node-title">REVIEW</div>
                </div>
            </div>

            <!-- eFanHUB Node (Bottom-Left) -->
            <div class="node node-efan" onclick="navigateTo('efan')">
                <div class="node-content">
                    <div class="node-icon">📰</div>
                    <div class="node-label">eFan</div>
                    <div class="node-title">HUB</div>
                </div>
            </div>

            <!-- Help HUB Node (Bottom-Right) -->
            <div class="node node-help" onclick="navigateTo('help')">
                <div class="node-content">
                    <div class="node-icon">📚</div>
                    <div class="node-label">Game &</div>
                    <div class="node-title">HELP HUB</div>
                </div>
            </div>

            <!-- ZN Junction (Center) -->
            <div class="zn-junction">
                <div class="zn-ring">
                    <span class="zn-glyph" id="znGlyph">J</span>
                </div>
                <div class="zn-label">ZN Junction</div>
            </div>
        </div>
    </main>

    <!-- Quick Access Dock -->
    <div class="dock">
        <div class="dock-content">
            <span class="dock-label">Quick Access</span>
            <div class="dock-items">
                <div class="dock-item" onclick="navigateTo('tactical')">
                    <span>🎮</span>
                    <span>Tactical Review</span>
                </div>
                <div class="dock-item" onclick="navigateTo('analytics')">
                    <span>📊</span>
                    <span>Analytics</span>
                </div>
                <div class="dock-item" onclick="navigateTo('help')">
                    <span>📚</span>
                    <span>Help</span>
                </div>
            </div>
            <span class="dock-shortcuts">Press 1-5</span>
        </div>
    </div>

    <script>
        // ZN Junction Morphing Glyph
        const glyphs = ['J', '?', 'j', '!', 'i', '∞', '8'];
        let glyphIndex = 0;
        const znGlyph = document.getElementById('znGlyph');

        setInterval(() => {
            glyphIndex = (glyphIndex + 1) % glyphs.length;
            znGlyph.style.opacity = '0';
            setTimeout(() => {
                znGlyph.textContent = glyphs[glyphIndex];
                znGlyph.style.opacity = '1';
            }, 150);
        }, 3200); // ~22.4s full cycle

        // Navigation
        function navigateTo(destination) {
            switch(destination) {
                case 'landing':
                    window.location.href = 'landing.html';
                    break;
                case 'tactical':
                    window.location.href = 'profiles/radiantx/index.html';
                    break;
                case 'analytics':
                    alert('Advanced Analytics — Coming Soon');
                    break;
                case 'efan':
                    alert('eFanHUB — Coming Soon');
                    break;
                case 'help':
                    alert('Help HUB — Coming Soon');
                    break;
            }
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case '1': navigateTo('landing'); break;
                case '2': navigateTo('analytics'); break;
                case '3': navigateTo('tactical'); break;
                case '4': navigateTo('efan'); break;
                case '5': navigateTo('help'); break;
            }
        });
    </script>
</body>
</html>
