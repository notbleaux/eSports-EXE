<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATOR Sphere - CSS/SVG Prototype</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1;
        }

        .title {
            color: #8a8a9a;
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .sphere-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The SATOR Sphere SVG */
        .sator-sphere {
            width: 90%;
            height: 90%;
            animation: sphereRotate 20s linear infinite;
        }

        @keyframes sphereRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .sator-sphere:hover {
            animation-play-state: paused;
        }

        /* Triangle facets */
        .facet {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .facet:hover {
            filter: brightness(1.5) drop-shadow(0 0 10px currentColor);
            transform-origin: center;
        }

        /* SATOR side colors */
        .facet-s { fill: #FFD700; }
        .facet-a { fill: #1E3A5F; }
        .facet-t { fill: #FFFFFF; }
        .facet-o { fill: #00D4FF; }
        .facet-r { fill: #FF4655; }

        /* ROTAS side - darker variants */
        .facet-s-r { fill: #B8860B; }
        .facet-a-r { fill: #0F1D2F; }
        .facet-t-r { fill: #CCCCCC; }
        .facet-o-r { fill: #0099BB; }
        .facet-r-r { fill: #CC3844; }

        .facet-letter {
            font-size: 14px;
            font-weight: bold;
            text-anchor: middle;
            dominant-baseline: central;
            fill: #0a0a0f;
            pointer-events: none;
        }

        .facet-letter.light {
            fill: #ffffff;
        }

        /* Flow lines animation */
        .flow-line {
            fill: none;
            stroke-width: 2;
            opacity: 0.6;
            stroke-dasharray: 10 5;
            animation: flow 3s linear infinite;
        }

        @keyframes flow {
            to { stroke-dashoffset: -30; }
        }

        .flow-gold { stroke: #FFD700; }
        .flow-cyan { stroke: #00D4FF; }
        .flow-red { stroke: #FF4655; }

        /* Glow effects */
        .glow-center {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* Legend */
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #8a8a9a;
            font-size: 12px;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 3px;
        }

        /* Interactive tooltip */
        .tooltip {
            position: absolute;
            background: rgba(20, 20, 31, 0.95);
            border: 1px solid #2a2a3a;
            padding: 12px 16px;
            border-radius: 8px;
            color: #ffffff;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }

        .tooltip.visible {
            opacity: 1;
        }

        .tooltip-letter {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .tooltip-meaning {
            color: #8a8a9a;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .facet-letter {
                font-size: 10px;
            }
            .legend {
                gap: 10px;
            }
            .legend-item {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="title">SATOR Sphere — CSS/SVG Prototype</div>
    
    <div class="container">
        <div class="sphere-container">
            <svg class="sator-sphere" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <!-- Gradients for depth -->
                    <radialGradient id="sphereDepth" cx="30%" cy="30%">
                        <stop offset="0%" stop-color="rgba(255,255,255,0.1)"/>
                        <stop offset="100%" stop-color="rgba(0,0,0,0.3)"/>
                    </radialGradient>
                    
                    <!-- Glow filters -->
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="3" result="blur"/>
                        <feMerge>
                            <feMergeNode in="blur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>

                <!-- Background sphere -->
                <circle cx="200" cy="200" r="180" fill="#14141f" stroke="#2a2a3a" stroke-width="2"/>
                <circle cx="200" cy="200" r="180" fill="url(#sphereDepth)"/>

                <!-- SATOR Upper Hemisphere (5 rows, triangular facets) -->
                <!-- Row 1: S -->
                <g class="facet facet-s" data-letter="S" data-meaning="Sower / Creator">
                    <polygon points="200,40 185,65 215,65"/>
                    <text x="200" y="58" class="facet-letter">S</text>
                </g>

                <!-- Row 2: A A -->
                <g class="facet facet-a" data-letter="A" data-meaning="Arepo / Hidden">
                    <polygon points="185,65 165,95 185,95"/>
                    <text x="175" y="88" class="facet-letter light">A</text>
                </g>
                <g class="facet facet-a" data-letter="A" data-meaning="Arepo / Hidden">
                    <polygon points="215,65 215,95 235,95"/>
                    <text x="225" y="88" class="facet-letter light">A</text>
                </g>

                <!-- Row 3: T R T -->
                <g class="facet facet-t" data-letter="T" data-meaning="Tenet / Axis">
                    <polygon points="165,95 140,130 170,130"/>

                </g>
                <g class="facet facet-r" data-letter="R" data-meaning="Rotas / Cycle">
                    <polygon points="185,95 170,130 200,130"/>

                </g>
                <g class="facet facet-t" data-letter="T" data-meaning="Tenet / Axis">
                    <polygon points="215,95 200,130 230,130"/>
                    <text x="215" y="118" class="facet-letter">T</text>
                </g>

                <!-- Row 4: O E E O -->
                <g class="facet facet-o" data-letter="O" data-meaning="Opera / Works">
                    <polygon points="140,130 110,170 145,170"/>
                    <text x="132" y="158" class="facet-letter">O</text>
                </g>
                <g class="facet facet-a" data-letter="E" data-meaning="Tenet / Holds">
                    <polygon points="170,130 145,170 180,170"/>
                    <text x="165" y="155" class="facet-letter light">E</text>
                </g>
                <g class="facet facet-a" data-letter="E" data-meaning="Tenet / Holds">
                    <polygon points="200,130 180,170 215,170"/>
                    <text x="197" y="155" class="facet-letter light">E</text>
                </g>
                <g class="facet facet-o" data-letter="O" data-meaning="Opera / Works">
                    <polygon points="230,130 215,170 250,170"/>
                    <text x="232" y="155" class="facet-letter">O</text>
                </g>

                <!-- Row 5: R P N P R (Equator) -->
                <g class="facet facet-r" data-letter="R" data-meaning="Rotas / Cycle">
                    <polygon points="110,170 75,210 120,210"/>
                    <text x="102" y="195" class="facet-letter">R</text>
                </g>
                <g class="facet facet-o" data-letter="P" data-meaning="Opera / Works">
                    <polygon points="145,170 120,210 160,210"/>
                    <text x="142" y="192" class="facet-letter">P</text>
                </g>
                <g class="facet facet-t glow-center" data-letter="N" data-meaning="Tenet / Center">
                    <polygon points="180,170 160,210 200,210"/>
                    <text x="180" y="192" class="facet-letter">N</text>
                </g>
                <g class="facet facet-o" data-letter="P" data-meaning="Opera / Works">
                    <polygon points="215,170 200,210 240,210"/>
                    <text x="218" y="192" class="facet-letter">P</text>
                </g>
                <g class="facet facet-r" data-letter="R" data-meaning="Rotas / Cycle">
                    <polygon points="250,170 240,210 285,210"/>
                    <text x="260" y="192" class="facet-letter">R</text>
                </g>

                <!-- ROTAS Lower Hemisphere (Inverted) -->
                <!-- Row 5 mirrored: R O T A S -->
                <g class="facet facet-r-r" data-letter="R" data-meaning="Rotas / Cycle">
                    <polygon points="75,210 110,250 120,210"/>
                    <text x="102" y="228" class="facet-letter">R</text>
                </g>
                <g class="facet facet-o-r" data-letter="O" data-meaning="Opera / Works">
                    <polygon points="120,210 145,250 160,210"/>
                    <text x="142" y="228" class="facet-letter">O</text>
                </g>
                <g class="facet facet-t-r" data-letter="T" data-meaning="Tenet / Axis">
                    <polygon points="160,210 180,250 200,210"/>
                    <text x="180" y="228" class="facet-letter">T</text>
                </g>
                <g class="facet facet-a-r" data-letter="A" data-meaning="Arepo / Hidden">
                    <polygon points="200,210 215,250 240,210"/>
                    <text x="218" y="228" class="facet-letter light">A</text>
                </g>
                <g class="facet facet-s-r" data-letter="S" data-meaning="Sower / Creator">
                    <polygon points="240,210 250,250 285,210"/>
                    <text x="260" y="228" class="facet-letter">S</text>
                </g>

                <!-- Row 4: O P E R A -->
                <g class="facet facet-o-r" data-letter="O" data-meaning="Opera / Works">
                    <polygon points="110,250 140,290 145,250"/>
                    <text x="132" y="268" class="facet-letter">O</text>
                </g>
                <g class="facet facet-o-r" data-letter="P" data-meaning="Opera / Works">
                    <polygon points="145,250 170,290 180,250"/>
                    <text x="165" y="268" class="facet-letter">P</text>
                </g>
                <g class="facet facet-a-r" data-letter="E" data-meaning="Tenet / Holds">
                    <polygon points="180,250 200,290 215,250"/>
                    <text x="197" y="268" class="facet-letter light">E</text>
                </g>
                <g class="facet facet-r-r" data-letter="R" data-meaning="Rotas / Cycle">
                    <polygon points="215,250 230,290 250,250"/>
                    <text x="232" y="268" class="facet-letter">R</text>
                </g>
                <g class="facet facet-a-r" data-letter="A" data-meaning="Arepo / Hidden">
                    <polygon points="250,250 270,290 285,250"/>
                    <text x="268" y="268" class="facet-letter light">A</text>
                </g>

                <!-- Row 3: T E N E T -->
                <g class="facet facet-t-r" data-letter="T" data-meaning="Tenet / Axis">
                    <polygon points="140,290 165,325 170,290"/>
                    <text x="158" y="308" class="facet-letter">T</text>
                </g>
                <g class="facet facet-a-r" data-letter="E" data-meaning="Tenet / Holds">
                    <polygon points="170,290 185,325 200,290"/>
                    <text x="185" y="308" class="facet-letter light">E</text>
                </g>
                <g class="facet facet-t-r glow-center" data-letter="N" data-meaning="Tenet / Center">
                    <polygon points="200,290 215,325 230,290"/>
                    <text x="215" y="308" class="facet-letter">N</text>
                </g>
                <g class="facet facet-a-r" data-letter="E" data-meaning="Tenet / Holds">
                    <polygon points="230,290 245,325 250,290"/>
                    <text x="240" y="308" class="facet-letter light">E</text>
                </g>
                <g class="facet facet-t-r" data-letter="T" data-meaning="Tenet / Axis">
                    <polygon points="250,290 270,325 285,290"/>
                    <text x="268" y="308" class="facet-letter">T</text>
                </g>

                <!-- Row 2: A R E P O -->
                <g class="facet facet-a-r" data-letter="A" data-meaning="Arepo / Hidden">
                    <polygon points="165,325 185,355 185,325"/>
                    <text x="175" y="342" class="facet-letter light">A</text>
                </g>
                <g class="facet facet-r-r" data-letter="R" data-meaning="Rotas / Cycle">
                    <polygon points="185,325 200,355 215,325"/>
                    <text x="200" y="342" class="facet-letter">R</text>
                </g>
                <g class="facet facet-a-r" data-letter="E" data-meaning="Tenet / Holds">
                    <polygon points="215,325 230,355 245,325"/>
                    <text x="230" y="342" class="facet-letter light">E</text>
                </g>
                <g class="facet facet-o-r" data-letter="P" data-meaning="Opera / Works">
                    <polygon points="245,325 255,355 270,325"/>
                    <text x="257" y="342" class="facet-letter">P</text>
                </g>
                <g class="facet facet-o-r" data-letter="O" data-meaning="Opera / Works">
                    <polygon points="270,325 285,355 285,325"/>
                    <text x="278" y="342" class="facet-letter">O</text>
                </g>

                <!-- Row 1: S -->
                <g class="facet facet-s-r" data-letter="S" data-meaning="Sower / Creator">
                    <polygon points="185,355 200,380 215,355"/>
                    <text x="200" y="372" class="facet-letter">S</text>
                </g>

                <!-- Flow lines (decorative) -->
                <path class="flow-line flow-gold" d="M 200,65 Q 150,150 200,200"/>
                <path class="flow-line flow-cyan" d="M 200,335 Q 250,250 200,200"/>
                <path class="flow-line flow-red" d="M 75,210 Q 137,205 200,200"/>
                <path class="flow-line flow-red" d="M 325,210 Q 262,205 200,200"/>

                <!-- Center glow -->
                <circle cx="200" cy="200" r="30" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.3" class="glow-center"/>
                <circle cx="200" cy="200" r="20" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.5" class="glow-center"/>
            </svg>
        </div>

        <div class="tooltip" id="tooltip">
            <div class="tooltip-letter" id="tooltip-letter">S</div>
            <div class="tooltip-meaning" id="tooltip-meaning">Sower / Creator</div>
        </div>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-color" style="background: #FFD700;"></div>
            <span>S - Sower</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #1E3A5F;"></div>
            <span>A - Arepo</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #FFFFFF;"></div>
            <span>T - Tenet</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #00D4FF;"></div>
            <span>O - Opera</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #FF4655;"></div>
            <span>R - Rotas</span>
        </div>
    </div>

    <script>
        // Interactive tooltip
        const facets = document.querySelectorAll('.facet');
        const tooltip = document.getElementById('tooltip');
        const tooltipLetter = document.getElementById('tooltip-letter');
        const tooltipMeaning = document.getElementById('tooltip-meaning');
        const container = document.querySelector('.container');

        facets.forEach(facet => {
            facet.addEventListener('mouseenter', (e) => {
                const letter = facet.dataset.letter;
                const meaning = facet.dataset.meaning;
                
                tooltipLetter.textContent = letter;
                tooltipMeaning.textContent = meaning;
                tooltip.classList.add('visible');
            });

            facet.addEventListener('mousemove', (e) => {
                const rect = container.getBoundingClientRect();
                tooltip.style.left = (e.clientX - rect.left + 15) + 'px';
                tooltip.style.top = (e.clientY - rect.top - 50) + 'px';
            });

            facet.addEventListener('mouseleave', () => {
                tooltip.classList.remove('visible');
            });

            facet.addEventListener('click', () => {
                // Toggle between SATOR and ROTAS emphasis
                const sphere = document.querySelector('.sator-sphere');
                sphere.style.animation = 'none';
                sphere.offsetHeight; // Trigger reflow
                sphere.style.animation = 'sphereRotate 20s linear infinite';
                sphere.style.transform = 'rotate(180deg)';
            });
        });
    </script>
</body>
</html>
