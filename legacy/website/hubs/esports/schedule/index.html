<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule — eSports HUB — SATOR</title>
    <meta name="description" content="Upcoming esports matches, tournaments schedule, and live events calendar.">
    <link rel="icon" type="image/svg+xml" href="../../../favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../design-system/porcelain-cubed/main.css">
    <link rel="stylesheet" href="../css/esports.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        radiant: {
                            black: '#0a0a0f', card: '#14141f', border: '#2a2a3a',
                            white: '#ffffff', gray: '#8a8a9a', red: '#ff4655', orange: '#ff6b00', gold: '#ffd700'
                        }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
</head>
<body class="antialiased hub-esports">
    <!-- Navigation -->
    <header class="fixed top-0 left-0 right-0 z-50 bg-radiant-black/95 backdrop-blur-md border-b border-radiant-border">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-4">
                    <a href="../" class="flex items-center gap-3 group hover:opacity-80 transition-opacity">
                        <div class="w-9 h-9 bg-gradient-to-br from-radiant-red to-radiant-orange rounded-lg flex items-center justify-center shadow-lg shadow-radiant-red/20">
                            <span class="font-bold text-white text-sm">S</span>
                        </div>
                        <span class="font-bold text-xl text-white hidden sm:block">SATOR</span>
                    </a>
                    <div class="hidden md:flex items-center gap-2 px-3 py-1.5 rounded-lg bg-radiant-red/10 border border-radiant-red/30">
                        <span class="w-2 h-2 rounded-full bg-radiant-red animate-pulse"></span>
                        <span class="text-sm text-radiant-red font-medium">eSports</span>
                    </div>
                </div>
                
                <nav class="hidden md:flex items-center gap-1">
                    <a href="../news/" class="px-4 py-2 rounded-lg text-sm text-white/70 hover:text-white hover:bg-white/5 transition-all">News</a>
                    <a href="../results/" class="px-4 py-2 rounded-lg text-sm text-white/70 hover:text-white hover:bg-white/5 transition-all">Results</a>
                    <a href="./" class="px-4 py-2 rounded-lg text-sm text-white bg-white/10 transition-all">Schedule</a>
                    <a href="../ladders/" class="px-4 py-2 rounded-lg text-sm text-white/70 hover:text-white hover:bg-white/5 transition-all">Ladders</a>
                    <a href="../media/" class="px-4 py-2 rounded-lg text-sm text-white/70 hover:text-white hover:bg-white/5 transition-all">Media</a>
                    <a href="../forums/" class="px-4 py-2 rounded-lg text-sm text-white/70 hover:text-white hover:bg-white/5 transition-all">Forums</a>
                </nav>
                
                <div class="flex items-center gap-4">
                    <div class="hidden sm:flex items-center gap-2 px-3 py-1.5 bg-red-500/10 border border-red-500/30 rounded-full">
                        <span class="relative flex h-2 w-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                        </span>
                        <span class="text-xs font-medium text-red-400 uppercase tracking-wider">Live</span>
                    </div>
                    <button type="button" class="md:hidden p-2 rounded-lg text-white/70 hover:text-white hover:bg-white/5 transition-colors" onclick="toggleMobileMenu()">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Mobile Menu -->
        <div id="mobileMenu" class="md:hidden hidden border-t border-radiant-border bg-radiant-card">
            <div class="px-4 py-4 space-y-2">
                <a href="../news/" class="flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:text-white hover:bg-white/5 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9.5a2.5 2.5 0 00-2.5-2.5H15"/></svg>
                    <span>News</span>
                </a>
                <a href="../results/" class="flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:text-white hover:bg-white/5 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                    <span>Results</span>
                </a>
                <a href="./" class="flex items-center gap-3 px-4 py-3 rounded-lg text-white bg-white/10 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    <span>Schedule</span>
                </a>
                <a href="../ladders/" class="flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:text-white hover:bg-white/5 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
                    <span>Ladders</span>
                </a>
                <a href="../media/" class="flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:text-white hover:bg-white/5 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <span>Media</span>
                </a>
                <a href="../forums/" class="flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:text-white hover:bg-white/5 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z"/></svg>
                    <span>Forums</span>
                </a>
            </div>
        </div>
    </header>

    <main class="pt-16">
        <!-- Page Header -->
        <section class="py-12 bg-gradient-to-b from-radiant-red/10 to-transparent">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                    <div>
                        <h1 class="text-4xl font-black text-white mb-2">Schedule</h1>
                        <p class="text-radiant-gray">Upcoming matches and events</p>
                    </div>
                    <div class="calendar-toggle">
                        <button class="calendar-toggle__btn calendar-toggle__btn--active" onclick="showListView()">List</button>
                        <button class="calendar-toggle__btn" onclick="showCalendarView()">Calendar</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Calendar View (Hidden by default) -->
        <section id="calendarView" class="py-8 hidden">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="calendar">
                    <div class="calendar__header">
                        <h3 id="calendarTitle" class="calendar__title">March 2026</h3>
                        <div class="calendar__nav">
                            <button class="calendar__nav-btn" onclick="prevMonth()">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                            </button>
                            <button class="calendar__nav-btn" onclick="nextMonth()">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="calendar__grid">
                        <div class="calendar__day-header">Sun</div>
                        <div class="calendar__day-header">Mon</div>
                        <div class="calendar__day-header">Tue</div>
                        <div class="calendar__day-header">Wed</div>
                        <div class="calendar__day-header">Thu</div>
                        <div class="calendar__day-header">Fri</div>
                        <div class="calendar__day-header">Sat</div>
                    </div>
                    <div id="calendarGrid" class="calendar__grid"></div>
                </div>
            </div>
        </section>

        <!-- List View -->
        <section id="listView" class="py-8">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <!-- Filters -->
                <div class="match-filters mb-6">
                    <div class="match-filters__group">
                        <label class="match-filters__label">Game:</label>
                        <select class="match-filters__select">
                            <option>All Games</option>
                            <option>Valorant</option>
                            <option>CS2</option>
                            <option>League of Legends</option>
                        </select>
                    </div>
                    <div class="match-filters__group">
                        <label class="match-filters__label">Region:</label>
                        <select class="match-filters__select">
                            <option>All Regions</option>
                            <option>Americas</option>
                            <option>EMEA</option>
                            <option>Pacific</option>
                        </select>
                    </div>
                    <div class="match-filters__group">
                        <label class="match-filters__label">Tournament:</label>
                        <select class="match-filters__select">
                            <option>All Tournaments</option>
                            <option>VCT Masters</option>
                            <option>CS2 Major</option>
                            <option>LCK</option>
                        </select>
                    </div>
                </div>
                
                <!-- Live Now Section -->
                <div class="mb-8">
                    <h2 class="text-xl font-bold text-white mb-4 flex items-center gap-2">
                        <span class="w-2 h-2 bg-radiant-red rounded-full animate-pulse"></span>
                        Live Now
                    </h2>
                    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4" id="liveMatchesSection"></div>
                </div>
                
                <!-- Upcoming Section -->
                <div>
                    <h2 class="text-xl font-bold text-white mb-4">Upcoming Matches</h2>
                    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4" id="scheduleList"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-radiant-black border-t border-radiant-border py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-gradient-to-br from-radiant-red to-radiant-orange rounded-lg flex items-center justify-center">
                        <span class="font-bold text-white text-xs">S</span>
                    </div>
                    <span class="font-bold text-lg text-white">SATOR</span>
                </div>
                <p class="text-sm text-radiant-gray">© 2026 SATOR. All rights reserved.</p>
                <a href="../" class="text-radiant-gray hover:text-radiant-red transition-colors">← Back to eSports HUB</a>
            </div>
        </div>
    </footer>

    <script src="../js/esports.js"></script>
    <script>
        function showListView() {
            document.getElementById('listView').classList.remove('hidden');
            document.getElementById('calendarView').classList.add('hidden');
            document.querySelectorAll('.calendar-toggle__btn').forEach(btn => btn.classList.remove('calendar-toggle__btn--active'));
            event.target.classList.add('calendar-toggle__btn--active');
        }
        
        function showCalendarView() {
            document.getElementById('listView').classList.add('hidden');
            document.getElementById('calendarView').classList.remove('hidden');
            document.querySelectorAll('.calendar-toggle__btn').forEach(btn => btn.classList.remove('calendar-toggle__btn--active'));
            event.target.classList.add('calendar-toggle__btn--active');
        }
        
        // Populate live matches section
        document.addEventListener('DOMContentLoaded', () => {
            const liveContainer = document.getElementById('liveMatchesSection');
            if (liveContainer && typeof ESPORTS_DATA !== 'undefined') {
                liveContainer.innerHTML = ESPORTS_DATA.liveMatches.map(match => `
                    <div class="match-card match-card--live">
                        <div class="match-card__header">
                            <span class="match-card__tournament">${match.tournament}</span>
                            <span class="match-card__status match-card__status--live">LIVE</span>
                        </div>
                        <div class="match-card__teams">
                            <div class="match-card__team">
                                <div class="match-card__team-logo ${match.team1.color}">${match.team1.short}</div>
                                <span class="match-card__team-name">${match.team1.name}</span>
                            </div>
                            <div class="match-card__score">
                                <span class="match-card__score-main text-esports-red">${match.score1} - ${match.score2}</span>
                                <span class="match-card__score-maps">${match.map}</span>
                            </div>
                            <div class="match-card__team">
                                <div class="match-card__team-logo ${match.team2.color}">${match.team2.short}</div>
                                <span class="match-card__team-name">${match.team2.name}</span>
                            </div>
                        </div>
                        <div class="match-card__footer">
                            <span>${match.viewers} viewers</span>
                            <button class="text-esports-red hover:text-esports-orange font-medium" onclick="watchLiveStub()">Watch Live →</button>
                        </div>
                    </div>
                `).join('');
            }
        });
    </script>
</body>
</html>
