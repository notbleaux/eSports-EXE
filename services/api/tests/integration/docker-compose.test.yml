version: '3.8'

services:
  # Test Database
  test-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: esports_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    ports:
      - "5433:5432"
    volumes:
      - test_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d esports_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Test Redis Cache
  test-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # API Service for Integration Testing
  api-test:
    build:
      context: ../../../..
      dockerfile: services/api/Dockerfile.test
    environment:
      - DATABASE_URL=postgresql://test_user:test_password@test-db:5432/esports_test
      - REDIS_URL=redis://test-redis:6379
      - ENVIRONMENT=test
      - PANDASCORE_API_KEY=${PANDASCORE_API_KEY}
    depends_on:
      test-db:
        condition: service_healthy
      test-redis:
        condition: service_healthy
    volumes:
      - ../../../src:/app/src
    command: pytest tests/integration -v --tb=short

volumes:
  test_postgres_data:
