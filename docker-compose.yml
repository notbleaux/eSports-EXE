# NJZiteGeisTe Platform - Development Environment
# One-command setup: docker-compose up -d
# [Part: 1/1, Phase: 1/1, Progress: 100%, Status: Complete]

version: '3.8'

services:
  # PostgreSQL Database (Supabase-compatible)
  db:
    image: postgres:15-alpine
    container_name: njz-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: njz_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - njz-network

  # Redis Cache (Upstash-compatible)
  redis:
    image: redis:7-alpine
    container_name: njz-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - njz-network

  # MinIO (S3-compatible object storage)
  minio:
    image: minio/minio:latest
    container_name: njz-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - njz-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Create MinIO bucket on startup
  minio-create-bucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 10 &&
      /usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin &&
      /usr/bin/mc mb myminio/njz-storage || true &&
      /usr/bin/mc policy set public myminio/njz-storage || true &&
      exit 0
      "
    networks:
      - njz-network

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: njz-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Database
      DATABASE_URL: postgresql://postgres:postgres@db:5432/njz_platform
      # Redis
      REDIS_URL: redis://redis:6379
      # MinIO
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: njz-storage
      # Security (dev values)
      JWT_SECRET_KEY: dev-secret-key-change-in-production
      TOTP_ENCRYPTION_KEY: dev-totp-key-change-in-production
      # Environment
      APP_ENVIRONMENT: development
      DEBUG: "true"
      # API Keys (add your own or use stubs)
      PANDASCORE_API_KEY: ${PANDASCORE_API_KEY:-}
    volumes:
      - ./packages/shared:/app/packages/shared
      - ./services/api:/app/services/api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - njz-network
    command: >
      uvicorn packages.shared.api.main:app 
      --host 0.0.0.0 
      --port 8000 
      --reload
      --log-level debug

  # Web Frontend (Vite Dev Server)
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: njz-web
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/v1
      VITE_WS_URL: ws://localhost:8000/ws
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages/shared:/app/packages/shared
      - /app/apps/web/node_modules
      - /app/node_modules
    depends_on:
      - api
    networks:
      - njz-network
    command: >
      sh -c "pnpm install && cd apps/web && pnpm run dev --host"

  # MailHog (Email catcher for testing)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: njz-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - njz-network

  # pgAdmin (Database management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: njz-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@njz.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - njz-network

  # Redis Commander (Redis management)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: njz-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - njz-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  pgadmin_data:

networks:
  njz-network:
    driver: bridge
