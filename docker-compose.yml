# TODO Phase 4: Move to infra/docker/docker-compose.yml
services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: sator-db
    environment:
      POSTGRES_DB: sator
      POSTGRES_USER: sator
      POSTGRES_PASSWORD: sator_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/shared/api/migrations:/docker-entrypoint-initdb.d/api:ro
      - ./packages/shared/axiom_esports_data/infrastructure/migrations:/docker-entrypoint-initdb.d/axiom:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sator"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sator-network

  # Redis Cache (for rate limiting, sessions)
  redis:
    image: redis:7-alpine
    container_name: sator-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sator-network

  # SATOR API Backend
  api:
    build:
      context: ./packages/shared
      dockerfile: api/Dockerfile
    container_name: sator-api
    environment:
      DATABASE_URL: postgresql://sator:sator_dev_password@db:5432/sator
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY:-dev-totp-key-change-in-production}
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-development}
      PYTHONPATH: /app:/app/api
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:5173", "http://localhost:4173"]'
      RATE_LIMIT_REQUESTS_PER_MINUTE: "100"
      RATE_LIMIT_BURST: "10"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./packages/shared:/app
      - /app/__pycache__
    working_dir: /app/api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --log-level info
    networks:
      - sator-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Frontend (Vite/React)
  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: sator-frontend
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000/ws
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - sator-network

  # Archival Service (Frame Storage)
  archival:
    build:
      context: ./packages/shared
      dockerfile: api/Dockerfile
    container_name: sator-archival
    environment:
      DATABASE_URL: postgresql://sator:sator_dev_password@db:5432/sator
      REDIS_URL: redis://redis:6379/0
      ARCHIVE_LOCAL_DATA_DIR: /data/frames
      ARCHIVE_STORAGE_BACKEND: local
      DEFAULT_RETENTION_DAYS: "90"
      MAX_PIN_TTL_DAYS: "365"
      MAX_UPLOAD_SIZE_MB: "50"
      MAX_FRAMES_PER_BATCH: "1000"
      ENABLE_PROMETHEUS: "true"
      ENABLE_AUDIT_LOG: "true"
      LOG_LEVEL: INFO
      PYTHONPATH: /app:/app/api
    volumes:
      - archival_data:/data/frames
      - ./packages/shared:/app
      - /app/__pycache__
    ports:
      - "8005:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /app/api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --log-level info
    networks:
      - sator-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/v1/archive/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
  archival_data:
    driver: local

networks:
  sator-network:
    driver: bridge
