[tool:pytest]
# Pytest configuration for SATOR API test suite
# [Ver002.000] - Added integration test markers

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async mode
asyncio_mode = auto

# Test paths
testpaths =
    tests/unit
    tests/integration
    tests/e2e
    tests/chaos

# Markers for test categorization
markers =
    unit: Unit tests (isolated, fast)
    integration: Integration tests (requires services)
    e2e: End-to-end tests (full stack)
    slow: Slow tests (skip in quick runs)
    godot: Godot integration tests
    websocket: WebSocket tests
    circuit_breaker: Circuit breaker tests
    feature_store: Feature store tests
    smoke: Quick smoke tests
    timeout: Test timeout marker
    chaos: Chaos engineering tests (failure injection)

# Coverage configuration
addopts = 
    -v
    --tb=short
    --strict-markers

# Ignore patterns
norecursedirs = 
    .git
    .venv
    node_modules
    __pycache__
    .pytest_cache
    archive
    Archived

# Timeout configuration
timeout = 60

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
