[tool:pytest]
# Pytest configuration for SATOR API test suite

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async mode
asyncio_mode = auto

# Test paths
testpaths =
    tests/unit
    tests/integration
    tests/e2e

# Markers for test categorization
markers =
    unit: Unit tests (isolated, fast)
    integration: Integration tests (database, external services)
    e2e: End-to-end tests (full stack)
    slow: Slow tests (skip in quick runs)

# Coverage configuration
addopts = 
    -v
    --tb=short
    --strict-markers

# Ignore patterns
norecursedirs = 
    .git
    .venv
    node_modules
    __pycache__
    .pytest_cache
