<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, Arial">
  <rect width="100%" height="100%" fill="#F6F5F4"/>
  <g id="top-nav">
    <rect x="24" y="20" width="1352" height="64" rx="10" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="48" y="62" font-size="18" fill="#111217" font-weight="700">eSports‑EXE</text>
    <rect x="520" y="30" width="360" height="44" rx="8" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="540" y="60" font-size="13" fill="#6B6F76">Hub selector · Ops</text>
    <rect x="1100" y="32" width="100" height="40" rx="8" fill="#9B7CFF" fill-opacity="0.15" stroke="#9B7CFF"/>
    <text x="1116" y="58" font-size="13" fill="#9B7CFF" font-weight="600">Prod ▼</text>
    <circle cx="1290" cy="52" r="18" fill="#9B7CFF"/>
  </g>
  <g id="hero">
    <rect x="24" y="100" width="1352" height="80" rx="12" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="48" y="140" font-size="28" fill="#111217" font-weight="700">Ops Hub</text>
    <text x="48" y="168" font-size="14" fill="#6B6F76">Platform health, ingestion pipelines, and replay processing.</text>
  </g>
  <g id="status-tiles" transform="translate(24,200)">
    <rect x="0" y="0" width="320" height="120" rx="12" fill="#FFFFFF" stroke="#00C48C" stroke-width="2"/>
    <text x="24" y="40" font-size="14" fill="#6B6F76">Pipeline Health</text>
    <text x="24" y="80" font-size="28" fill="#00C48C" font-weight="700">Healthy</text>
    <text x="24" y="105" font-size="12" fill="#9AA0A6">All systems operational</text>
    <rect x="344" y="0" width="320" height="120" rx="12" fill="#FFFFFF" stroke="#FFB86B" stroke-width="2"/>
    <text x="368" y="40" font-size="14" fill="#6B6F76">Queue Length</text>
    <text x="368" y="80" font-size="28" fill="#FFB86B" font-weight="700">12</text>
    <text x="368" y="105" font-size="12" fill="#9AA0A6">Pending replays</text>
    <rect x="688" y="0" width="320" height="120" rx="12" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="712" y="40" font-size="14" fill="#6B6F76">Processing Latency</text>
    <text x="712" y="80" font-size="28" fill="#111217" font-weight="700">245ms</text>
    <text x="712" y="105" font-size="12" fill="#9AA0A6">Average</text>
    <rect x="1032" y="0" width="320" height="120" rx="12" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="1056" y="40" font-size="14" fill="#6B6F76">Errors (1hr)</text>
    <text x="1056" y="80" font-size="28" fill="#111217" font-weight="700">0</text>
    <text x="1056" y="105" font-size="12" fill="#9AA0A6">No critical errors</text>
    <text x="0" y="145" font-size="12" fill="#9AA0A6">Annotation: Color-coded status tiles; click to drill into logs; auto-refresh every 30s</text>
  </g>
  <g id="replay-queue" transform="translate(24,360)">
    <rect x="0" y="0" width="952" height="480" rx="12" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="24" y="40" font-size="18" fill="#111217" font-weight="700">Replay Queue</text>
    <rect x="24" y="60" width="904" height="48" rx="6" fill="#FBFBFB"/>
    <text x="40" y="90" font-size="12" fill="#6B6F76" font-weight="600">ID</text>
    <text x="200" y="90" font-size="12" fill="#6B6F76" font-weight="600">Status</text>
    <text x="400" y="90" font-size="12" fill="#6B6F76" font-weight="600">Size</text>
    <text x="600" y="90" font-size="12" fill="#6B6F76" font-weight="600">Actions</text>
    <rect x="24" y="116" width="904" height="56" rx="6" fill="#FFFFFF" stroke="#EDEDED"/>
    <text x="40" y="150" font-size="13" fill="#111217">r-001</text>
    <rect x="200" y="130" width="60" height="28" rx="4" fill="#00C48C" fill-opacity="0.15"/>
    <text x="212" y="148" font-size="12" fill="#00C48C">Done</text>
    <text x="400" y="150" font-size="13" fill="#6B6F76">2.3 GB</text>
    <rect x="600" y="130" width="60" height="28" rx="4" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="612" y="148" font-size="12" fill="#6B6F76">View</text>
    <rect x="24" y="180" width="904" height="56" rx="6" fill="#FFFFFF" stroke="#EDEDED"/>
    <text x="40" y="214" font-size="13" fill="#111217">r-002</text>
    <rect x="200" y="194" width="90" height="28" rx="4" fill="#FFB86B" fill-opacity="0.15"/>
    <text x="208" y="212" font-size="12" fill="#FFB86B">Processing</text>
    <text x="400" y="214" font-size="13" fill="#6B6F76">1.8 GB</text>
    <rect x="600" y="194" width="70" height="28" rx="4" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="610" y="212" font-size="12" fill="#6B6F76">Cancel</text>
    <rect x="24" y="244" width="904" height="56" rx="6" fill="#FFFFFF" stroke="#FF5C5C" stroke-opacity="0.3"/>
    <text x="40" y="278" font-size="13" fill="#111217">r-003</text>
    <rect x="200" y="258" width="60" height="28" rx="4" fill="#FF5C5C" fill-opacity="0.15"/>
    <text x="210" y="276" font-size="12" fill="#FF5C5C">Failed</text>
    <text x="400" y="278" font-size="13" fill="#6B6F76">0.8 GB</text>
    <rect x="600" y="258" width="60" height="28" rx="4" fill="#FF5C5C"/>
    <text x="610" y="276" font-size="12" fill="#fff">Retry</text>
    <text x="24" y="340" font-size="12" fill="#9AA0A6">Annotation: Bulk actions (process, retry, delete); click row to inspect; sensitive logs redacted</text>
  </g>
  <g id="right-col" transform="translate(1000,360)">
    <rect x="0" y="0" width="360" height="200" rx="12" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="20" y="36" font-size="16" fill="#111217" font-weight="700">Quick Links</text>
    <text x="20" y="70" font-size="14" fill="#9B7CFF">→ API Documentation</text>
    <text x="20" y="100" font-size="14" fill="#9B7CFF">→ Monitoring Dashboard</text>
    <text x="20" y="130" font-size="14" fill="#9B7CFF">→ Incident Runbook</text>
    <text x="20" y="170" font-size="12" fill="#9AA0A6">Note: Internal runbooks linked privately</text>
  </g>
  <text x="24" y="870" font-size="11" fill="#9AA0A6">Wireframe: Ops Hub — status tiles, replay queue; per‑hub accent: violet; security: redacted sensitive docs</text>
</svg>
