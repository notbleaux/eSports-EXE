<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, Arial">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#F6F5F4"/>
  
  <!-- Top nav -->
  <g id="top-nav">
    <rect x="24" y="20" width="1352" height="64" rx="10" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="48" y="62" font-size="18" fill="#111217" font-weight="700">eSports‑EXE</text>
    <rect x="520" y="30" width="360" height="44" rx="8" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="540" y="60" font-size="13" fill="#6B6F76">Hub selector · Analytics</text>
    <circle cx="1290" cy="52" r="18" fill="#00D1FF"/>
  </g>

  <!-- Hero -->
  <g id="hero">
    <rect x="24" y="100" width="952" height="120" rx="12" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="48" y="140" font-size="28" fill="#111217" font-weight="700">Analytics Hub</text>
    <text x="48" y="168" font-size="14" fill="#6B6F76">Deep match analytics, heatmaps, and compare lenses.</text>
    <g transform="translate(760,120)">
      <rect x="0" y="0" width="216" height="48" rx="8" fill="#00D1FF"/>
      <text x="18" y="32" font-size="14" fill="#fff">Date range</text>
    </g>
    <text x="48" y="210" font-size="12" fill="#9AA0A6">Annotation: H1, short description, hub chip, global filters</text>
  </g>

  <!-- KPI row -->
  <g id="kpis" transform="translate(24,240)">
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="220" height="96" rx="12" fill="#FFFFFF" stroke="#E6E6E6"/>
      <text x="16" y="28" font-size="12" fill="#6B6F76">Matches</text>
      <text x="16" y="60" font-size="22" fill="#111217" font-weight="700">1,234</text>
      <text x="160" y="60" font-size="12" fill="#00D1FF">▲ 4.2%</text>
    </g>
    <g transform="translate(240,0)">
      <rect x="0" y="0" width="220" height="96" rx="12" fill="#FFFFFF" stroke="#E6E6E6"/>
      <text x="16" y="28" font-size="12" fill="#6B6F76">Avg K/D</text>
      <text x="16" y="60" font-size="22" fill="#111217" font-weight="700">1.34</text>
    </g>
    <g transform="translate(480,0)">
      <rect x="0" y="0" width="220" height="96" rx="12" fill="#FFFFFF" stroke="#E6E6E6"/>
      <text x="16" y="28" font-size="12" fill="#6B6F76">Avg Round</text>
      <text x="16" y="60" font-size="22" fill="#111217" font-weight="700">1:42</text>
    </g>
    <g transform="translate(720,0)">
      <rect x="0" y="0" width="220" height="96" rx="12" fill="#FFFFFF" stroke="#E6E6E6"/>
      <text x="16" y="28" font-size="12" fill="#6B6F76">Win Rate</text>
      <text x="16" y="60" font-size="22" fill="#111217" font-weight="700">52%</text>
    </g>
    <text x="0" y="116" font-size="12" fill="#9AA0A6">Annotation: KPI cards show number, sparkline, delta badge; hover reveals mini chart</text>
  </g>

  <!-- Main content: left column -->
  <g id="left-col" transform="translate(24,360)">
    <rect x="0" y="0" width="952" height="480" rx="12" fill="#FFFFFF" stroke="#E6E6E6"/>
    <rect x="16" y="16" width="920" height="160" rx="10" fill="#FBFBFB" stroke="#EDEDED"/>
    <text x="32" y="44" font-size="16" fill="#111217" font-weight="700">Recent Matches</text>
    <text x="32" y="68" font-size="12" fill="#6B6F76">Sortable table, quick compare checkboxes</text>

    <rect x="16" y="192" width="920" height="240" rx="10" fill="#FFFFFF" stroke="#EDEDED"/>
    <text x="32" y="220" font-size="16" fill="#111217" font-weight="700">Match Viewer</text>
    <rect x="32" y="244" width="856" height="140" rx="8" fill="#111217"/>
    <text x="40" y="280" font-size="12" fill="#FFFFFF">Video / Canvas placeholder</text>
    <text x="32" y="420" font-size="12" fill="#9AA0A6">Annotation: timeline below canvas; event filter chips above timeline</text>
  </g>

  <!-- Right column -->
  <g id="right-col" transform="translate(1000,360)">
    <rect x="0" y="0" width="360" height="480" rx="12" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="20" y="36" font-size="16" fill="#111217" font-weight="700">Filters & Saved Views</text>
    <rect x="20" y="64" width="320" height="56" rx="8" fill="#FBFBFB" stroke="#EDEDED"/>
    <text x="28" y="100" font-size="12" fill="#6B6F76">Saved views, quick actions</text>
    <text x="20" y="140" font-size="12" fill="#9AA0A6">Annotation: context column holds filters, saved views, export actions</text>
  </g>

  <text x="24" y="870" font-size="11" fill="#9AA0A6">Wireframe: Analytics Hub — grid 12 columns; panels are interactive; per‑hub accent: cyan</text>
</svg>
