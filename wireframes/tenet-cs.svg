<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, Arial">
  <rect width="100%" height="100%" fill="#F6F5F4"/>
  <g id="top-nav">
    <rect x="24" y="20" width="1352" height="64" rx="10" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="48" y="62" font-size="18" fill="#111217" font-weight="700">eSports‑EXE</text>
    <rect x="520" y="30" width="360" height="44" rx="8" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="540" y="60" font-size="13" fill="#6B6F76">TeNET Hub · CS</text>
    <rect x="1100" y="32" width="100" height="40" rx="8" fill="#2B6FA6"/>
    <text x="1116" y="58" font-size="13" fill="#fff" font-weight="600">de_dust2 ▼</text>
    <circle cx="1290" cy="52" r="18" fill="#2B6FA6"/>
  </g>
  <g id="hero">
    <rect x="24" y="100" width="1352" height="80" rx="12" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="48" y="140" font-size="28" fill="#111217" font-weight="700">TeNET CS</text>
    <text x="48" y="168" font-size="14" fill="#6B6F76">Counter-Strike training tools, grenade lineups, and round analysis.</text>
  </g>
  <g id="main-content" transform="translate(24,200)">
    <rect x="0" y="0" width="680" height="640" rx="12" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="24" y="40" font-size="18" fill="#111217" font-weight="700">Grenade Visualizer</text>
    <rect x="24" y="60" width="632" height="360" rx="8" fill="#111217"/>
    <text x="40" y="240" font-size="14" fill="#fff">Map canvas with grenade arc overlays</text>
    <!-- Grenade arcs visualization -->
    <path d="M 100 300 Q 200 200 300 250" stroke="#2B6FA6" stroke-width="3" fill="none" stroke-dasharray="5,5"/>
    <path d="M 150 320 Q 280 180 400 220" stroke="#2B6FA6" stroke-width="3" fill="none" opacity="0.6"/>
    <circle cx="300" cy="250" r="8" fill="#2B6FA6"/>
    <circle cx="400" cy="220" r="8" fill="#2B6FA6"/>
    <rect x="24" y="440" width="632" height="80" rx="8" fill="#FBFBFB" stroke="#EDEDED"/>
    <text x="40" y="470" font-size="12" fill="#6B6F76">Timeline scrub with tick-accurate markers</text>
    <rect x="40" y="490" width="600" height="12" rx="6" fill="#E6E6E6"/>
    <rect x="40" y="490" width="200" height="12" rx="6" fill="#2B6FA6"/>
    <circle cx="240" cy="496" r="10" fill="#2B6FA6"/>
    <text x="24" y="550" font-size="12" fill="#9AA0A6">Annotation: Interactive arcs drawn on map; scrub to see arc activation; click arc for details</text>
  </g>
  <g id="side-panel" transform="translate=" transform="translate(728,200)">
    <rect x="0" y="0" width="320" height="300" rx="12" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="20" y="36" font-size="16" fill="#111217" font-weight="700">Round Breakdown</text>
    <rect x="20" y="60" width="280" height="40" rx="6" fill="#FBFBFB" stroke="#EDEDED"/>
    <text x="30" y="85" font-size="13" fill="#111217">Round 1</text>
    <text x="180" y="85" font-size="12" fill="#00C48C">$3500 ● W</text>
    <rect x="20" y="108" width="280" height="40" rx="6" fill="#FBFBFB" stroke="#EDEDED"/>
    <text x="30" y="133" font-size="13" fill="#111217">Round 2</text>
    <text x="180" y="133" font-size="12" fill="#FF5C5C">$4200 ● L</text>
    <rect x="20" y="156" width="280" height="40" rx="6" fill="#FBFBFB" stroke="#EDEDED"/>
    <text x="30" y="181" font-size="13" fill="#111217">Round 3</text>
    <text x="180" y="181" font-size="12" fill="#00C48C">$1800 ● W</text>
    <text x="20" y="220" font-size="12" fill="#9AA0A6">Click to jump to round</text>
    <rect x="0" y="320" width="320" height="200" rx="12" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="20" y="356" font-size="16" fill="#111217" font-weight="700">Drill Library</text>
    <rect x="20" y="380" width="280" height="40" rx="6" fill="#2B6FA6" fill-opacity="0.15" stroke="#2B6FA6"/>
    <text x="30" y="405" font-size="13" fill="#2B6FA6">Smoke Lineup A</text>
    <rect x="20" y="428" width="280" height="40" rx="6" fill="#FBFBFB" stroke="#EDEDED"/>
    <text x="30" y="453" font-size="13" fill="#6B6F76">Flash Assist B</text>
    <rect x="20" y="476" width="280" height="28" rx="4" fill="#2B6FA6"/>
    <text x="90" y="494" font-size="12" fill="#fff">+ Create Drill</text>
  </g>
  <text x="24" y="870" font-size="11" fill="#9AA0A6">Wireframe: TeNET CS — grenade visualizer with tick-accurate scrub; per‑hub accent: steel blue</text>
</svg>
