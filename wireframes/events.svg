<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, Arial">
  <rect width="100%" height="100%" fill="#F6F5F4"/>
  <g id="top-nav">
    <rect x="24" y="20" width="1352" height="64" rx="10" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="48" y="62" font-size="18" fill="#111217" font-weight="700">eSports‑EXE</text>
    <rect x="520" y="30" width="360" height="44" rx="8" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="540" y="60" font-size="13" fill="#6B6F76">Hub selector · Events</text>
    <circle cx="1290" cy="52" r="18" fill="#FFB86B"/>
    <rect x="1100" y="32" width="120" height="40" rx="8" fill="#FFB86B"/>
    <text x="1118" y="58" font-size="13" fill="#fff" font-weight="600">+ Create Event</text>
  </g>
  <g id="hero">
    <rect x="24" y="100" width="1352" height="100" rx="12" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="48" y="140" font-size="28" fill="#111217" font-weight="700">Events Hub</text>
    <text x="48" y="170" font-size="14" fill="#6B6F76">Schedule tournaments, manage live events, and broadcast overlays.</text>
  </g>
  <g id="calendar-controls" transform="translate(24,220)">
    <rect x="0" y="0" width="952" height="64" rx="10" fill="#FFFFFF" stroke="#E6E6E6"/>
    <rect x="16" y="12" width="80" height="40" rx="6" fill="#FFB86B"/>
    <text x="32" y="38" font-size="14" fill="#fff" font-weight="600">Day</text>
    <rect x="104" y="12" width="80" height="40" rx="6" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="120" y="38" font-size="14" fill="#6B6F76">Week</text>
    <rect x="192" y="12" width="80" height="40" rx="6" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="208" y="38" font-size="14" fill="#6B6F76">Month</text>
    <text x="48" y="80" font-size="12" fill="#9AA0A6">Annotation: Day/Week/Month toggle; calendar grid below</text>
  </g>
  <g id="calendar" transform="translate(24,300)">
    <rect x="0" y="0" width="952" height="400" rx="12" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="68" y="40" font-size="12" fill="#6B6F76" text-anchor="middle">SUN</text>
    <text x="204" y="40" font-size="12" fill="#6B6F76" text-anchor="middle">MON</text>
    <text x="340" y="40" font-size="12" fill="#6B6F76" text-anchor="middle">TUE</text>
    <text x="476" y="40" font-size="12" fill="#6B6F76" text-anchor="middle">WED</text>
    <text x="612" y="40" font-size="12" fill="#6B6F76" text-anchor="middle">THU</text>
    <text x="748" y="40" font-size="12" fill="#6B6F76" text-anchor="middle">FRI</text>
    <text x="884" y="40" font-size="12" fill="#6B6F76" text-anchor="middle">SAT</text>
    <rect x="16" y="60" width="104" height="100" rx="6" fill="#FBFBFB" stroke="#EDEDED"/>
    <rect x="20" y="100" width="96" height="24" rx="4" fill="#FFB86B"/>
    <text x="28" y="116" font-size="10" fill="#fff">VCT Finals</text>
    <rect x="136" y="60" width="104" height="100" rx="6" fill="#FBFBFB" stroke="#EDEDED"/>
    <circle cx="156" cy="80" r="6" fill="#00C48C"/>
    <text x="170" y="84" font-size="10" fill="#6B6F76">Live match</text>
    <rect x="256" y="60" width="104" height="100" rx="6" fill="#FBFBFB" stroke="#EDEDED"/>
    <rect x="376" y="60" width="104" height="100" rx="6" fill="#FBFBFB" stroke="#EDEDED"/>
    <rect x="380" y="80" width="96" height="20" rx="4" fill="#EDEDED"/>
    <text x="388" y="94" font-size="10" fill="#6B6F76">Practice</text>
    <text x="16" y="380" font-size="12" fill="#9AA0A6">Annotation: Match cards show status badge; click to open event page; hover for quick join</text>
  </g>
  <g id="right-col" transform="translate(1000,220)">
    <rect x="0" y="0" width="360" height="280" rx="12" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="20" y="36" font-size="16" fill="#111217" font-weight="700">Quick Filters</text>
    <rect x="20" y="56" width="320" height="40" rx="6" fill="#FFB86B" fill-opacity="0.15" stroke="#FFB86B"/>
    <text x="32" y="82" font-size="13" fill="#111217">☑ Live</text>
    <rect x="20" y="104" width="320" height="40" rx="6" fill="#FFFFFF" stroke="#EDEDED"/>
    <text x="32" y="130" font-size="13" fill="#6B6F76">☐ Upcoming</text>
    <rect x="20" y="152" width="320" height="40" rx="6" fill="#FFFFFF" stroke="#EDEDED"/>
    <text x="32" y="178" font-size="13" fill="#6B6F76">☐ Finished</text>
    <rect x="0" y="300" width="360" height="200" rx="12" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="20" y="336" font-size="16" fill="#111217" font-weight="700">Event Stats</text>
    <text x="20" y="370" font-size="14" fill="#6B6F76">12 Active events</text>
    <text x="20" y="400" font-size="14" fill="#6B6F76">48 Upcoming</text>
    <text x="20" y="430" font-size="14" fill="#6B6F76">156 Past events</text>
  </g>
  <text x="24" y="870" font-size="11" fill="#9AA0A6">Wireframe: Events Hub — calendar view with live badges; per‑hub accent: amber</text>
</svg>
