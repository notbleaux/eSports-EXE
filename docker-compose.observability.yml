# NJZiteGeisTe Platform - Observability Stack
# Distributed Tracing with Jaeger and Grafana
# [Part: 1/1, Phase: 1/1, Progress: 100%, Status: Complete]
#
# Usage:
#   docker-compose -f docker-compose.observability.yml up -d
#
# Access:
#   - Jaeger UI: http://localhost:16686
#   - Grafana: http://localhost:3000 (admin/admin)
#   - Prometheus: http://localhost:9090 (if enabled)

version: '3.8'

services:
  # Jaeger - Distributed Tracing Backend
  jaeger:
    image: jaegertracing/all-in-one:1.50
    container_name: njz-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"      # Jaeger UI
      - "14268:14268"      # HTTP collector
      - "14250:14250"      # gRPC collector
      - "6831:6831/udp"    # UDP agent (compact)
      - "6832:6832/udp"    # UDP agent (binary)
      - "5778:5778"        # Agent config
      - "4317:4317"        # OTLP gRPC
      - "4318:4318"        # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - QUERY_BASE_PATH=/
      - PROMETHEUS_SERVER_URL=http://prometheus:9090
      - PROMETHEUS_QUERY_SUPPORT_ENABLED=true
    networks:
      - njz-observability
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:16686/"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Grafana - Visualization Dashboard
  grafana:
    image: grafana/grafana:10.2.3
    container_name: njz-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - jaeger
      - prometheus
    networks:
      - njz-observability
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus - Metrics Collection (Optional but recommended)
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: njz-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - prometheus_data:/prometheus
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - njz-observability
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Tempo - Alternative Tracing Backend (Grafana native)
  # Uncomment to use Tempo instead of or alongside Jaeger
  # tempo:
  #   image: grafana/tempo:2.3.0
  #   container_name: njz-tempo
  #   restart: unless-stopped
  #   ports:
  #     - "3200:3200"    # Tempo HTTP
  #     - "4317:4317"    # OTLP gRPC
  #     - "9095:9095"    # Tempo gRPC
  #   volumes:
  #     - tempo_data:/tmp/tempo
  #     - ./infra/observability/tempo/tempo.yaml:/etc/tempo.yaml
  #   command: ["-config.file=/etc/tempo.yaml"]
  #   networks:
  #     - njz-observability

  # Loki - Log Aggregation (Optional)
  # Uncomment to enable log aggregation
  # loki:
  #   image: grafana/loki:2.9.0
  #   container_name: njz-loki
  #   restart: unless-stopped
  #   ports:
  #     - "3100:3100"
  #   volumes:
  #     - loki_data:/loki
  #     - ./infra/observability/loki/loki.yaml:/etc/loki/local-config.yaml
  #   command: -config.file=/etc/loki/local-config.yaml
  #   networks:
  #     - njz-observability

  # OpenTelemetry Collector (Optional - for advanced routing)
  # Uncomment to use collector for span routing/filtering
  # otel-collector:
  #   image: otel/opentelemetry-collector-contrib:0.91.0
  #   container_name: njz-otel-collector
  #   restart: unless-stopped
  #   ports:
  #     - "1888:1888"    # pprof extension
  #     - "8888:8888"    # Prometheus metrics
  #     - "8889:8889"    # Prometheus exporter metrics
  #     - "13133:13133"  # health_check extension
  #     - "55679:55679"  # zpages extension
  #   volumes:
  #     - ./infra/observability/otel-collector/otel-collector.yaml:/etc/otelcol-contrib/config.yaml
  #   command: ["--config", "/etc/otelcol-contrib/config.yaml"]
  #   depends_on:
  #     - jaeger
  #   networks:
  #     - njz-observability

volumes:
  grafana_data:
  prometheus_data:
  # tempo_data:
  # loki_data:

networks:
  njz-observability:
    driver: bridge
