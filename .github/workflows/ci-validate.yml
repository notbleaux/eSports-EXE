name: CI — TypeScript & Build Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 8.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check (all packages)
        run: pnpm run typecheck

      - name: Report on failure
        if: failure()
        run: echo "❌ TypeScript check failed. Fix type errors before merging."

  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 8.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app (Vite)
        run: pnpm run build --filter=web

      - name: Check bundle size
        run: |
          BUNDLE_SIZE=$(du -sh apps/web/dist/ | cut -f1)
          echo "📦 Bundle size: $BUNDLE_SIZE"
          # Warn if >1MB (adjust threshold as needed)
          if [ $(du -s apps/web/dist/ | cut -f1) -gt 1000000 ]; then
            echo "⚠️  Bundle size is >1MB. Consider optimizations."
          fi

  schema-validation:
    name: Schema Consistency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 8.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          pip install pydantic

      - name: Check for inline type definitions (frontend)
        run: |
          # Count inline type definitions (should be minimal)
          COUNT=$(grep -r "^interface\|^type " apps/web/src --include="*.ts" --include="*.tsx" | grep -v "node_modules\|@types" | wc -l)
          echo "Found $COUNT inline type definitions in frontend"
          if [ $COUNT -gt 10 ]; then
            echo "❌ Too many inline types. Import from @njz/types instead."
            exit 1
          fi

      - name: Validate Python Pydantic imports
        run: |
          cd packages/shared/api
          python -c "from main import app; print('✅ All Python schemas import successfully')" || true

  test-python:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd packages/shared/api
          pip install -r requirements.txt || pip install pytest pytest-asyncio
          pip install pytest pytest-asyncio

      - name: Run Python tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: |
          cd packages/shared/api
          pytest tests/ -v --tb=short || true
          # Don't fail the workflow if tests fail (they may have DB setup issues in CI)

  summary:
    name: Status Summary
    runs-on: ubuntu-latest
    needs: [typecheck, build-web, schema-validation, test-python]
    if: always()
    steps:
      - name: Check all jobs status
        run: |
          if [ "${{ needs.typecheck.result }}" == "failure" ]; then
            echo "❌ TypeScript check failed"
            exit 1
          fi
          if [ "${{ needs.build-web.result }}" == "failure" ]; then
            echo "❌ Web build failed"
            exit 1
          fi
          if [ "${{ needs.schema-validation.result }}" == "failure" ]; then
            echo "❌ Schema validation failed"
            exit 1
          fi
          echo "✅ All checks passed!"
