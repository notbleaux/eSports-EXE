# [Ver003.000] - Production Deployment Workflow
# NJZiteGeisTe Platform
#
# This workflow deploys to Render.com using the blueprint in infrastructure/render.yaml
# Trigger: Manual only (for safety)

name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      deployment_mode:
        description: 'Deployment mode'
        required: true
        default: 'automated'
        type: choice
        options:
          - automated
          - manual

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ==========================================================================
  # Pre-deployment Checks
  # ==========================================================================
  pre-deploy-checks:
    runs-on: ubuntu-latest
    outputs:
      can_deploy: ${{ steps.checks.outputs.can_deploy }}
      deployment_mode: ${{ steps.mode.outputs.deployment_mode }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve deployment mode
        id: mode
        run: |
          MODE="${{ github.event.inputs.deployment_mode || 'automated' }}"
          echo "deployment_mode=$MODE" >> $GITHUB_OUTPUT
          echo "Mode: $MODE"

      - name: Run pre-deployment checks
        id: checks
        run: |
          echo "=== Pre-deployment Checks ==="
          
          # Check if render.yaml exists and is valid
          if [ -f "infrastructure/render.yaml" ]; then
            echo "✓ render.yaml exists"
            if grep -q "services:" infrastructure/render.yaml; then
              echo "✓ render.yaml has services section"
              echo "can_deploy=true" >> $GITHUB_OUTPUT
            else
              echo "✗ render.yaml missing services section"
              echo "can_deploy=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "✗ render.yaml not found"
            echo "can_deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify required secrets
        run: |
          echo "Checking required secrets..."
          if [ "${{ github.event.inputs.deployment_mode || 'automated' }}" = "automated" ]; then
            if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
              echo "✓ RENDER_DEPLOY_HOOK_URL is set"
            else
              echo "✗ RENDER_DEPLOY_HOOK_URL is required for automated deploy mode"
              exit 1
            fi
          else
            echo "✓ Manual mode selected; deploy hook secret not required"
          fi

  # ==========================================================================
  # Automated Deploy to Render
  # ==========================================================================
  deploy-automated:
    needs: pre-deploy-checks
    if: needs.pre-deploy-checks.outputs.can_deploy == 'true' && needs.pre-deploy-checks.outputs.deployment_mode == 'automated'
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}
      url: ${{ steps.verify.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render deploy hook
        id: deploy
        run: |
          set -e
          echo "=== Triggering automated Render deployment ==="
          HTTP_CODE=$(curl -sS -o /tmp/render-deploy-response.txt -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render response code: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "202" ]; then
            echo "✗ Failed to trigger deployment hook"
            cat /tmp/render-deploy-response.txt || true
            exit 1
          fi
          echo "✓ Deployment hook accepted"

      - name: Post-deployment health check (blocking)
        id: verify
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 30

          echo "Checking health endpoint..."
          for i in {1..12}; do
            if curl -sf https://njz-api.onrender.com/health 2>/dev/null; then
              echo "✓ Health check passed"
              echo "url=https://njz-api.onrender.com" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 15
          done

          echo "✗ Health check failed after deployment hook trigger"
          exit 1

  # ==========================================================================
  # Manual Deploy Path (Guardrail Mode)
  # ==========================================================================
  deploy-manual:
    needs: pre-deploy-checks
    if: needs.pre-deploy-checks.outputs.can_deploy == 'true' && needs.pre-deploy-checks.outputs.deployment_mode == 'manual'
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}
      url: ${{ steps.manual.outputs.url }}
    steps:
      - name: Manual deployment instructions
        id: manual
        run: |
          echo "=== Manual Render deployment required ==="
          echo "  1. Visit https://dashboard.render.com/"
          echo "  2. Click 'New +' → 'Blueprint'"
          echo "  3. Select this repository and branch"
          echo "  4. Confirm service health endpoint returns 200"
          echo "url=https://njz-api.onrender.com" >> $GITHUB_OUTPUT
      - name: Manual-mode health verification
        run: |
          curl -sf https://njz-api.onrender.com/health

  # ==========================================================================
  # Notify on Completion
  # ==========================================================================
  notify:
    needs: [pre-deploy-checks, deploy-automated, deploy-manual]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Deployment summary
        run: |
          echo "=== Deployment Summary ==="
          echo "Mode: ${{ needs.pre-deploy-checks.outputs.deployment_mode }}"
          echo "Automated status: ${{ needs.deploy-automated.result }}"
          echo "Manual status: ${{ needs.deploy-manual.result }}"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Commit: ${{ github.sha }}"
          echo ""
          echo "Next steps:"
          echo "  - Verify deployment: https://njz-api.onrender.com/health"
          echo "  - Check logs: https://dashboard.render.com/"

          if [ "${{ needs.pre-deploy-checks.outputs.deployment_mode }}" = "automated" ] && [ "${{ needs.deploy-automated.result }}" != "success" ]; then
            echo "❌ Automated deployment failed"
            exit 1
          fi
          if [ "${{ needs.pre-deploy-checks.outputs.deployment_mode }}" = "manual" ] && [ "${{ needs.deploy-manual.result }}" != "success" ]; then
            echo "❌ Manual deployment verification failed"
            exit 1
          fi
