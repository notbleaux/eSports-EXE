# [Ver005.000]
name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio pytest-cov
          if [ -f packages/shared/requirements.txt ]; then pip install -r packages/shared/requirements.txt; fi
      
      - name: Run Python tests
        run: |
          pytest packages/shared/ --cov=packages/shared/ --cov-report=xml || true
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  typescript-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          npm ci || npm install
      
      - name: Run TypeScript tests
        run: |
          npm run test -- --coverage || echo "No tests configured"
      
      - name: Build
        run: npm run build || echo "Build skipped"

  godot-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.2.1
          use-dotnet: false
      
      - name: Run Godot tests
        run: |
          cd platform/simulation-game
          if [ -f tests/run_tests.gd ]; then
            godot --headless --script tests/run_tests.gd
          else
            echo "No Godot tests found - skipping"
          fi
        continue-on-error: true

  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install linting tools
        run: |
          pip install black ruff
      
      - name: Check Python formatting
        run: |
          black --check packages/ || echo "Formatting issues found"
      
      - name: Run Ruff linter
        run: |
          ruff check packages/ || echo "Linting issues found"
        continue-on-error: true