# [Ver004.000]
# GitHub Pages Deployment for 4NJZ4 TENET Platform
# Builds the Vite React app from apps/website-v2 and deploys to GitHub Pages

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/website-v2/package-lock.json'
          
      - name: Install Dependencies
        working-directory: ./apps/website-v2
        run: npm ci
        
      - name: Build
        working-directory: ./apps/website-v2
        run: npm run build
        env:
          VITE_API_URL: "https://api.libre-x-esport.com"
          VITE_APP_ENV: "production"
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './apps/website-v2/dist'
          
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
