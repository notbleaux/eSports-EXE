# [Ver006.000] - GitHub Pages Deployment (Manual Only)
# NOTE: Vercel is now the primary deployment target. This workflow is kept for fallback.
name: Deploy to GitHub Pages (Manual)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm GitHub Pages deployment'
        required: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'deploy'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/website-v2/package-lock.json'
          
      - name: Install Dependencies
        working-directory: ./apps/website-v2
        run: npm install
        
      - name: Build
        working-directory: ./apps/website-v2
        run: npm run build
        env:
          VITE_API_URL: "https://api.libreauxnjz.io"
          VITE_APP_ENV: "production"
        continue-on-error: true
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './apps/website-v2/dist'
        continue-on-error: true
          
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: always() && needs.build.result == 'success'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
