# [Ver004.000]
name: Security Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Weekly scan on Sundays

jobs:
  codeql-python:
    name: CodeQL Python Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          # Use ONLY security-extended to reduce noise
          # security-and-quality finds too many style issues
          queries: security-extended
          # Ignore test files and generated code
          config: |
            paths-ignore:
              - '**/tests/**'
              - '**/test/**'
              - '**/node_modules/**'
              - '**/dist/**'
              - '**/build/**'
      
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  codeql-javascript:
    name: CodeQL JavaScript Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          # Use ONLY security-extended
          queries: security-extended
          config: |
            paths-ignore:
              - '**/node_modules/**'
              - '**/dist/**'
              - '**/build/**'
              - '**/*.test.js'
              - '**/*.spec.js'
      
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

  # Disabled secret-scanning to reduce noise
  # Can re-enable after initial deployment
  # secret-scanning:
  #   name: Secret Detection
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: trufflesecurity/trufflehog@main

  dependency-check:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    # Only run on main branch, not every PR
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          # Only report HIGH and CRITICAL
          severity: 'HIGH,CRITICAL'
      
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'