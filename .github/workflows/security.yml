# CodeQL Security Workflow
# Analyzes code for security vulnerabilities on push and PR

name: "CodeQL Security Analysis"

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  schedule:
    # Run at 00:00 UTC every Monday
    - cron: '0 0 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      # required for all workflows
      security-events: write
      # only required for workflows in private repositories
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Use extended security queries
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"

  # Additional security checks
  security-checks:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Bandit (Python security linter)
        run: |
          pip install bandit[toml]
          bandit -r main-repo/packages/shared/api -f json -o bandit-report.json || true
          bandit -r main-repo/packages/shared/api -ll || true

      - name: Check for hardcoded secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --all-files --force-use-all-plugins > .secrets.baseline || true
          detect-secrets audit .secrets.baseline || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            .secrets.baseline
