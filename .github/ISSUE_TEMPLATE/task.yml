name: Task
description: Tracked work item (chore, refactor, docs, internal improvement)
title: "<type>: <short summary>"
labels: ["task"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - chore
        - refactor
        - docs
        - test
        - perf
        - build
        - ci
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to happen and why.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: input
    id: related
    attributes:
      label: Related issues / PRs / docs
    validations:
      required: false
