name: Feature request
description: Propose a new capability or enhancement
title: "feat: <short summary>"
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Check `MASTER_PLAN.md` and `.agents/PHASE_GATES.md` first — the feature may be intentionally deferred.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user pain or capability gap motivates this?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: dropdown
    id: surface
    attributes:
      label: Primary surface affected
      options:
        - apps/web
        - apps/browser-extension
        - apps/companion
        - apps/overlay
        - services/api
        - data/schemas
        - infra / CI
        - docs
        - cross-cutting
    validations:
      required: true

  - type: checkboxes
    id: scope
    attributes:
      label: Scope confirmation
      options:
        - label: I have checked `MASTER_PLAN.md` and this aligns with the current phase
          required: true
        - label: This does not require breaking changes to `data/schemas/` types
          required: false
