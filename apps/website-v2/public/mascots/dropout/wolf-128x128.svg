<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Dropout Style Wolf - 128x128px -->
  <!-- Strong wolf with varsity jacket, leadership pose -->
  
  <defs>
    <linearGradient id="wolfGrad128" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C757D"/>
      <stop offset="50%" style="stop-color:#5A6268"/>
      <stop offset="100%" style="stop-color:#495057"/>
    </linearGradient>
    <linearGradient id="wolfLight128" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ADB5BD"/>
      <stop offset="100%" style="stop-color:#6C757D"/>
    </linearGradient>
    <filter id="shadow128" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Left Ear (pointed) -->
  <path d="M28 12 L44 48 L20 40 Z" fill="url(#wolfGrad128)" stroke="#212529" stroke-width="2" filter="url(#shadow128)"/>
  <path d="M32 18 L40 42 L26 36 Z" fill="#CED4DA"/>
  
  <!-- Right Ear (pointed) -->
  <path d="M100 12 L84 48 L108 40 Z" fill="url(#wolfGrad128)" stroke="#212529" stroke-width="2" filter="url(#shadow128)"/>
  <path d="M96 18 L88 42 L102 36 Z" fill="#CED4DA"/>
  
  <!-- Head -->
  <ellipse cx="64" cy="56" rx="36" ry="32" fill="url(#wolfGrad128)" stroke="#212529" stroke-width="2" filter="url(#shadow128)"/>
  
  <!-- Cheek fur -->
  <path d="M30 60 Q24 68 28 76" fill="none" stroke="#495057" stroke-width="2" stroke-linecap="round"/>
  <path d="M98 60 Q104 68 100 76" fill="none" stroke="#495057" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Forehead markings -->
  <path d="M52 32 L64 48 L76 32" fill="none" stroke="#495057" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M44 28 L50 36" fill="none" stroke="#495057" stroke-width="2" opacity="0.4"/>
  <path d="M84 28 L78 36" fill="none" stroke="#495057" stroke-width="2" opacity="0.4"/>
  
  <!-- Snout -->
  <ellipse cx="64" cy="72" rx="20" ry="16" fill="url(#wolfLight128)"/>
  <ellipse cx="64" cy="68" rx="12" ry="8" fill="#CED4DA" opacity="0.5"/>
  
  <!-- Nose -->
  <ellipse cx="64" cy="80" rx="8" ry="6" fill="#212529"/>
  <ellipse cx="64" cy="78" rx="4" ry="2" fill="#495057" opacity="0.5"/>
  
  <!-- Nostrils -->
  <ellipse cx="61" cy="81" rx="1.5" ry="1" fill="#000000"/>
  <ellipse cx="67" cy="81" rx="1.5" ry="1" fill="#000000"/>
  
  <!-- Eyes (confident) -->
  <ellipse cx="48" cy="52" rx="8" ry="10" fill="#F8F9FA" stroke="#212529" stroke-width="2"/>
  <ellipse cx="80" cy="52" rx="8" ry="10" fill="#F8F9FA" stroke="#212529" stroke-width="2"/>
  <ellipse cx="48" cy="52" rx="5" ry="7" fill="#212529"/>
  <ellipse cx="80" cy="52" rx="5" ry="7" fill="#212529"/>
  
  <!-- Eye shine -->
  <circle cx="50" cy="50" r="2.5" fill="#FFFFFF"/>
  <circle cx="82" cy="50" r="2.5" fill="#FFFFFF"/>
  <circle cx="46" cy="54" r="1.5" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="78" cy="54" r="1.5" fill="#FFFFFF" opacity="0.5"/>
  
  <!-- Eyebrows (confident) -->
  <path d="M38 40 Q48 36 58 40" fill="none" stroke="#495057" stroke-width="3" stroke-linecap="round"/>
  <path d="M70 40 Q80 36 90 40" fill="none" stroke="#495057" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Mouth -->
  <path d="M56 92 Q64 96 72 92" fill="none" stroke="#495057" stroke-width="2" stroke-linecap="round"/>
  <path d="M64 88 L64 94" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Chin fur -->
  <path d="M58 100 Q64 104 70 100" fill="none" stroke="#6C757D" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Varsity Jacket Body -->
  <path d="M32 80 L24 112 L48 112 L48 96 L64 104 L80 96 L80 112 L104 112 L96 80 Q64 88 32 80" fill="#212529" stroke="#000000" stroke-width="2"/>
  
  <!-- Jacket Collar -->
  <path d="M40 80 L64 96 L88 80" fill="none" stroke="#C0C0C0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M44 76 L64 88 L84 76" fill="none" stroke="#212529" stroke-width="2"/>
  
  <!-- Team Emblem -->
  <circle cx="64" cy="96" r="8" fill="#C0C0C0" stroke="#212529" stroke-width="1"/>
  <text x="64" y="100" font-size="10" fill="#212529" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">W</text>
  
  <!-- Silver trim details -->
  <path d="M24 96 L32 96" fill="none" stroke="#C0C0C0" stroke-width="3"/>
  <path d="M96 96 L104 96" fill="none" stroke="#C0C0C0" stroke-width="3"/>
  <path d="M48 104 L48 112" fill="none" stroke="#C0C0C0" stroke-width="2"/>
  <path d="M80 104 L80 112" fill="none" stroke="#C0C0C0" stroke-width="2"/>
  
  <!-- Jacket cuffs -->
  <rect x="26" y="106" width="16" height="6" fill="#C0C0C0" rx="2"/>
  <rect x="86" y="106" width="16" height="6" fill="#C0C0C0" rx="2"/>
  
  <!-- Shoulder stripes -->
  <path d="M28 84 L36 86" fill="none" stroke="#C0C0C0" stroke-width="2"/>
  <path d="M92 84 L100 86" fill="none" stroke="#C0C0C0" stroke-width="2"/>
</svg>