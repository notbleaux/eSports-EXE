<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="wolfGradient64" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b"/>
      <stop offset="50%" style="stop-color:#475569"/>
      <stop offset="100%" style="stop-color:#334155"/>
    </linearGradient>
    <linearGradient id="wolfLight64" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8"/>
      <stop offset="100%" style="stop-color:#64748b"/>
    </linearGradient>
    <linearGradient id="wolfDark64" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#334155"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" fill="#0f172a" rx="8"/>
  
  <!-- Left Ear (pointed) -->
  <path d="M14 10 L22 26 L10 22 Z" fill="url(#wolfGradient64)"/>
  <path d="M16 12 L20 22 L14 20 Z" fill="#475569"/>
  
  <!-- Right Ear (pointed) -->
  <path d="M50 10 L42 26 L54 22 Z" fill="url(#wolfGradient64)"/>
  <path d="M48 12 L44 22 L50 20 Z" fill="#475569"/>
  
  <!-- Head base -->
  <ellipse cx="32" cy="30" rx="18" ry="16" fill="url(#wolfGradient64)"/>
  
  <!-- Forehead markings -->
  <path d="M28 18 L32 24 L36 18" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Snout (long) -->
  <ellipse cx="32" cy="40" rx="10" ry="8" fill="url(#wolfLight64)"/>
  
  <!-- Snout bridge -->
  <path d="M28 34 L32 28 L36 34" fill="none" stroke="#64748b" stroke-width="1" opacity="0.5"/>
  
  <!-- Nose -->
  <ellipse cx="32" cy="44" rx="4" ry="3" fill="#1e293b"/>
  <ellipse cx="32" cy="43" rx="2" ry="1" fill="#334155" opacity="0.5"/>
  
  <!-- Eyes -->
  <ellipse cx="24" cy="28" rx="4" ry="5" fill="#f8fafc"/>
  <ellipse cx="40" cy="28" rx="4" ry="5" fill="#f8fafc"/>
  <ellipse cx="24" cy="28" rx="2.5" ry="3.5" fill="#0f172a"/>
  <ellipse cx="40" cy="28" rx="2.5" ry="3.5" fill="#0f172a"/>
  
  <!-- Eye shine -->
  <circle cx="25" cy="26.5" r="1.2" fill="#ffffff"/>
  <circle cx="41" cy="26.5" r="1.2" fill="#ffffff"/>
  
  <!-- Eyebrows -->
  <path d="M20 22 Q24 20 28 22" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M36 22 Q40 20 44 22" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Mouth line -->
  <path d="M28 48 Q32 50 36 48" fill="none" stroke="#475569" stroke-width="1" stroke-linecap="round"/>
