<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Ears -->
  <circle cx="16" cy="16" r="8" fill="#8B4513" stroke="#2D1810" stroke-width="2"/>
  <circle cx="48" cy="16" r="8" fill="#8B4513" stroke="#2D1810" stroke-width="2"/>
  <circle cx="16" cy="16" r="4" fill="#D2691E"/>
  <circle cx="48" cy="16" r="4" fill="#D2691E"/>
  
  <!-- Head -->
  <ellipse cx="32" cy="28" rx="20" ry="18" fill="#8B4513" stroke="#2D1810" stroke-width="2"/>
  
  <!-- Head highlight -->
  <ellipse cx="26" cy="20" rx="6" ry="4" fill="#D2691E" opacity="0.6"/>
  
  <!-- Snout area -->
  <ellipse cx="32" cy="34" rx="10" ry="8" fill="#DEB887"/>
  
  <!-- Nose -->
  <ellipse cx="32" cy="32" rx="4" ry="3" fill="#2D1810"/>
  <ellipse cx="33" cy="31" rx="1.5" ry="1" fill="#5D3A1A" opacity="0.5"/>
  
  <!-- Mouth -->
  <path d="M28 38 Q32 42 36 38" stroke="#2D1810" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M28 38 Q28 36 29 37" stroke="#2D1810" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M36 38 Q36 36 35 37" stroke="#2D1810" stroke-width="1" fill="none" stroke-linecap="round"/>
  
  <!-- Eyes -->
  <ellipse cx="24" cy="24" rx="5" ry="6" fill="#FFFFFF" stroke="#2D1810" stroke-width="1"/>
  <ellipse cx="40" cy="24" rx="5" ry="6" fill="#FFFFFF" stroke="#2D1810" stroke-width="1"/>
  <circle cx="25" cy="24" r="3" fill="#2D1810"/>
  <circle cx="41" cy="24" r="3" fill="#2D1810"/>
  <circle cx="26" cy="23" r="1.5" fill="#FFFFFF"/>
  <circle cx="42" cy="23" r="1.5" fill="#FFFFFF"/>
  
  <!-- Eyebrows -->
  <path d="M20 18 Q24 16 28 18" stroke="#5D3A1A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M36 18 Q40 16 44 18" stroke="#5D3A1A" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Body/Jacket -->
  <path d="M16 44 Q12 56 16 60 L24 60 L24 52 Q24 48 28 48 L36 48 Q40 48 40 52 L40 60 L48 60 Q52 56 48 44 Q44 40 32 40 Q20 40 16 44" fill="#DC143C" stroke="#2D1810" stroke-width="2"/>
  
  <!-- Jacket collar -->
  <path d="M20 44 L32 50 L44 44" fill="none" stroke="#FFD700" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M22 42 L32 47 L42 42" fill="none" stroke="#DC143C" stroke-width="1"/>
  
  <!-- Gold trim on jacket -->
  <path d="M16 48 Q16 54 18 60" fill="none" stroke="#FFD700" stroke-width="2"/>
  <path d="M48 48 Q48 54 46 60" fill="none" stroke="#FFD700" stroke-width="2"/>
  <path d="M24 52 L24 60" fill="none" stroke="#FFD700" stroke-width="1"/>
  <path d="M40 52 L40 60" fill="none" stroke="#FFD700" stroke-width="1"/>
  
  <!-- Jacket buttons -->
  <circle cx="32" cy="54" r="2" fill="#FFD700" stroke="#2D1810" stroke-width="0.5"/>
  <circle cx="32" cy="58" r="2" fill="#FFD700" stroke="#2D1810" stroke-width="0.5"/>
</svg>