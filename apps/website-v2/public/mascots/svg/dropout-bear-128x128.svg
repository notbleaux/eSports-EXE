  <path d="M40 36 Q48 32 56 36" stroke="#5D3A1A" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M72 36 Q80 32 88 36" stroke="#5D3A1A" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Body/Jacket -->
  <path d="M32 88 Q24 112 32 120 L48 120 L48 104 Q48 96 56 96 L72 96 Q80 96 80 104 L80 120 L96 120 Q104 112 96 88 Q88 80 64 80 Q40 80 32 88" fill="#DC143C" stroke="#2D1810" stroke-width="3"/>
  
