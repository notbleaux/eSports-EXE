  <path d="M32 96 Q32 108 36 120" fill="none" stroke="#FFD700" stroke-width="3"/>
  <path d="M96 96 Q96 108 92 120" fill="none" stroke="#FFD700" stroke-width="3"/>
  <path d="M48 104 L48 120" fill="none" stroke="#FFD700" stroke-width="2"/>
  <path d="M80 104 L80 120" fill="none" stroke="#FFD700" stroke-width="2"/>
  
  <!-- Jacket cuffs -->
  <rect x="34" y="114" width="12" height="6" fill="#FFD700" rx="1"/>
  <rect x="82" y="114" width="12" height="6" fill="#FFD700" rx="1"/>
  
  <!-- Jacket buttons -->
  <circle cx="64" cy="108" r="4" fill="#FFD700" stroke="#2D1810" stroke-width="1"/>
  <circle cx="64" cy="116" r="4" fill="#FFD700" stroke="#2D1810" stroke-width="1"/>
  
  <!-- Button details -->
  <circle cx="64" cy="108" r="2" fill="#D2691E"/>
  <circle cx="64" cy="116" r="2" fill="#D2691E"/>
