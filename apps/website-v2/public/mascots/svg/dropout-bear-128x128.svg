<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Ears -->
  <circle cx="32" cy="32" r="16" fill="#8B4513" stroke="#2D1810" stroke-width="3"/>
  <circle cx="96" cy="32" r="16" fill="#8B4513" stroke="#2D1810" stroke-width="3"/>
  <circle cx="32" cy="32" r="8" fill="#D2691E"/>
  <circle cx="96" cy="32" r="8" fill="#D2691E"/>
  
  <!-- Head base -->
  <ellipse cx="64" cy="56" rx="40" ry="36" fill="#8B4513" stroke="#2D1810" stroke-width="3"/>
  
  <!-- Head highlight/shading -->
  <ellipse cx="52" cy="40" rx="12" ry="8" fill="#D2691E" opacity="0.5"/>
  <ellipse cx="76" cy="40" rx="8" ry="6" fill="#5D3A1A" opacity="0.3"/>
  
  <!-- Snout area -->
  <ellipse cx="64" cy="68" rx="20" ry="16" fill="#DEB887"/>
  <ellipse cx="64" cy="68" rx="18" ry="14" fill="#DEB887" stroke="#D2691E" stroke-width="1"/>
  
  <!-- Nose -->
  <ellipse cx="64" cy="64" rx="8" ry="6" fill="#2D1810"/>
  <ellipse cx="66" cy="62" rx="3" ry="2" fill="#5D3A1A" opacity="0.5"/>
  
  <!-- Mouth -->
  <path d="M56 76 Q64 84 72 76" stroke="#2D1810" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M56 76 Q56 72 58 74" stroke="#2D1810" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M72 76 Q72 72 70 74" stroke="#2D1810" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Eyes -->
  <ellipse cx="48" cy="48" rx="10" ry="12" fill="#FFFFFF" stroke="#2D1810" stroke-width="2"/>
  <ellipse cx="80" cy="48" rx="10" ry="12" fill="#FFFFFF" stroke="#2D1810" stroke-width="2"/>
  <circle cx="50" cy="48" r="6" fill="#2D1810"/>
  <circle cx="82" cy="48" r="6" fill="#2D1810"/>
  <circle cx="52" cy="46" r="3" fill="#FFFFFF"/>
  <circle cx="84" cy="46" r="3" fill="#FFFFFF"/>
  
