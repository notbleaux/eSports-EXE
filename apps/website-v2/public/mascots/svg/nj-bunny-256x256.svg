<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- NJ Bunny Mascot - 256x256px -->
  <!-- Minimalist line art, electric blue (#0000FF), transparent background -->
  
  <!-- Left Ear (floppy) -->
  <path d="M80 64 C80 16, 48 16, 48 64 C48 96, 80 112, 96 128" 
        fill="none" stroke="#0000FF" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Right Ear (slightly bent) -->
  <path d="M176 64 C176 24, 208 32, 200 72 C196 96, 176 112, 160 128" 
        fill="none" stroke="#0000FF" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Head -->
  <ellipse cx="128" cy="144" rx="56" ry="48" 
           fill="none" stroke="#0000FF" stroke-width="1"/>
  
  <!-- Left Eye (big round with sparkle) -->
  <circle cx="104" cy="136" r="14.4" fill="none" stroke="#0000FF" stroke-width="1"/>
  <circle cx="108" cy="132" r="3.2" fill="#0000FF"/>
  
  <!-- Right Eye (big round with sparkle) -->
  <circle cx="152" cy="136" r="14.4" fill="none" stroke="#0000FF" stroke-width="1"/>
  <circle cx="156" cy="132" r="3.2" fill="#0000FF"/>
  
  <!-- Nose -->
  <ellipse cx="128" cy="160" rx="6.4" ry="4" fill="#0000FF"/>
  
  <!-- Mouth (small cute smile) -->
  <path d="M116 168 Q128 180, 140 168" 
        fill="none" stroke="#0000FF" stroke-width="1" stroke-linecap="round"/>
  
  <!-- Body (simple line) -->
  <path d="M96 184 Q80 208, 80 224 Q128 232, 176 224 Q176 208, 160 184" 
        fill="none" stroke="#0000FF" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Fluffy Tail -->
  <circle cx="192" cy="208" r="16" fill="none" stroke="#0000FF" stroke-width="1"/>
  <path d="M180 200 L184 208 L176 216 M192 192 L192 204 L200 200 M204 208 L196 212 L204 220" 
        fill="none" stroke="#0000FF" stroke-width="0.8" stroke-linecap="round"/>
</svg>