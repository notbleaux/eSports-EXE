      <stop offset="100%" style="stop-color:#475569"/>
    </linearGradient>
    <linearGradient id="wolfLight32" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8"/>
      <stop offset="100%" style="stop-color:#64748b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" fill="#1e293b" rx="4"/>
  
  <!-- Left Ear (pointed) -->
  <path d="M8 6 L12 14 L6 12 Z" fill="url(#wolfGradient32)"/>
  
  <!-- Right Ear (pointed) -->
