<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- NJ Style Wolf - 64x64px -->
  <!-- Bold wolf outline, determined expression -->
  
  <!-- Left Ear (alert, sharp angles) -->
  <path d="M12 6 L20 28 L8 24 Z" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M14 10 L18 24 L10 21 Z" fill="none" stroke="#0000FF" stroke-width="1"/>
  
  <!-- Right Ear (alert, sharp angles) -->
  <path d="M52 6 L44 28 L56 24 Z" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M50 10 L46 24 L54 21 Z" fill="none" stroke="#0000FF" stroke-width="1"/>
  
  <!-- Head (sleek outline) -->
  <path d="M16 28 Q16 16 32 16 Q48 16 48 28 Q48 40 32 44 Q16 40 16 28" fill="none" stroke="#0000FF" stroke-width="1.5"/>
  
  <!-- Forehead markings (sharp angles) -->
  <path d="M24 20 L32 28 L40 20" fill="none" stroke="#0000FF" stroke-width="1" opacity="0.6"/>
  <path d="M20 18 L24 22" fill="none" stroke="#0000FF" stroke-width="0.8" opacity="0.4"/>
  <path d="M44 18 L40 22" fill="none" stroke="#0000FF" stroke-width="0.8" opacity="0.4"/>
  
  <!-- Snout (sleek line) -->
  <path d="M24 36 Q32 32 40 36 Q40 44 32 48 Q24 44 24 36" fill="none" stroke="#0000FF" stroke-width="1.5"/>
  
  <!-- Nose -->
  <ellipse cx="32" cy="42" rx="3" ry="2" fill="#0000FF"/>
  
  <!-- Nostrils -->
  <ellipse cx="30.5" cy="42.5" rx="0.8" ry="0.5" fill="#0000FF" opacity="0.7"/>
  <ellipse cx="33.5" cy="42.5" rx="0.8" ry="0.5" fill="#0000FF" opacity="0.7"/>
  
  <!-- Eyes (determined) -->
  <path d="M20 26 L28 28 L28 32 L20 30 Z" fill="none" stroke="#0000FF" stroke-width="1.5"/>
  <path d="M44 26 L36 28 L36 32 L44 30 Z" fill="none" stroke="#0000FF" stroke-width="1.5"/>
  <ellipse cx="24" cy="29" rx="1.5" ry="2" fill="#0000FF"/>
  <ellipse cx="40" cy="29" rx="1.5" ry="2" fill="#0000FF"/>
  
  <!-- Eye highlight -->
  <circle cx="24.5" cy="28.5" r="0.5" fill="#3333FF" opacity="0.5"/>
  <circle cx="40.5" cy="28.5" r="0.5" fill="#3333FF" opacity="0.5"/>
  
  <!-- Eyebrow line (focused) -->
  <path d="M18 22 L30 24" fill="none" stroke="#0000FF" stroke-width="1.5"/>
  <path d="M46 22 L34 24" fill="none" stroke="#0000FF" stroke-width="1.5"/>
  
  <!-- Mouth -->
  <path d="M28 50 Q32 52 36 50" fill="none" stroke="#0000FF" stroke-width="1" stroke-linecap="round"/>
  <path d="M32 46 L32 50" fill="none" stroke="#0000FF" stroke-width="0.8"/>
  
  <!-- Body (sleek line) -->
  <path d="M20 44 Q12 52 12 60 Q32 64 52 60 Q52 52 44 44" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Sharp angles on back -->
  <path d="M16 50 L20 56" fill="none" stroke="#0000FF" stroke-width="1"/>
  <path d="M48 50 L44 56" fill="none" stroke="#0000FF" stroke-width="1"/>
  
  <!-- Chest detail -->
  <path d="M24 52 Q32 56 40 52" fill="none" stroke="#0000FF" stroke-width="0.8"/>
</svg>