<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- NJ Style Wolf - 32x32px -->
  <!-- Bold wolf outline, determined expression -->
  
  <!-- Left Ear (alert, sharp angles) -->
  <path d="M6 4 L10 14 L4 12 Z" fill="none" stroke="#0000FF" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M7 6 L9 12 L5 11 Z" fill="none" stroke="#0000FF" stroke-width="0.5"/>
  
  <!-- Right Ear (alert, sharp angles) -->
  <path d="M26 4 L22 14 L28 12 Z" fill="none" stroke="#0000FF" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M25 6 L23 12 L27 11 Z" fill="none" stroke="#0000FF" stroke-width="0.5"/>
  
  <!-- Head (sleek outline) -->
  <path d="M8 14 Q8 8 16 8 Q24 8 24 14 Q24 20 16 22 Q8 20 8 14" fill="none" stroke="#0000FF" stroke-width="1"/>
  
  <!-- Snout (sleek line) -->
  <path d="M12 18 Q16 16 20 18 Q20 22 16 24 Q12 22 12 18" fill="none" stroke="#0000FF" stroke-width="1"/>
  
  <!-- Nose -->
  <ellipse cx="16" cy="21" rx="1.5" ry="1" fill="#0000FF"/>
  
  <!-- Eyes (determined) -->
  <path d="M10 13 L14 14 L14 16 L10 15 Z" fill="none" stroke="#0000FF" stroke-width="1"/>
  <path d="M22 13 L18 14 L18 16 L22 15 Z" fill="none" stroke="#0000FF" stroke-width="1"/>
  <circle cx="12" cy="14.5" r="0.8" fill="#0000FF"/>
  <circle cx="20" cy="14.5" r="0.8" fill="#0000FF"/>
  
  <!-- Eyebrow line (focused) -->
  <path d="M9 11 L15 12" fill="none" stroke="#0000FF" stroke-width="1"/>
  <path d="M23 11 L17 12" fill="none" stroke="#0000FF" stroke-width="1"/>
  
  <!-- Body (sleek line) -->
  <path d="M10 22 Q6 26 6 30 Q16 32 26 30 Q26 26 22 22" fill="none" stroke="#0000FF" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Sharp angles on back -->
  <path d="M8 24 L10 28" fill="none" stroke="#0000FF" stroke-width="0.5"/>
  <path d="M24 24 L22 28" fill="none" stroke="#0000FF" stroke-width="0.5"/>
</svg>