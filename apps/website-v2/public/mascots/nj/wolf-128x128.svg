<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- NJ Style Wolf - 128x128px -->
  <!-- Bold wolf outline, determined expression -->
  
  <!-- Left Ear (alert, sharp angles) -->
  <path d="M24 12 L40 56 L16 48 Z" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M28 20 L36 48 L20 42 Z" fill="none" stroke="#0000FF" stroke-width="1.5"/>
  <path d="M26 16 L32 32 L22 28 Z" fill="none" stroke="#0000FF" stroke-width="1" opacity="0.5"/>
  
  <!-- Right Ear (alert, sharp angles) -->
  <path d="M104 12 L88 56 L112 48 Z" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M100 20 L92 48 L108 42 Z" fill="none" stroke="#0000FF" stroke-width="1.5"/>
  <path d="M102 16 L96 32 L106 28 Z" fill="none" stroke="#0000FF" stroke-width="1" opacity="0.5"/>
  
  <!-- Head (sleek outline) -->
  <path d="M32 56 Q32 32 64 32 Q96 32 96 56 Q96 80 64 88 Q32 80 32 56" fill="none" stroke="#0000FF" stroke-width="2"/>
  
  <!-- Forehead markings (sharp angles) -->
  <path d="M48 40 L64 56 L80 40" fill="none" stroke="#0000FF" stroke-width="2" opacity="0.6"/>
  <path d="M40 36 L48 44" fill="none" stroke="#0000FF" stroke-width="1.5" opacity="0.4"/>
  <path d="M88 36 L80 44" fill="none" stroke="#0000FF" stroke-width="1.5" opacity="0.4"/>
  <path d="M52 34 L56 40" fill="none" stroke="#0000FF" stroke-width="1" opacity="0.3"/>
  <path d="M76 34 L72 40" fill="none" stroke="#0000FF" stroke-width="1" opacity="0.3"/>
  
  <!-- Snout (sleek line) -->
  <path d="M48 72 Q64 64 80 72 Q80 88 64 96 Q48 88 48 72" fill="none" stroke="#0000FF" stroke-width="2"/>
  
  <!-- Nose -->
  <ellipse cx="64" cy="84" rx="6" ry="4" fill="#0000FF"/>
  
  <!-- Nostrils -->
  <ellipse cx="61" cy="85" rx="1.5" ry="1" fill="#0000FF" opacity="0.7"/>
  <ellipse cx="67" cy="85" rx="1.5" ry="1" fill="#0000FF" opacity="0.7"/>
  
  <!-- Eyes (determined) -->
  <path d="M40 52 L56 56 L56 64 L40 60 Z" fill="none" stroke="#0000FF" stroke-width="2"/>
  <path d="M88 52 L72 56 L72 64 L88 60 Z" fill="none" stroke="#0000FF" stroke-width="2"/>
  <ellipse cx="48" cy="58" rx="3" ry="4" fill="#0000FF"/>
  <ellipse cx="80" cy="58" rx="3" ry="4" fill="#0000FF"/>
  
  <!-- Eye highlight -->
  <circle cx="49" cy="57" r="1" fill="#3333FF" opacity="0.5"/>
  <circle cx="81" cy="57" r="1" fill="#3333FF" opacity="0.5"/>
  
  <!-- Eyebrow line (focused) -->
  <path d="M36 44 L60 48" fill="none" stroke="#0000FF" stroke-width="2"/>
  <path d="M92 44 L68 48" fill="none" stroke="#0000FF" stroke-width="2"/>
  
  <!-- Mouth -->
  <path d="M56 100 Q64 104 72 100" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round"/>
  <path d="M64 92 L64 100" fill="none" stroke="#0000FF" stroke-width="1.5"/>
  
  <!-- Chin -->
  <path d="M58 104 Q64 108 70 104" fill="none" stroke="#0000FF" stroke-width="1.5"/>
  
  <!-- Body (sleek line) -->
  <path d="M40 88 Q24 104 24 120 Q64 128 104 120 Q104 104 88 88" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Sharp angles on back -->
  <path d="M32 100 L40 112" fill="none" stroke="#0000FF" stroke-width="1.5"/>
  <path d="M96 100 L88 112" fill="none" stroke="#0000FF" stroke-width="1.5"/>
  <path d="M36 96 L42 106" fill="none" stroke="#0000FF" stroke-width="1"/>
  <path d="M92 96 L86 106" fill="none" stroke="#0000FF" stroke-width="1"/>
  
  <!-- Chest detail -->
  <path d="M48 104 Q64 112 80 104" fill="none" stroke="#0000FF" stroke-width="1.5"/>
  <path d="M52 108 Q64 114 76 108" fill="none" stroke="#0000FF" stroke-width="1"/>
  
  <!-- Tail hint -->
  <path d="M104 112 Q112 108 116 100" fill="none" stroke="#0000FF" stroke-width="1.5" stroke-linecap="round"/>
</svg>