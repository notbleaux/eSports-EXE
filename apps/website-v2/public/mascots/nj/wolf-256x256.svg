  <path d="M88 76 L100 84" fill="none" stroke="#0000FF" stroke-width="1.5" opacity="0.25"/>
  <path d="M168 76 L156 84" fill="none" stroke="#0000FF" stroke-width="1.5" opacity="0.25"/>
  
  <!-- Snout (sleek line) -->
