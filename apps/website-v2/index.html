<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Libre-X-eSport 4NJZ4 | 4eva and Nvr Die</title>
  <meta name="description" content="Libre-X-eSport 4NJZ4 TENET Platform - SATOR/ROTAS twin-file database system with 4-hub architecture">
  
  <!-- Base tag for Vercel deployment -->
  <base href="/">
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00f0ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LibreauxNJZ">
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
  <link rel="mask-icon" href="/icons/icon-192x192.svg" color="#00f0ff">
  
  <!-- Resource Hints for Performance -->
  <!-- Preconnect to critical third-party domains -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- DNS prefetch for analytics and APIs -->
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  
  <!-- Preload critical fonts -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" as="style">
  
  <!-- Preload critical icons -->
  <link rel="preload" href="/icons/icon-192x192.svg" as="image" type="image/svg+xml">
  
  <!-- Preload critical mascot assets (commonly used) -->
  <!-- Fox mascot - most commonly used, preload 128x128 size -->
  <link rel="preload" href="/mascots/svg/fox-128x128.svg" as="image" type="image/svg+xml">
  
  <!-- Preconnect to mascot assets for faster loading -->
  <link rel="dns-prefetch" href="/mascots">
  
  <!-- Fonts with font-display: swap for fast initial render -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Critical CSS inlined for faster First Contentful Paint -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html {
      /* Prevent layout shift from scrollbar */
      overflow-y: scroll;
    }
    
    body {
      background: #FAFAFA;
      color: #000000;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-display: swap;
      min-height: 100vh;
      overflow-x: hidden;
      /* Optimize text rendering */
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    /* Prevent flash of unstyled content */
    #root {
      min-height: 100vh;
    }
    
    /* Loading state styles */
    .initial-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #FF69B4;
    }
    
    .initial-loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(0, 0, 0, 0.2);
      border-top-color: #000000;
      border-radius: 0;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0a0a0f;
    }
    ::-webkit-scrollbar-thumb {
      background: #2a2a3a;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #3a3a4a;
    }
    
    /* Reduced motion for accessibility */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
      
      .initial-loading-spinner {
        animation: none;
        border-top-color: rgba(0, 240, 255, 0.5);
      }
    }
    
    /* High contrast mode support */
    @media (prefers-contrast: high) {
      body {
        background: #000000;
      }
    }
    
    /* Print styles */
    @media print {
      body {
        background: white;
        color: black;
      }
      
      .no-print {
        display: none !important;
      }
    }
  </style>
  
  <!-- Performance monitoring script (inline for immediate execution) -->
  <script>
    // Web Vitals polyfill for browsers that don't support PerformanceObserver
    (function() {
      if (!window.performance) window.performance = {};
      if (!performance.now) {
        performance.now = function() {
          return Date.now();
        };
      }
      
      // Mark navigation start
      performance.mark('navigation-start');
      
      // Capture first paint metrics when available
      window.addEventListener('load', function() {
        setTimeout(function() {
          var perfData = window.performance.timing;
          var pageLoadTime = perfData.loadEventEnd - perfData.navigationStart;
          
          // Log to console in development
          if (window.location.hostname === 'localhost') {
            console.log('[Performance] Page load time: ' + pageLoadTime + 'ms');
          }
        }, 0);
      });
    })();
  </script>
</head>
<body>
  <!-- Initial loading state -->
  <div id="root">
    <div class="initial-loading">
      <div class="initial-loading-spinner"></div>
    </div>
  </div>
  
  <script type="module" src="/src/main.jsx"></script>
  
  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(function(registration) {
            console.log('[SW] Registered:', registration.scope);
          })
          .catch(function(error) {
            console.log('[SW] Registration failed:', error);
          });
      });
    }
  </script>
</body>
</html>
