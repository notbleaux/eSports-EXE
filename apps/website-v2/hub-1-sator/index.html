<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SATOR Hub - The Observatory | Libre-X-eSport 4NJZ4</title>
  <meta name="description" content="SATOR Hub - The Observatory. Abyssal depth data visualization with orbital rings, particle star fields, and harmonic analysis.">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  
  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  
  <!-- Styles -->
  <link rel="stylesheet" href="../shared/styles/sator-tokens.css">
  <link rel="stylesheet" href="components/OrbitalRingSystem.css">
  <link rel="stylesheet" href="components/ParticleStarField.css">
  <link rel="stylesheet" href="components/LissajousComparator.css">
  <link rel="stylesheet" href="components/TerminalVerifier.css">
  <link rel="stylesheet" href="components/MaterialityToggle.css">
  <link rel="stylesheet" href="components/SATORHub.css">
  
  <style>
    /* Reset and Base */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html {
      font-size: 16px;
      scroll-behavior: smooth;
    }
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #050508;
      color: #e8e6e3;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    
    #root {
      min-height: 100vh;
    }
    
    /* Selection */
    ::selection {
      background: rgba(255, 159, 28, 0.3);
      color: #e8e6e3;
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    
    ::-webkit-scrollbar-track {
      background: #050508;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #2a2a38;
      border-radius: 3px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 159, 28, 0.3);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <!-- React and Babel for JSX -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;
    
    // OrbitalRingSystem Component
    const ORBITAL_DATA = [
      { id: 'teams', name: 'TEAMS', count: 48, radius: 100, speed: 20, color: '#ff9f1c', description: 'Active team formations', nodes: 8 },
      { id: 'matches', name: 'MATCHES', count: 1247, radius: 150, speed: 30, color: '#ff8c42', description: 'Competitive encounters', nodes: 12 },
      { id: 'players', name: 'PLAYERS', count: 3842, radius: 210, speed: 45, color: '#ff7b59', description: 'Registered competitors', nodes: 16 },
      { id: 'tournaments', name: 'TOURNAMENTS', count: 156, radius: 280, speed: 60, color: '#ff6b6b', description: 'Organized events', nodes: 20 },
      { id: 'history', name: 'HISTORY', count: 8921, radius: 360, speed: 80, color: '#ff5e78', description: 'Archived records', nodes: 24 }
    ];
    
    const OrbitalRingSystem = ({ onFilterChange, activeFilter }) => {
      const [hoveredRing, setHoveredRing] = useState(null);
      const [rotationOffset, setRotationOffset] = useState(0);
      const containerRef = useRef(null);
      const animationRef = useRef(null);
      
      useEffect(() => {
        let lastTime = 0;
        const animate = (time) => {
          if (time - lastTime >= 16) {
            setRotationOffset(prev => (prev + 0.05) % 360);
            lastTime = time;
          }
          animationRef.current = requestAnimationFrame(animate);
        };
        animationRef.current = requestAnimationFrame(animate);
        return () => cancelAnimationFrame(animationRef.current);
      }, []);
      
      const handleRingClick = useCallback((ringId) => {
        onFilterChange?.(activeFilter === ringId ? null : ringId);
      }, [activeFilter, onFilterChange]);
      
      const generateRingNodes = (ring, index) => {
        const nodes = [];
        for (let i = 0; i < ring.nodes; i++) {
          const angle = (360 / ring.nodes) * i;
          const radian = (angle * Math.PI) / 180;
          const x = Math.cos(radian) * ring.radius;
          const y = Math.sin(radian) * ring.radius;
          nodes.push(
            React.createElement('div', {
              key: `${ring.id}-node-${i}`,
              className: `ring-node ${activeFilter === ring.id ? 'active' : ''}`,
              style: {
                transform: `translate(${x}px, ${y}px)`,
                backgroundColor: ring.color,
                animationDelay: `${i * 0.1}s`
              }
            })
          );
        }
        return nodes;
      };
      
      return React.createElement('div', { ref: containerRef, className: 'orbital-system' },
        React.createElement('div', { className: 'orbital-center' },
          React.createElement('div', { className: 'center-core' },
            React.createElement('div', { className: 'core-pulse' }),
            React.createElement('div', { className: 'core-text' }, 'SATOR'),
            React.createElement('div', { className: 'core-glyph' }, '◈')
          )
        ),
        React.createElement('div', { className: 'rings-container sator-perspective' },
          ORBITAL_DATA.map((ring, index) => {
            const isActive = activeFilter === ring.id;
            const isHovered = hoveredRing === ring.id;
            const baseRotation = (rotationOffset * (20 / ring.speed)) % 360;
            
            return React.createElement('div', {
              key: ring.id,
              className: `orbital-ring-wrapper ${isActive ? 'active' : ''} ${isHovered ? 'hovered' : ''}`,
              style: { width: ring.radius * 2, height: ring.radius * 2, zIndex: 5 - index },
              onMouseEnter: () => setHoveredRing(ring.id),
              onMouseLeave: () => setHoveredRing(null),
              onClick: () => handleRingClick(ring.id)
            },
              React.createElement('div', {
                className: 'orbital-ring',
                style: {
                  transform: `rotateX(75deg) rotateZ(${baseRotation}deg) ${isHovered ? 'scale(1.02)' : ''} ${isActive ? 'scale(1.05)' : ''}`,
                  borderColor: isActive ? ring.color : `${ring.color}30`,
                  boxShadow: isActive ? `0 0 40px ${ring.color}40` : 'none'
                }
              },
                React.createElement('div', {
                  className: 'ring-label-track',
                  style: { transform: `rotateZ(${-baseRotation}deg)` }
                },
                  React.createElement('span', { className: 'ring-label', style: { color: ring.color } }, ring.name)
                )
              ),
              React.createElement('div', {
                className: 'ring-nodes-container',
                style: { transform: `rotateX(75deg) rotateZ(${baseRotation}deg)` }
              }, generateRingNodes(ring, index)),
              (isHovered || isActive) && React.createElement('div', { className: `ring-info ${isActive ? 'active' : ''}` },
                React.createElement('div', { className: 'ring-info-name', style: { color: ring.color } }, ring.name),
                React.createElement('div', { className: 'ring-info-count' }, ring.count.toLocaleString()),
                React.createElement('div', { className: 'ring-info-desc' }, ring.description)
              )
            );
          })
        ),
        React.createElement('div', { className: 'filter-status' },
          activeFilter ? 
            React.createElement('div', { className: 'filter-active' },
              React.createElement('span', { className: 'filter-label' }, 'FILTER:'),
              React.createElement('span', { className: 'filter-value' }, ORBITAL_DATA.find(r => r.id === activeFilter)?.name),
              React.createElement('button', { className: 'filter-clear', onClick: () => onFilterChange?.(null) }, '✕')
            ) :
            React.createElement('div', { className: 'filter-inactive' },
              React.createElement('span', { className: 'filter-hint' }, 'Click a ring to filter')
            )
        )
      );
    };
    
    // ParticleStarField Component
    const ParticleStarField = ({ particleCount = 1500, activeFilter }) => {
      const containerRef = useRef(null);
      const rendererRef = useRef(null);
      
      useEffect(() => {
        if (!containerRef.current || !window.THREE) return;
        
        const container = containerRef.current;
        const width = container.clientWidth;
        const height = container.clientHeight;
        
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0a0f, 0.02);
        
        const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
        camera.position.z = 50;
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(width, height);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x000000, 0);
        container.appendChild(renderer.domElement);
        rendererRef.current = renderer;
        
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        
        const colorAmber = new THREE.Color(0xff9f1c);
        const colorCyan = new THREE.Color(0x00f0ff);
        const colorGold = new THREE.Color(0xc9b037);
        
        for (let i = 0; i < particleCount; i++) {
          const theta = Math.random() * Math.PI * 2;
          const phi = Math.acos(2 * Math.random() - 1);
          const radius = 20 + Math.random() * 60;
          
          positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
          positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
          positions[i * 3 + 2] = radius * Math.cos(phi);
          
          const colorChoice = Math.random();
          let color = colorChoice < 0.5 ? colorAmber : colorChoice < 0.8 ? colorCyan : colorGold;
          colors[i * 3] = color.r;
          colors[i * 3 + 1] = color.g;
          colors[i * 3 + 2] = color.b;
        }
        
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        
        const material = new THREE.PointsMaterial({
          size: 1,
          vertexColors: true,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          transparent: true,
          opacity: 0.8
        });
        
        const particles = new THREE.Points(geometry, material);
        scene.add(particles);
        
        let frameId;
        const animate = () => {
          frameId = requestAnimationFrame(animate);
          particles.rotation.y += 0.0005;
          particles.rotation.x += 0.0002;
          renderer.render(scene, camera);
        };
        animate();
        
        const handleResize = () => {
          const newWidth = container.clientWidth;
          const newHeight = container.clientHeight;
          camera.aspect = newWidth / newHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(newWidth, newHeight);
        };
        
        window.addEventListener('resize', handleResize);
        
        return () => {
          cancelAnimationFrame(frameId);
          window.removeEventListener('resize', handleResize);
          renderer.dispose();
          geometry.dispose();
          material.dispose();
          if (container.contains(renderer.domElement)) {
            container.removeChild(renderer.domElement);
          }
        };
      }, [particleCount]);
      
      return React.createElement('div', { ref: containerRef, className: 'particle-star-field' },
        React.createElement('div', { className: 'particle-overlay' },
          React.createElement('div', { className: 'particle-stats' },
            React.createElement('div', { className: 'stat-item' },
              React.createElement('span', { className: 'stat-label' }, 'PARTICLES'),
              React.createElement('span', { className: 'stat-value' }, particleCount.toLocaleString())
            ),
            React.createElement('div', { className: 'stat-item' },
              React.createElement('span', { className: 'stat-label' }, 'CONSTELLATIONS'),
              React.createElement('span', { className: 'stat-value' }, (particleCount / 10).toFixed(0))
            )
          ),
          activeFilter && React.createElement('div', { className: 'particle-filter-indicator' },
            React.createElement('span', { className: 'filter-glyph' }, '◈'),
            React.createElement('span', { className: 'filter-text' }, activeFilter.toUpperCase())
          )
        )
      );
    };
    
    // LissajousComparator Component
    const PRESETS = [
      { name: 'Teams', a: 3, b: 2, delta: Math.PI / 4, color: '#ff9f1c' },
      { name: 'Matches', a: 5, b: 4, delta: Math.PI / 2, color: '#ff8c42' },
      { name: 'Players', a: 7, b: 5, delta: Math.PI / 3, color: '#ff7b59' },
      { name: 'Tournaments', a: 4, b: 3, delta: Math.PI / 6, color: '#ff6b6b' },
      { name: 'History', a: 6, b: 5, delta: Math.PI / 8, color: '#ff5e78' }
    ];
    
    const LissajousComparator = ({ width = 400, height = 280, activeDatasets = [] }) => {
      const canvasRef = useRef(null);
      const phaseRef = useRef(0);
      const [selectedPreset, setSelectedPreset] = useState(0);
      const [isPlaying, setIsPlaying] = useState(true);
      
      useEffect(() => {
        let frameId;
        const draw = () => {
          const canvas = canvasRef.current;
          if (!canvas) return;
          const ctx = canvas.getContext('2d');
          ctx.clearRect(0, 0, width, height);
          
          // Grid
          ctx.strokeStyle = 'rgba(255, 159, 28, 0.1)';
          ctx.lineWidth = 1;
          for (let x = 0; x <= width; x += 40) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
          }
          for (let y = 0; y <= height; y += 40) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
          }
          
          const centerX = width / 2;
          const centerY = height / 2;
          
          PRESETS.forEach((preset, index) => {
            if (activeDatasets.length === 0 || activeDatasets.includes(preset.name.toLowerCase())) {
              const { a, b, delta, color } = preset;
              const scale = Math.min(width, height) * 0.3;
              
              ctx.beginPath();
              ctx.strokeStyle = color;
              ctx.lineWidth = activeDatasets.length === 0 && index === selectedPreset ? 3 : 2;
              ctx.globalAlpha = activeDatasets.length === 0 && index === selectedPreset ? 1 : 0.3;
              
              for (let t = 0; t <= Math.PI * 2; t += 0.01) {
                const x = centerX + scale * Math.sin(a * t + delta + phaseRef.current);
                const y = centerY + scale * Math.sin(b * t + phaseRef.current);
                if (t === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
              }
              ctx.closePath();
              ctx.stroke();
            }
          });
          
          if (isPlaying) phaseRef.current += 0.02;
          frameId = requestAnimationFrame(draw);
        };
        draw();
        return () => cancelAnimationFrame(frameId);
      }, [width, height, selectedPreset, isPlaying, activeDatasets]);
      
      return React.createElement('div', { className: 'lissajous-comparator' },
        React.createElement('div', { className: 'comparator-header' },
          React.createElement('div', { className: 'header-title' },
            React.createElement('span', { className: 'title-glyph' }, '∿'),
            React.createElement('span', { className: 'title-text' }, 'HARMONIC COMPARATOR')
          ),
          React.createElement('div', { className: 'header-controls' },
            React.createElement('button', { className: `control-btn ${isPlaying ? 'active' : ''}`, onClick: () => setIsPlaying(!isPlaying) }, isPlaying ? '❚❚' : '▶')
          )
        ),
        React.createElement('div', { className: 'comparator-canvas-container' },
          React.createElement('canvas', { ref: canvasRef, width, height, className: 'comparator-canvas' })
        ),
        React.createElement('div', { className: 'preset-selector' },
          PRESETS.map((preset, index) =>
            React.createElement('button', {
              key: preset.name,
              className: `preset-btn ${selectedPreset === index ? 'active' : ''}`,
              onClick: () => setSelectedPreset(index),
              style: { '--preset-color': preset.color }
            },
              React.createElement('span', { className: 'preset-indicator' }),
              React.createElement('span', { className: 'preset-name' }, preset.name)
            )
          )
        )
      );
    };
    
    // TerminalVerifier Component
    const TerminalVerifier = ({ dataset, verificationStatus, onVerify }) => {
      const [lines, setLines] = useState([]);
      const [currentLine, setCurrentLine] = useState('');
      const [isTyping, setIsTyping] = useState(false);
      const [cursorVisible, setCursorVisible] = useState(true);
      
      useEffect(() => {
        const interval = setInterval(() => setCursorVisible(prev => !prev), 530);
        return () => clearInterval(interval);
      }, []);
      
      const generateHash = () => Array.from({ length: 16 }, () => Math.floor(Math.random() * 16).toString(16)).join('');
      
      useEffect(() => {
        const runVerification = async () => {
          setLines([{ type: 'system', text: 'SATOR INTEGRITY VERIFIER v2.1.0' }]);
          await new Promise(r => setTimeout(r, 500));
          
          setLines(prev => [...prev, { type: 'command', text: '$ verify --dataset ' + (dataset || 'all') }]);
          await new Promise(r => setTimeout(r, 300));
          
          setLines(prev => [...prev, { type: 'output', text: `Dataset: ${dataset || 'all'}` }]);
          setLines(prev => [...prev, { type: 'output', text: 'SHA-256: ' + generateHash() + '...' }]);
          setLines(prev => [...prev, { type: 'output', text: 'Result: VERIFIED ✓' }]);
          
          onVerify?.(true);
        };
        
        const timer = setTimeout(runVerification, 1000);
        return () => clearTimeout(timer);
      }, [dataset, onVerify]);
      
      return React.createElement('div', { className: 'terminal-verifier' },
        React.createElement('div', { className: 'terminal-header' },
          React.createElement('div', { className: 'terminal-title' },
            React.createElement('span', { className: 'title-icon' }, '◈'),
            React.createElement('span', { className: 'title-text' }, 'SATOR_VERIFIER')
          ),
          React.createElement('div', { className: 'terminal-controls' },
            React.createElement('div', { className: 'control-dot red' }),
            React.createElement('div', { className: 'control-dot yellow' }),
            React.createElement('div', { className: 'control-dot green' })
          )
        ),
        React.createElement('div', { className: 'terminal-toolbar' },
          React.createElement('div', { className: 'toolbar-section' },
            React.createElement('span', { className: 'toolbar-label' }, 'DATASET:'),
            React.createElement('span', { className: 'toolbar-value' }, dataset || 'ALL')
          ),
          React.createElement('div', { className: 'toolbar-section' },
            React.createElement('span', { className: 'toolbar-label' }, 'STATUS:'),
            React.createElement('span', { className: `toolbar-value status-${verificationStatus || 'pending'}` }, (verificationStatus || 'PENDING').toUpperCase())
          )
        ),
        React.createElement('div', { className: 'terminal-body' },
          lines.map((line, i) => {
            if (line.type === 'command') return React.createElement('div', { key: i, className: 'terminal-line command' }, React.createElement('span', { className: 'prompt' }, '$'), React.createElement('span', { className: 'command-text' }, line.text.slice(2)));
            if (line.type === 'output') return React.createElement('div', { key: i, className: 'terminal-line output' }, React.createElement('span', { className: 'output-text' }, line.text));
            if (line.type === 'system') return React.createElement('div', { key: i, className: 'terminal-line system' }, React.createElement('span', { className: 'system-text' }, line.text));
            return null;
          }),
          React.createElement('div', { className: 'terminal-line input' },
            React.createElement('span', { className: 'prompt' }, '$'),
            React.createElement('span', { className: `cursor ${cursorVisible ? 'visible' : ''}` }, '█')
          )
        ),
        React.createElement('div', { className: 'terminal-footer' },
          React.createElement('div', { className: 'footer-glyph' }, '∿'),
          React.createElement('div', { className: 'footer-info' },
            React.createElement('span', { className: 'info-line' }, 'SHA-256 INTEGRITY CHECK'),
            React.createElement('span', { className: 'info-line' }, 'SECURE CONNECTION // ENCRYPTED')
          ),
          React.createElement('div', { className: 'footer-hash' }, generateHash())
        )
      );
    };
    
    // MaterialityToggle Component
    const SPECTRUM_LABELS = {
      observable: { title: 'OBSERVABLE', glyph: '∿', color: '#00f0ff' },
      scalar: { title: 'SCALAR', glyph: '●', color: '#ff9f1c' }
    };
    
    const MaterialityToggle = ({ value = 50, onChange }) => {
      const [localValue, setLocalValue] = useState(value);
      const currentValue = localValue;
      const isObservableDominant = currentValue < 50;
      
      return React.createElement('div', { className: 'materiality-toggle' },
        React.createElement('div', { className: 'toggle-header' },
          React.createElement('div', { className: 'header-label' },
            React.createElement('span', { className: 'label-glyph' }, '◈'),
            React.createElement('span', { className: 'label-text' }, 'MATERIALITY SPECTRUM')
          ),
          React.createElement('div', { className: 'header-value' },
            React.createElement('span', { className: 'value-display', style: { color: isObservableDominant ? SPECTRUM_LABELS.observable.color : SPECTRUM_LABELS.scalar.color } },
              currentValue < 20 ? 'Quantum Field' : currentValue < 40 ? 'Wave Dominant' : currentValue < 60 ? 'Duality Point' : currentValue < 80 ? 'Particle Dominant' : 'Discrete State'
            )
          )
        ),
        React.createElement('div', { className: 'spectrum-container' },
          React.createElement('div', { className: `spectrum-side ${isObservableDominant ? 'active' : ''}` },
            React.createElement('span', { className: 'side-glyph' }, SPECTRUM_LABELS.observable.glyph),
            React.createElement('span', { className: 'side-title' }, SPECTRUM_LABELS.observable.title)
          ),
          React.createElement('div', { className: 'slider-wrapper' },
            React.createElement('div', { className: 'slider-track' },
              React.createElement('div', { className: 'track-gradient', style: { background: `linear-gradient(90deg, ${SPECTRUM_LABELS.observable.color}40 0%, ${SPECTRUM_LABELS.observable.color}20 40%, ${SPECTRUM_LABELS.scalar.color}20 60%, ${SPECTRUM_LABELS.scalar.color}40 100%)` } }),
              React.createElement('div', { className: 'active-indicator', style: { left: `${currentValue}%`, background: isObservableDominant ? SPECTRUM_LABELS.observable.color : SPECTRUM_LABELS.scalar.color } })
            ),
            React.createElement('input', {
              type: 'range',
              min: 0,
              max: 100,
              value: currentValue,
              onChange: (e) => { const v = parseInt(e.target.value); setLocalValue(v); onChange?.(v); },
              className: 'slider-input'
            })
          ),
          React.createElement('div', { className: `spectrum-side ${!isObservableDominant ? 'active' : ''}` },
            React.createElement('span', { className: 'side-glyph' }, SPECTRUM_LABELS.scalar.glyph),
            React.createElement('span', { className: 'side-title' }, SPECTRUM_LABELS.scalar.title)
          )
        ),
        React.createElement('div', { className: 'spectrum-footer' },
          React.createElement('div', { className: 'value-bar' },
            React.createElement('div', { className: 'value-fill observable', style: { width: `${50 - Math.min(currentValue, 50)}%`, opacity: isObservableDominant ? 0.7 : 0.2 } }),
            React.createElement('div', { className: 'value-center' }, React.createElement('span', { className: 'center-value' }, `${currentValue}%`)),
            React.createElement('div', { className: 'value-fill scalar', style: { width: `${Math.max(0, currentValue - 50)}%`, opacity: !isObservableDominant ? 0.7 : 0.2 } })
          )
        )
      );
    };
    
    // Main SATORHub Component
    const SATORHub = () => {
      const [activeFilter, setActiveFilter] = useState(null);
      const [materialityValue, setMaterialityValue] = useState(50);
      const [verificationStatus, setVerificationStatus] = useState('pending');
      const [isLoading, setIsLoading] = useState(true);
      const [showContent, setShowContent] = useState(false);
      
      useEffect(() => {
        const timer = setTimeout(() => { setIsLoading(false); setTimeout(() => setShowContent(true), 100); }, 1500);
        return () => clearTimeout(timer);
      }, []);
