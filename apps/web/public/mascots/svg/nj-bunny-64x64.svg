<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- NJ Bunny Mascot - 64x64px -->
  <!-- Minimalist line art, electric blue (#0000FF), transparent background -->
  
  <!-- Left Ear (floppy) -->
  <path d="M20 16 C20 4, 12 4, 12 16 C12 24, 20 28, 24 32" 
        fill="none" stroke="#0000FF" stroke-width="0.25" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Right Ear (slightly bent) -->
  <path d="M44 16 C44 6, 52 8, 50 18 C49 24, 44 28, 40 32" 
        fill="none" stroke="#0000FF" stroke-width="0.25" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Head -->
  <ellipse cx="32" cy="36" rx="14" ry="12" 
           fill="none" stroke="#0000FF" stroke-width="0.25"/>
  
  <!-- Left Eye (big round with sparkle) -->
  <circle cx="26" cy="34" r="3.6" fill="none" stroke="#0000FF" stroke-width="0.25"/>
  <circle cx="27" cy="33" r="0.8" fill="#0000FF"/>
  
  <!-- Right Eye (big round with sparkle) -->
  <circle cx="38" cy="34" r="3.6" fill="none" stroke="#0000FF" stroke-width="0.25"/>
  <circle cx="39" cy="33" r="0.8" fill="#0000FF"/>
  
  <!-- Nose -->
  <ellipse cx="32" cy="40" rx="1.6" ry="1" fill="#0000FF"/>
  
  <!-- Mouth (small cute smile) -->
  <path d="M29 42 Q32 45, 35 42" 
        fill="none" stroke="#0000FF" stroke-width="0.25" stroke-linecap="round"/>
  
  <!-- Body (simple line) -->
  <path d="M24 46 Q20 52, 20 56 Q32 58, 44 56 Q44 52, 40 46" 
        fill="none" stroke="#0000FF" stroke-width="0.25" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Fluffy Tail -->
  <circle cx="48" cy="52" r="4" fill="none" stroke="#0000FF" stroke-width="0.25"/>
  <path d="M45 50 L46 52 L44 54 M48 48 L48 51 L50 50 M51 52 L49 53 L51 55" 
        fill="none" stroke="#0000FF" stroke-width="0.2" stroke-linecap="round"/>
</svg>