<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- NJ Bunny Mascot - 32x32px -->
  <!-- Minimalist line art, electric blue (#0000FF), transparent background -->
  
  <!-- Left Ear (floppy) -->
  <path d="M10 8 C10 2, 6 2, 6 8 C6 12, 10 14, 12 16" 
        fill="none" stroke="#0000FF" stroke-width="0.125" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Right Ear (slightly bent) -->
  <path d="M22 8 C22 3, 26 4, 25 9 C24.5 12, 22 14, 20 16" 
        fill="none" stroke="#0000FF" stroke-width="0.125" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Head -->
  <ellipse cx="16" cy="18" rx="7" ry="6" 
           fill="none" stroke="#0000FF" stroke-width="0.125"/>
  
  <!-- Left Eye (big round with sparkle) -->
  <circle cx="13" cy="17" r="1.8" fill="none" stroke="#0000FF" stroke-width="0.125"/>
  <circle cx="13.5" cy="16.5" r="0.4" fill="#0000FF"/>
  
  <!-- Right Eye (big round with sparkle) -->
  <circle cx="19" cy="17" r="1.8" fill="none" stroke="#0000FF" stroke-width="0.125"/>
  <circle cx="19.5" cy="16.5" r="0.4" fill="#0000FF"/>
  
  <!-- Nose -->
  <ellipse cx="16" cy="20" rx="0.8" ry="0.5" fill="#0000FF"/>
  
  <!-- Mouth (small cute smile) -->
  <path d="M14.5 21 Q16 22.5, 17.5 21" 
        fill="none" stroke="#0000FF" stroke-width="0.125" stroke-linecap="round"/>
  
  <!-- Body (simple line) -->
  <path d="M12 23 Q10 26, 10 28 Q16 29, 22 28 Q22 26, 20 23" 
        fill="none" stroke="#0000FF" stroke-width="0.125" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Fluffy Tail -->
  <circle cx="24" cy="26" r="2" fill="none" stroke="#0000FF" stroke-width="0.125"/>
  <path d="M22.5 25 L23 26 L22 27 M24 24 L24 25.5 L25 25 M25.5 26 L24.5 26.5 L25.5 27.5" 
        fill="none" stroke="#0000FF" stroke-width="0.1" stroke-linecap="round"/>
</svg>