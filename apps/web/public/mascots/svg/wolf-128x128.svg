<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="wolfGradient128" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b"/>
      <stop offset="40%" style="stop-color:#475569"/>
      <stop offset="100%" style="stop-color:#334155"/>
    </linearGradient>
    <linearGradient id="wolfLight128" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8"/>
      <stop offset="50%" style="stop-color:#64748b"/>
      <stop offset="100%" style="stop-color:#475569"/>
    </linearGradient>
    <linearGradient id="wolfEarInner128" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cbd5e1"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
    <filter id="shadow128" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" fill="#0f172a" rx="16"/>
  
  <!-- Left Ear (pointed) -->
  <path d="M28 18 L44 50 L20 42 Z" fill="url(#wolfGradient128)" filter="url(#shadow128)"/>
  <path d="M32 24 L40 44 L26 38 Z" fill="url(#wolfEarInner128)"/>
  
  <!-- Right Ear (pointed) -->
  <path d="M100 18 L84 50 L108 42 Z" fill="url(#wolfGradient128)" filter="url(#shadow128)"/>
  <path d="M96 24 L88 44 L102 38 Z" fill="url(#wolfEarInner128)"/>
  
  <!-- Head main -->
  <ellipse cx="64" cy="58" rx="36" ry="32" fill="url(#wolfGradient128)" filter="url(#shadow128)"/>
  
  <!-- Cheek fur -->
  <path d="M30 62 Q24 68 28 74" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <path d="M98 62 Q104 68 100 74" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Forehead markings -->
  <path d="M56 38 L64 50 L72 38" fill="none" stroke="#334155" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M52 34 L56 40" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <path d="M76 34 L72 40" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Snout (long) -->
  <ellipse cx="64" cy="78" rx="20" ry="16" fill="url(#wolfLight128)"/>
  
  <!-- Snout shading -->
  <ellipse cx="64" cy="74" rx="12" ry="8" fill="#94a3b8" opacity="0.3"/>
  
  <!-- Nose -->
  <ellipse cx="64" cy="86" rx="8" ry="6" fill="#1e293b"/>
  <ellipse cx="64" cy="84" rx="4" ry="2" fill="#334155" opacity="0.5"/>
  
  <!-- Nostrils -->
  <ellipse cx="61" cy="87" rx="1.5" ry="1" fill="#0f172a"/>
  <ellipse cx="67" cy="87" rx="1.5" ry="1" fill="#0f172a"/>
  
  <!-- Eyes -->
  <ellipse cx="48" cy="54" rx="8" ry="10" fill="#f8fafc"/>
  <ellipse cx="80" cy="54" rx="8" ry="10" fill="#f8fafc"/>
  <ellipse cx="48" cy="54" rx="5" ry="7" fill="#0f172a"/>
  <ellipse cx="80" cy="54" rx="5" ry="7" fill="#0f172a"/>
  
  <!-- Eye shine -->
  <circle cx="50" cy="51" r="2.5" fill="#ffffff"/>
  <circle cx="82" cy="51" r="2.5" fill="#ffffff"/>
  <circle cx="46" cy="56" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="78" cy="56" r="1.5" fill="#ffffff" opacity="0.5"/>
  
  <!-- Eyebrows -->
  <path d="M40 44 Q48 40 56 44" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
  <path d="M72 44 Q80 40 88 44" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Mouth -->
  <path d="M56 94 Q64 98 72 94" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <path d="M64 90 L64 96" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Chin fur -->
  <path d="M58 100 Q64 104 70 100" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
</svg>