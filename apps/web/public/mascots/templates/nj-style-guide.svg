<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <!-- NJ Color Palette -->
    <style>
      :root {
        --nj-classic: #0000FF;
        --nj-attention: #FF006E;
        --nj-hype: #00F5D4;
        --nj-cookie: #8B4513;
        --nj-ditto: #E0E0E0;
        --nj-outline: #1a1a1a;
        --nj-bg-grid: #f5f5f5;
      }
      
      .nj-stroke {
        fill: none;
        stroke: var(--nj-outline);
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      
      .nj-stroke-classic { stroke: var(--nj-classic); }
      .nj-stroke-attention { stroke: var(--nj-attention); }
      .nj-stroke-hype { stroke: var(--nj-hype); }
      .nj-stroke-cookie { stroke: var(--nj-cookie); }
      .nj-stroke-ditto { stroke: var(--nj-ditto); }
      
      .nj-fill { fill: none; }
      .nj-fill-classic { fill: var(--nj-classic); fill-opacity: 0.1; }
      .nj-fill-attention { fill: var(--nj-attention); fill-opacity: 0.1; }
      
      .nj-eye { fill: var(--nj-outline); }
      .nj-eye-classic { fill: var(--nj-classic); }
      
      .label-text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 12px;
        fill: #666;
      }
      
      .title-text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 24px;
        font-weight: 600;
        fill: #1a1a1a;
      }
      
      .spec-text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 10px;
        fill: #999;
      }
      
      .guide-line {
        stroke: #ddd;
        stroke-width: 1;
        stroke-dasharray: 4,4;
      }
      
      .measure-line {
        stroke: #FF006E;
        stroke-width: 1;
      }
      
      .annotation {
        font-family: 'Inter', sans-serif;
        font-size: 10px;
        fill: #FF006E;
      }
    </style>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e5e5e5" stroke-width="0.5"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="1000" fill="url(#grid)"/>
  
  <!-- Title Section -->
  <text x="400" y="40" text-anchor="middle" class="title-text">NJ Style Guide — Mascot Generation</text>
  <text x="400" y="65" text-anchor="middle" class="label-text">Based on NewJeans Bunny — Minimalist Line Art System</text>
  
  <!-- ==================== SECTION 1: COLOR PALETTE ==================== -->
  <g transform="translate(40, 90)">
    <text x="0" y="0" class="title-text" style="font-size: 16px;">Color Palette</text>
    
    <!-- Classic Blue -->
    <g transform="translate(0, 20)">
      <circle cx="20" cy="20" r="18" fill="#0000FF" stroke="#1a1a1a" stroke-width="2"/>
      <text x="50" y="18" class="label-text">--nj-classic: #0000FF</text>
      <text x="50" y="32" class="spec-text">Electric blue — default stroke</text>
    </g>
    
    <!-- Attention Pink -->
    <g transform="translate(200, 20)">
      <circle cx="20" cy="20" r="18" fill="#FF006E" stroke="#1a1a1a" stroke-width="2"/>
      <text x="50" y="18" class="label-text">--nj-attention: #FF006E</text>
      <text x="50" y="32" class="spec-text">Hot pink — accent/emphasis</text>
    </g>
    
    <!-- Hype Mint -->
    <g transform="translate(400, 20)">
      <circle cx="20" cy="20" r="18" fill="#00F5D4" stroke="#1a1a1a" stroke-width="2"/>
      <text x="50" y="18" class="label-text">--nj-hype: #00F5D4</text>
      <text x="50" y="32" class="spec-text">Mint — energy/secondary</text>
    </g>
    
    <!-- Cookie Brown -->
    <g transform="translate(0, 80)">
      <circle cx="20" cy="20" r="18" fill="#8B4513" stroke="#1a1a1a" stroke-width="2"/>
      <text x="50" y="18" class="label-text">--nj-cookie: #8B4513</text>
      <text x="50" y="32" class="spec-text">Brown — warm variant</text>
    </g>
    
    <!-- Ditto Gray -->
    <g transform="translate(200, 80)">
      <circle cx="20" cy="20" r="18" fill="#E0E0E0" stroke="#1a1a1a" stroke-width="2"/>
      <text x="50" y="18" class="label-text">--nj-ditto: #E0E0E0</text>
      <text x="50" y="32" class="spec-text">Light gray — neutral/subtle</text>
    </g>
    
    <!-- Outline Black -->
    <g transform="translate(400, 80)">
      <circle cx="20" cy="20" r="18" fill="none" stroke="#1a1a1a" stroke-width="2"/>
      <text x="50" y="18" class="label-text">--nj-outline: #1a1a1a</text>
      <text x="50" y="32" class="spec-text">Dark outline — definition</text>
    </g>
  </g>
  
  <!-- ==================== SECTION 2: LINE SPECIFICATIONS ==================== -->
  <g transform="translate(40, 240)">
    <text x="0" y="0" class="title-text" style="font-size: 16px;">Line Specifications</text>
    
    <!-- Stroke Weight Demo -->
    <g transform="translate(0, 30)">
      <text x="0" y="0" class="label-text">Stroke Weight: 2px (consistent)</text>
      
      <!-- 2px stroke example with measurement -->
      <line x1="0" y1="20" x2="200" y2="20" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
      
      <!-- Measurement indicators -->
      <line x1="0" y1="10" x2="0" y2="35" class="measure-line"/>
      <line x1="200" y1="10" x2="200" y2="35" class="measure-line"/>
      <line x1="0" y1="27.5" x2="200" y2="27.5" class="measure-line" stroke-dasharray="2,2"/>
      <text x="100" y="45" text-anchor="middle" class="annotation">2px stroke-width</text>
    </g>
    
    <!-- Line Caps -->
    <g transform="translate(0, 90)">
      <text x="0" y="0" class="label-text">Line Caps: Round (stroke-linecap="round")</text>
      
      <!-- Round cap demo -->
      <line x1="20" y1="20" x2="100" y2="20" stroke="#1a1a1a" stroke-width="12" stroke-linecap="round"/>
      <line x1="20" y1="20" x2="100" y2="20" stroke="#FF006E" stroke-width="2" stroke-dasharray="2,2"/>
      <text x="130" y="24" class="spec-text">Round caps create soft edges</text>
    </g>
    
    <!-- Line Joins -->
    <g transform="translate(0, 140)">
      <text x="0" y="0" class="label-text">Line Joins: Round (stroke-linejoin="round")</text>
      
      <!-- Round join demo -->
      <path d="M 20 40 L 60 20 L 100 40" fill="none" stroke="#1a1a1a" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
      <path d="M 20 40 L 60 20 L 100 40" fill="none" stroke="#FF006E" stroke-width="1" stroke-dasharray="2,2"/>
      <text x="120" y="35" class="spec-text">Round joins at corners</text>
    </g>
    
    <!-- No Fill Principle -->
    <g transform="translate(280, 30)">
      <text x="0" y="0" class="label-text">No Fill Principle</text>
      
      <!-- Wrong: filled shape -->
      <g transform="translate(0, 20)">
        <circle cx="30" cy="30" r="25" fill="#0000FF" fill-opacity="0.3" stroke="#1a1a1a" stroke-width="2"/>
        <text x="70" y="35" class="spec-text" style="fill: #FF006E;">✗ Never use fill</text>
      </g>
      
      <!-- Right: line art only -->
      <g transform="translate(0, 90)">
        <circle cx="30" cy="30" r="25" fill="none" stroke="#0000FF" stroke-width="2"/>
        <text x="70" y="35" class="spec-text" style="fill: #00F5D4;">✓ Line art only</text>
      </g>
    </g>
  </g>
  
  <!-- ==================== SECTION 3: REFERENCE MASCOT (NJ BUNNY) ==================== -->
  <g transform="translate(40, 420)">
    <text x="0" y="0" class="title-text" style="font-size: 16px;">Reference Mascot — NJ Bunny</text>
    <text x="0" y="20" class="spec-text">Complete example showing all NJ style principles</text>
    
    <!-- Main Bunny Figure -->
    <g transform="translate(150, 80)">
      <!-- Construction lines (faint) -->
      <circle cx="0" cy="0" r="45" fill="none" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
      <line x1="-60" y1="0" x2="60" y2="0" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
      <line x1="0" y1="-60" x2="0" y2="100" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
      
      <!-- Ears -->
      <!-- Left Ear -->
      <ellipse cx="-25" cy="-55" rx="12" ry="35" fill="none" stroke="#1a1a1a" stroke-width="2"/>
      <ellipse cx="-25" cy="-55" rx="6" ry="25" fill="none" stroke="#1a1a1a" stroke-width="2"/>
      
      <!-- Right Ear -->
      <ellipse cx="25" cy="-55" rx="12" ry="35" fill="none" stroke="#1a1a1a" stroke-width="2"/>
      <ellipse cx="25" cy="-55" rx="6" ry="25" fill="none" stroke="#1a1a1a" stroke-width="2"/>
      
      <!-- Head -->
      <circle cx="0" cy="0" r="45" fill="none" stroke="#1a1a1a" stroke-width="2"/>
      
      <!-- Face Features -->
      <!-- Eyes - simple dots -->
      <circle cx="-18" cy="-5" r="5" fill="#1a1a1a"/>
      <circle cx="18" cy="-5" r="5" fill="#1a1a1a"/>
      
      <!-- Nose - tiny line -->
      <line x1="0" y1="5" x2="0" y2="10" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
      
      <!-- Mouth - small subtle curve -->
      <path d="M -8 15 Q 0 20 8 15" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
      
      <!-- Cheeks - optional subtle marks -->
      <circle cx="-32" cy="8" r="3" fill="none" stroke="#1a1a1a" stroke-width="1.5" opacity="0.5"/>
      <circle cx="32" cy="8" r="3" fill="none" stroke="#1a1a1a" stroke-width="1.5" opacity="0.5"/>
      
      <!-- Body - simple rounded shape -->
      <path d="M -25 42 Q -30 70 -20 90 Q 0 100 20 90 Q 30 70 25 42" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
      
      <!-- Arms -->
      <path d="M -35 55 Q -50 65 -45 80" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
      <path d="M 35 55 Q 50 65 45 80" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
      
      <!-- Feet -->
      <ellipse cx="-15" cy="95" rx="10" ry="8" fill="none" stroke="#1a1a1a" stroke-width="2"/>
      <ellipse cx="15" cy="95" rx="10" ry="8" fill="none" stroke="#1a1a1a" stroke-width="2"/>
      
      <!-- Annotations -->
      <g transform="translate(80, -50)">
        <line x1="0" y1="0" x2="-30" y2="10" stroke="#FF006E" stroke-width="1"/>
        <text x="5" y="5" class="annotation">Ears: elongated ellipses</text>
      </g>
      
      <g transform="translate(80, 0)">
        <line x1="0" y1="0" x2="-35" y2="0" stroke="#FF006E" stroke-width="1"/>
        <text x="5" y="5" class="annotation">Head: perfect circle</text>
      </g>
      
      <g transform="translate(80, 50)">
        <line x1="0" y1="0" x2="-25" y2="-10" stroke="#FF006E" stroke-width="1"/>
        <text x="5" y="5" class="annotation">Body: continuous curve</text>
      </g>
    </g>
    
    <!-- Size Reference -->
    <g transform="translate(350, 50)">
      <text x="0" y="0" class="label-text">Proportions</text>
      
      <!-- Head size indicator -->
      <g transform="translate(0, 30)">
        <line x1="0" y1="0" x2="90" y2="0" class="measure-line"/>
        <line x1="0" y1="-5" x2="0" y2="5" class="measure-line"/>
        <line x1="90" y1="-5" x2="90" y2="5" class="measure-line"/>
        <text x="45" y="-10" text-anchor="middle" class="annotation">Head width: 90px (45px radius)</text>
      </g>
      
      <!-- Total height -->
      <g transform="translate(0, 60)">
        <line x1="0" y1="0" x2="0" y2="190" class="measure-line"/>
        <line x1="-5" y1="0" x2="5" y2="0" class="measure-line"/>
        <line x1="-5" y1="190" x2="5" y2="190" class="measure-line"/>
        <text x="15" y="95" class="annotation" transform="rotate(90, 15, 95)">Total height: ~190px</text>
      </g>
      
      <!-- Ear height -->
      <g transform="translate(100, 60)">
        <line x1="0" y1="0" x2="0" y2="70" class="measure-line"/>
        <text x="10" y="35" class="annotation" transform="rotate(90, 10, 35)">Ear: 70px</text>
      </g>
    </g>
  </g>
  
  <!-- ==================== SECTION 4: EYE STYLES ==================== -->
  <g transform="translate(40, 720)">
    <text x="0" y="0" class="title-text" style="font-size: 16px;">Eye Style Variations</text>
    
    <!-- Style 1: Simple Dot (Default) -->
    <g transform="translate(0, 30)">
      <circle cx="20" cy="20" r="5" fill="#1a1a1a"/>
      <text x="50" y="25" class="label-text">Dot Style (Default)</text>
      <text x="50" y="40" class="spec-text">Simple filled circle, 5px radius</text>
    </g>
    
    <!-- Style 2: Small Circle -->
    <g transform="translate(200, 30)">
      <circle cx="20" cy="20" r="6" fill="none" stroke="#1a1a1a" stroke-width="2"/>
      <text x="50" y="25" class="label-text">Circle Style</text>
      <text x="50" y="40" class="spec-text">Outlined circle, 6px radius</text>
    </g>
    
    <!-- Style 3: Large Dot -->
    <g transform="translate(400, 30)">
      <circle cx="20" cy="20" r="8" fill="#1a1a1a"/>
      <text x="50" y="25" class="label-text">Large Dot</text>
      <text x="50" y="40" class="spec-text">Bigger filled circle, 8px radius</text>
    </g>
    
    <!-- Style 4: Happy Eyes -->
    <g transform="translate(0, 90)">
      <path d="M 12 22 Q 20 16 28 22" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
      <text x="50" y="25" class="label-text">Happy Style</text>
      <text x="50" y="40" class="spec-text">Inverted arc, 16px width</text>
    </g>
    
    <!-- Style 5: Wink -->
    <g transform="translate(200, 90)">
      <path d="M 12 20 Q 20 26 28 20" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
      <text x="50" y="25" class="label-text">Wink Style</text>
      <text x="50" y="40" class="spec-text">Curved line, 16px width</text>
    </g>
    
    <!-- Style 6: Sparkle -->
    <g transform="translate(400, 90)">
      <path d="M 20 12 L 20 28 M 12 20 L 28 20" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
      <text x="50" y="25" class="label-text">Sparkle Style</text>
      <text x="50" y="40" class="spec-text">Plus shape, 16px cross</text>
    </g>
  </g>
  
  <!-- ==================== SECTION 5: EXPRESSION GUIDE ==================== -->
  <g transform="translate(40, 880)">
    <text x="0" y="0" class="title-text" style="font-size: 16px;">Expression Guidelines</text>
    
    <!-- Neutral -->
    <g transform="translate(0, 30)">
      <circle cx="25" cy="25" r="20" fill="none" stroke="#1a1a1a" stroke-width="2"/>
      <circle cx="18" cy="22" r="3" fill="#1a1a1a"/>
      <circle cx="32" cy="22" r="3" fill="#1a1a1a"/>
      <line x1="20" y1="32" x2="30" y2="32" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
      <text x="55" y="30" class="label-text">Neutral</text>
    </g>
    
    <!-- Happy -->
    <g transform="translate(150, 30)">
      <circle cx="25" cy="25" r="20" fill="none" stroke="#1a1a1a" stroke-width="2"/>
      <circle cx="18" cy="22" r="3" fill="#1a1a1a"/>
      <circle cx="32" cy="22" r="3" fill="#1a1a1a"/>
      <path d="M 18 32 Q 25 38 32 32" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
      <text x="55" y="30" class="label-text">Happy</text>
    </g>
    
    <!-- Excited -->
    <g transform="translate(300, 30)">
      <circle cx="25" cy="25" r="20" fill="none" stroke="#1a1a1a" stroke-width="2"/>
      <circle cx="18" cy="20" r="4" fill="#1a1a1a"/>
      <circle cx="32" cy="20" r="4" fill="#1a1a1a"/>
      <path d="M 16 34 Q 25 42 34 34" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
      <text x="55" y="30" class="label-text">Excited</text>
    </g>
    
    <!-- Sleepy -->
    <g transform="translate(450, 30)">
      <circle cx="25" cy="25" r="20" fill="none" stroke="#1a1a1a" stroke-width="2"/>
      <line x1="15" y1="22" x2="23" y2="22" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
      <line x1="27" y1="22" x2="35" y2="22" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
      <circle cx="20" cy="35" r="2" fill="#1a1a1a" opacity="0.5"/>
      <text x="55" y="30" class="label-text">Sleepy</text>
    </g>
    
    <!-- Surprised -->
    <g transform="translate(600, 30)">
      <circle cx="25" cy="25" r="20" fill="none" stroke="#1a1a1a" stroke-width="2"/>
      <circle cx="18" cy="20" r="4" fill="#1a1a1a"/>
      <circle cx="32" cy="20" r="4" fill="#1a1a1a"/>
      <circle cx="25" cy="35" r="3" fill="none" stroke="#1a1a1a" stroke-width="2"/>
      <text x="55" y="30" class="label-text">Surprised</text>
    </g>
  </g>
  
  <!-- Footer -->
  <text x="400" y="980" text-anchor="middle" class="spec-text">NJ Style System v1.0 — 4NJZ4 TENET Platform</text>
</svg>
