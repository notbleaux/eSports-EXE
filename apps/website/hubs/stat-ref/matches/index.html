<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Database — SATOR Statistical Reference</title>
    <meta name="description" content="Browse esports match results and history. Filter by date, tournament, and teams.">
    <link rel="icon" type="image/svg+xml" href="../../../favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Playfair+Display:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../design-system/porcelain-cubed/main.css">
    <link rel="stylesheet" href="../css/stat-ref.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        stat: { primary: '#1E3A5F', secondary: '#00d4ff', accent: '#4A90D9' },
                        abyss: { void: '#0a0a0f', deep: '#0D1B2A', mid: '#152A45' }
                    },
                    fontFamily: { 
                        sans: ['Inter', 'system-ui', 'sans-serif'], 
                        mono: ['JetBrains Mono', 'monospace'],
                        display: ['Playfair Display', 'serif']
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-abyss-void text-white min-h-screen hub-statref">
    <!-- Navigation Bar -->
    <nav class="hub-nav border-b border-white/10">
        <div class="flex items-center gap-4">
            <a href="../../" class="hub-nav__logo text-lg font-bold">S</a>
            <div class="h-6 w-px bg-white/20"></div>
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 rounded-full bg-stat-secondary animate-pulse"></div>
                <span class="font-display text-lg font-light tracking-wide">Statistical Reference</span>
                <span class="text-xs font-mono text-white/40 bg-white/5 px-2 py-1 rounded-full">HUB 1/4</span>
            </div>
        </div>
        
        <div class="main-nav hidden md:flex">
            <a href="../index.html" class="main-nav__item">Overview</a>
            <a href="../players/index.html" class="main-nav__item">Players</a>
            <a href="../teams/index.html" class="main-nav__item">Teams</a>
            <a href="index.html" class="main-nav__item main-nav__item--active">Matches</a>
            <a href="../leaders/index.html" class="main-nav__item">Leaderboards</a>
        </div>

        <div class="flex items-center gap-3">
            <button class="mobile-nav__toggle md:hidden" id="mobileMenuToggle">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-nav__overlay" id="mobileMenuOverlay"></div>
    <div class="mobile-nav__menu" id="mobileMenu">
        <div class="mobile-nav__header">
            <span class="font-display text-xl">Menu</span>
            <button class="mobile-nav__close" id="mobileMenuClose">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div class="mobile-nav__list">
            <a href="../index.html" class="mobile-nav__item">Overview</a>
            <a href="../players/index.html" class="mobile-nav__item">Players</a>
            <a href="../teams/index.html" class="mobile-nav__item">Teams</a>
            <a href="index.html" class="mobile-nav__item mobile-nav__item--active">Matches</a>
            <a href="../leaders/index.html" class="mobile-nav__item">Leaderboards</a>
        </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- Page Header -->
        <div class="mb-8">
            <nav class="breadcrumbs mb-4">
                <div class="breadcrumb__item">
                    <a href="../index.html" class="breadcrumb__link">Stat Ref</a>
                    <span class="breadcrumb__separator">/</span>
                </div>
                <span class="breadcrumb__current">Matches</span>
            </nav>
            
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h1 class="text-3xl font-display font-light">Match Database</h1>
                    <p class="text-gray-400 mt-1">Browse match results and tournament history</p>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filter-bar">
            <div class="search-box">
                <svg class="search-box__icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                <input type="text" id="teamFilter" class="search-box__input" placeholder="Search teams...">
            </div>
            
            <div class="filter-group">
                <label class="filter-group__label">Tournament</label>
                <input type="text" id="tournamentFilter" class="filter-input" placeholder="Filter by tournament...">
            </div>
            
            <div class="filter-group">
                <label class="filter-group__label">Game</label>
                <select id="gameFilter" class="filter-select">
                    <option value="">All Games</option>
                    <option value="Valorant">Valorant</option>
                    <option value="CS">Counter-Strike</option>
                </select>
            </div>
        </div>

        <!-- Matches List -->
        <div id="matchesList" class="overflow-x-auto">
            <!-- Matches table will be populated by JavaScript -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/10 mt-16 py-8">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="flex items-center gap-4">
                    <a href="../index.html" class="text-gray-400 hover:text-white transition-colors text-sm flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                        </svg>
                        Back to Stat Ref
                    </a>
                </div>
                <span class="text-gray-500 text-sm">&copy; 2026 SATOR Platform</span>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="../js/stat-ref.js"></script>
    <script>
        // Mobile menu
        document.addEventListener('DOMContentLoaded', function() {
            const mobileMenuToggle = document.getElementById('mobileMenuToggle');
            const mobileMenuClose = document.getElementById('mobileMenuClose');
            const mobileMenu = document.getElementById('mobileMenu');
            const mobileMenuOverlay = document.getElementById('mobileMenuOverlay');

            function openMobileMenu() {
                mobileMenu.classList.add('mobile-nav--open');
                mobileMenuOverlay.classList.add('mobile-nav--open');
                document.body.style.overflow = 'hidden';
            }

            function closeMobileMenu() {
                mobileMenu.classList.remove('mobile-nav--open');
                mobileMenuOverlay.classList.remove('mobile-nav--open');
                document.body.style.overflow = '';
            }

            mobileMenuToggle?.addEventListener('click', openMobileMenu);
            mobileMenuClose?.addEventListener('click', closeMobileMenu);
            mobileMenuOverlay?.addEventListener('click', closeMobileMenu);
        });
    </script>
</body>
</html>
