<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATOR Sphere - Dual Triangle Pattern</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 700px;
            aspect-ratio: 1;
        }

        .title {
            color: #8a8a9a;
            text-align: center;
            margin-bottom: 10px;
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .subtitle {
            color: #5a5a6a;
            text-align: center;
            margin-bottom: 20px;
            font-size: 11px;
            letter-spacing: 2px;
        }

        .sphere-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sator-sphere {
            width: 90%;
            height: 90%;
        }

        /* Triangle facets - both halves */
        .facet {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .facet:hover {
            filter: brightness(1.3) drop-shadow(0 0 8px currentColor);
        }

        /* SATOR side colors */
        .facet-s { fill: #FFD700; }
        .facet-a { fill: #1E3A5F; }
        .facet-t { fill: #E8E8E8; }
        .facet-o { fill: #00D4FF; }
        .facet-r { fill: #FF4655; }

        /* Triangle orientation indicators */
        .tri-a { opacity: 0.9; }  /* First triangle of split */
        .tri-b { opacity: 0.7; }  /* Second triangle of split */

        .facet-letter {
            font-size: 11px;
            font-weight: bold;
            text-anchor: middle;
            dominant-baseline: central;
            pointer-events: none;
        }

        .facet-letter.dark { fill: #0a0a0f; }
        .facet-letter.light { fill: #ffffff; }

        /* Connection lines showing the dual triangle structure */
        .connection {
            fill: none;
            stroke: #2a2a3a;
            stroke-width: 1;
            opacity: 0.5;
        }

        /* Flow lines between facets */
        .flow-line {
            fill: none;
            stroke-width: 2;
            opacity: 0.4;
            stroke-dasharray: 8 4;
            animation: flow 4s linear infinite;
        }

        @keyframes flow {
            to { stroke-dashoffset: -24; }
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #8a8a9a;
            font-size: 10px;
        }

        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 2px;
        }

        .legend-tri {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .legend-tri-a { opacity: 0.9; }
        .legend-tri-b { opacity: 0.7; }

        .tooltip {
            position: absolute;
            background: rgba(20, 20, 31, 0.95);
            border: 1px solid #2a2a3a;
            padding: 12px 16px;
            border-radius: 8px;
            color: #ffffff;
            font-size: 11px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
            max-width: 200px;
        }

        .tooltip.visible { opacity: 1; }
        .tooltip-letter { font-size: 20px; font-weight: bold; margin-bottom: 4px; }
        .tooltip-tri { color: #8a8a9a; font-size: 10px; margin-bottom: 4px; }
        .tooltip-meaning { color: #aaaaaa; }
    </style>
</head>

            </div>
            <span>T - Tenet (both triangles)</span>
        </div>
        <div class="legend-item">
            <div class="legend-tri">
                <div class="legend-color legend-tri-a" style="background: #00D4FF;"></div>
                <div class="legend-color legend-tri-b" style="background: #00D4FF;"></div>
            </div>
            <span>O - Opera (both triangles)</span>
        </div>
        <div class="legend-item">
            <div class="legend-tri">
                <div class="legend-color legend-tri-a" style="background: #FF4655;"></div>
                <div class="legend-color legend-tri-b" style="background: #FF4655;"></div>
            </div>
            <span>R - Rotas (both triangles)</span>
        </div>
    </div>

    <script>
        // Interactive tooltip
        const facets = document.querySelectorAll('.facet');
        const tooltip = document.getElementById('tooltip');
        const tooltipLetter = document.getElementById('tooltip-letter');
        const tooltipTri = document.getElementById('tooltip-tri');
        const tooltipMeaning = document.getElementById('tooltip-meaning');
        const container = document.querySelector('.container');

        facets.forEach(facet => {
            facet.addEventListener('mouseenter', (e) => {
                const letter = facet.dataset.letter;
                const tri = facet.dataset.tri;
                const meaning = facet.dataset.meaning;
                
                tooltipLetter.textContent = letter;
                tooltipTri.textContent = `Triangle ${tri} (of split pair)`;
                tooltipMeaning.textContent = meaning;
                tooltip.classList.add('visible');
            });

            facet.addEventListener('mousemove', (e) => {
                const rect = container.getBoundingClientRect();
                tooltip.style.left = (e.clientX - rect.left + 15) + 'px';
                tooltip.style.top = (e.clientY - rect.top - 50) + 'px';
            });

            facet.addEventListener('mouseleave', () => {
                tooltip.classList.remove('visible');
            });
        });
    </script>
</body>
</html>
