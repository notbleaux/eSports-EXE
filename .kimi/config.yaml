# Kimi Code / Agent / Sub-Agent Configuration for eSports-EXE
# This file defines permissions and constraints for AI agents working on this project

project:
  name: eSports-EXE
  displayName: SATOR Esports Platform
  type: full-stack
  repository: notbleaux/eSports-EXE
  description: Three-part esports simulation and analytics platform

# =============================================================================
# PERMISSIONS MATRIX
# =============================================================================
permissions:
  # Code editing permissions
  code:
    read: true
    write: true
    delete: true
    execute: false  # No arbitrary code execution
  
  # Git operations
  git:
    commit: true
    push: true
    branch: true
    merge: true
    tag: false  # Tags require human approval
    rebase: false  # Rebase requires human approval
  
  # File system operations
  filesystem:
    read: true
    write: true
    delete: true
    create: true
    maxFileSize: 1048576  # 1MB limit for new files
  
  # Terminal/Shell access
  terminal:
    allowed: true
    restrictedCommands:  # Commands requiring approval
      - rm -rf
      - git push --force
      - git reset --hard
      - docker system prune
    
  # Deployment permissions
  deployment:
    trigger: true
    configure: true
    environments:
      - staging
      - preview
      # production requires explicit approval
  
  # Agent management
  agents:
    spawn: true
    manage: true
    delegate: true
    maxParallel: 10
    timeout: 300  # seconds

# =============================================================================
# CONSTRAINTS & SAFEGUARDS
# =============================================================================
constraints:
  requireApprovalFor:
    - destructiveOperations
    - mainBranchChanges
    - deploymentToProduction
    - secretModifications
    - workflowChanges
    - deletionOfProtectedFiles
  
  protectedBranches:
    - main
    - production
    - release/*
  
  protectedFiles:
    - .env
    - .env.*
    - *.pem
    - *.key
    - secrets.*
    - .kimi/config.yaml
  
  protectedDirectories:
    - .git/
    - .github/workflows/  # Changes require approval
    - infrastructure/secrets/

# =============================================================================
# AGENT CONFIGURATION
# =============================================================================
agents:
  # Sub-agent spawn limits
  maxConcurrent: 10
  defaultTimeout: 300
  
  # Skill requirements
  requiredSkills:
    - sator-project
    - sator-fastapi-backend
    - sator-react-frontend
  
  # Optional skills for specific tasks
  availableSkills:
    - sator-python-pipeline
    - sator-analytics
    - sator-deployment
    - sator-data-firewall
    - sator-sator-square
    - sator-godot-dev
    - sator-simulation

# =============================================================================
# GITHUB INTEGRATION
# =============================================================================
github:
  repository: notbleaux/eSports-EXE
  defaultBranch: main
  
  # Pull request settings
  pullRequests:
    autoCreate: false  # Require explicit approval
    autoMerge: false
    requireReview: true
    draftByDefault: true
  
  # Commit settings
  commits:
    autoCommit: false  # Always ask before committing
    signingRequired: false
    
  # Issue management
  issues:
    autoCreate: true
    labels:
      - "agent-generated"

# =============================================================================
# DEPLOYMENT CONFIGURATION
# =============================================================================
deployment:
  environments:
    staging:
      autoDeploy: true
      url: https://staging.esports-exe.pages.dev
      
    preview:
      autoDeploy: true
      urlPattern: https://preview-{pr}.esports-exe.pages.dev
      
    production:
      autoDeploy: false
      url: https://esports-exe.pages.dev
      requiresApproval: true

# =============================================================================
# NOTIFICATIONS
# =============================================================================
notifications:
  onError: true
  onCompletion: true
  onApprovalRequired: true
  
  channels:
    - type: console
    - type: file
      path: .kimi/activity.log

# =============================================================================
# LOGGING
# =============================================================================
logging:
  level: INFO
  file: .kimi/activity.log
  maxSize: 10485760  # 10MB
  maxFiles: 5
  
  # Log sensitive operations
  auditLog: true
  auditLogFile: .kimi/audit.log
